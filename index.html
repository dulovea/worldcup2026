getElementById('screen-code').classList.remove('active');\n  document.getElementById('screen-app').classList.add('active');\n  _loginTime = Date.now();\n  document.getElementById('topbar-user').textContent=ME.username;\n  document.getElementById('topbar-avatar').textContent=ME.emoji;\n  document.getElementById('topbar-group').textContent=CUR_GROUP?(DB_groupMeta[CUR_GROUP]?.name||'Groupe'):'Pas de groupe';\n  document.getElementById('admin-badge').classList.toggle('hidden',!isAdmin());\n  document.getElementById('create-group-section')?.classList.toggle('hidden',!isAdmin());\n  renderAll();\n  if(!isAdmin()) showNotifBanner();\n  if(!isAdmin()) scheduleInAppChecks();\n\n  setTimeout(()=>parseEmoji(),200);\n  setTimeout(showUnreadToast, 3000);\n}\n\n// ========================================\n// DATA LOADING\n// ========================================\nasync function loadUserData(){\n  if(ME.isAdmin){\n    const snap=await get(ref(db,'groups'));\n    DB_groupMeta=snap.val()||{};\n    for(const gid of Object.keys(DB_groupMeta)){\n      const ms=await get(ref(db,'members/'+gid));\n      DB_members[gid]=ms.val()?Object.keys(ms.val()):[];\n    }\n  }else{\n    const snap=await get(ref(db,'users/'+ME.username+'/groups'));\n    const myGroups=snap.val()?Object.keys(snap.val()):[];\n    DB_groupMeta={};DB_members={};\n    for(const gid of myGroups){\n      const gs=await get(ref(db,'groups/'+gid));\n      if(gs.exists()) DB_groupMeta[gid]=gs.val();\n      const ms=await get(ref(db,'members/'+gid));\n      DB_members[gid]=ms.val()?Object.keys(ms.val()):[];\n    }\n    if(myGroups.length>0) CUR_GROUP=myGroups[0];\n  }\n  if(ME.isAdmin&&Object.keys(DB_groupMeta).length>0) CUR_GROUP=Object.keys(DB_groupMeta)[0];\n  if(CUR_GROUP) subscribeGroup(CUR_GROUP);\n  // Subscribe to chat for badge notifications\n  Object.keys(DB_groupMeta).forEach(gid=>subscribeChatForBadge(gid));\n}\n\nfunction subscribeGroup(gid){\n  if(_activeListeners[gid]&&_activeListeners[gid].length>0) return; // Already subscribed\n  cleanupGroupListeners(gid);\n  _activeListeners[gid]=[];\n  const bRef=ref(db,'bets/'+gid);\n  onValue(bRef,snap=>{DB_bets[gid]=snap.val()||{};if(ME){renderMatches();renderLeaderboard();renderStats();}});\n  _activeListeners[gid].push(bRef);\n  const dRef=ref(db,'doubles/'+gid);\n  onValue(dRef,snap=>{DB_doubles[gid]=snap.val()||{};if(ME)renderMatches();});\n  _activeListeners[gid].push(dRef);\n  const mRef=ref(db,'members/'+gid);\n  onValue(mRef,snap=>{DB_members[gid]=snap.val()?Object.keys(snap.val()):[];if(ME){renderLeaderboard();renderGroups();}});\n  _activeListeners[gid].push(mRef);\n  const cRef=ref(db,'champion_bets/'+gid);\n  onValue(cRef,snap=>{DB_champion[gid]=snap.val()||{};if(ME)renderMatches();});\n  _activeListeners[gid].push(cRef);\n}\n\nasync function joinGroup(gid){\n  const gs=await get(ref(db,'groups/'+gid));\n  if(!gs.exists()) return;\n  DB_groupMeta[gid]=gs.val();\n  await set(ref(db,'users/'+ME.username+'/groups/'+gid),true);\n  await set(ref(db,'members/'+gid+'/'+ME.username),true);\n  DB_members[gid]=DB_members[gid]||[];\n  if(!DB_members[gid].includes(ME.username)) DB_members[gid].push(ME.username);\n  if(!CUR_GROUP) CUR_GROUP=gid;\n  subscribeGroup(gid);\n  toast('✅ Rejoint : '+gs.val().name);\n}\n\nasync function loadUsersEmoji(usernames){\n  for(const u of usernames){\n    if(DB_users[u]||u==='admin') continue;\n    try{const snap=await get(ref(db,'users/'+u+'/emoji'));if(snap.exists())DB_users[u]={emoji:snap.val()};}catch(e){}\n  }\n}\n\n// ========================================\n// NAV\n// ========================================\nfunction showTab(tab){\n  ACTIVE_TAB=tab;\n  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));\n  document.querySelectorAll('.bnav').forEach(b=>b.classList.remove('active'));\n  const tabEl=document.getElementById('tab-'+tab);\n  const navEl=document.getElementById('bnav-'+tab);\n  if(tabEl) tabEl.classList.add('active');\n  if(navEl) navEl.classList.add('active');\n  if(tab==='leaderboard'){renderLeaderboard();renderStats();}\n  if(tab==='global') renderGlobalLeaderboard();\n  if(tab==='chat') initChat();\n  if(tab==='groups') renderGroups();\n  setTimeout(()=>parseEmoji(),150);\n  if(tab==='bracket'){\n    renderBracket();\n    if(!localStorage.getItem('wc2026_bracket_intro_v2')&&!isAdmin()){\n      setTimeout(()=>showOnboarding(true), 500);\n    }\n  }\n  if(tab==='admin'){\n    const gate=document.getElementById('admin-gate');\n    const content=document.getElementById('admin-content');\n    if(isAdmin()){\n      if(gate) gate.style.display='none';\n      if(content) content.style.display='block';\n      renderAdmin();\n    }else{\n      if(gate) gate.style.display='block';\n      if(content) content.style.display='none';\n    }\n  }\n}\nwindow.showTab=showTab;\nwindow.setFilter=function(f){FILTER=f;buildFilters('frow',FILTER,'setFilter');renderMatches();};\nwindow.setAdminFilter=function(f){ADMIN_FILTER=f;buildFilters('admin-frow',ADMIN_FILTER,'setAdminFilter');renderAdmin();};\n\n\n// ================================================\n// NEXT MATCH COUNTER\n// ================================================\nfunction updateNextMatchCounter() {\n  // Remplacé par renderNextClash (bannière 'Prochain choc'). On masque l'ancienne barre.\n  const el = document.getElementById('next-match-bar');\n  if (el) el.classList.add('hidden');\n}\n\n// ================================================\n// BADGES\n// ================================================\nfunction updateBadges() {\n  if (!ME || ME.isAdmin || !CUR_GROUP) return;\n  const s = getScore(ME.username);\n  const members = (DB_members[CUR_GROUP]||[]).filter(u=>u!=='admin');\n  const sorted = members.map(u=>({u,...getScore(u)})).sort((a,b)=>b.total-a.total);\n  const rank = sorted.findIndex(x=>x.u===ME.username)+1;\n  const bets = (DB_bets[CUR_GROUP]||{})[ME.username]||{};\n  if (Object.keys(bets).length>0 && !userBadges.firstBet) { userBadges.firstBet=true; toast('🔥 Badge : Premier pari !'); }\n  if (s.exact>=1 && !userBadges.firstExact) { userBadges.firstExact=true; toast('🎯 Badge : Premier score exact !'); }\n  if (s.doubles>=1 && !userBadges.firstDouble) { userBadges.firstDouble=true; toast('⚡ Badge : Audacieux (×2) !'); }\n  if (rank<=3 && !userBadges.top3) { userBadges.top3=true; toast('🏆 Badge : Top 3 !'); }\n  const list = [];\n  if (userBadges.firstBet) list.push({i:'🔥',n:'Premier pari'});\n  if (userBadges.firstExact) list.push({i:'🎯',n:'Score exact'});\n  if (userBadges.firstDouble) list.push({i:'⚡',n:'Audacieux'});\n  if (userBadges.top3) list.push({i:'🏆',n:'Top 3'});\n  if (s.exact>=5) list.push({i:'🎯🎯',n:'5 exacts'});\n  const section = document.getElementById('badges-section');\n  const listEl = document.getElementById('badges-list');\n  if (section && listEl && list.length>0) {\n    section.classList.remove('hidden');\n    listEl.innerHTML = list.map(b=>'<div style=\"display:inline-flex;align-items:center;gap:5px;background:rgba(108,92,231,0.08);border:1px solid rgba(108,92,231,0.15);border-radius:20px;padding:4px 10px;font-size:11px\"><span>'+b.i+'<\u002Fspan><span>'+b.n+'<\u002Fspan><\u002Fdiv>').join('');\n  }\n}\n\n// ================================================\n// SHARE RANKING\n// ================================================\nwindow.shareRanking = function() {\n  if (!ME || !CUR_GROUP) return;\n  const s = getScore(ME.username);\n  const members = (DB_members[CUR_GROUP]||[]).filter(u=>u!=='admin');\n  const sorted = members.map(u=>({u,...getScore(u)})).sort((a,b)=>b.total-a.total);\n  const rank = sorted.findIndex(x=>x.u===ME.username)+1;\n  const text = '🏆 WORLD CUP 2026\\n\\n'+ME.emoji+' '+ME.username+' est '+rank+'ème/'+members.length+' avec '+s.total+' points !\\n'+s.exact+' scores exacts 🔥\\n\\nJouez : worldcoupe2026.netlify.app';\n  if (navigator.share) navigator.share({title:'Mon classement WC2026',text:text});\n  else navigator.clipboard.writeText(text).then(()=>toast('📋 Classement copié !'));\n};\n\n// ================================================\n// SYNC BETS TO ALL GROUPS (admin)\n// ================================================\nwindow.syncUserBetsToAllGroups = async function(username) {\n  if (!isAdmin()) return;\n  const userGroupsSnap = await get(ref(db,'users/'+username+'/groups'));\n  const userGroups = userGroupsSnap.val() ? Object.keys(userGroupsSnap.val()) : [];\n  if (userGroups.length <= 1) return toast('Ce joueur n\\'a qu\\'un seul groupe');\n  const refGroup = userGroups[0];\n  // Sync bets\n  const refBets = await get(ref(db,'bets/'+refGroup+'/'+username));\n  const bets = refBets.val() || {};\n  let count = 0;\n  for (const gid of userGroups.slice(1)) {\n    for (const [mid, data] of Object.entries(bets)) {\n      await set(ref(db,'bets/'+gid+'/'+username+'/'+mid), data);\n      count++;\n    }\n  }\n  // Sync doubles (bonus ×2)\n  const refDoubles = await get(ref(db,'doubles/'+refGroup+'/'+username));\n  const doubles = refDoubles.val() || {};\n  let dblCount = 0;\n  for (const gid of userGroups.slice(1)) {\n    for (const [key, mid] of Object.entries(doubles)) {\n      await set(ref(db,'doubles/'+gid+'/'+username+'/'+key), mid);\n      dblCount++;\n    }\n  }\n  toast('✅ Synchronisé : '+count+' paris + '+dblCount+' bonus');\n};\n\n\n\n// ================================================\n// THEMES\n// ================================================\nconst THEMES = [\n  { id:'midnight', name:'Minuit', icon:'🌙' },\n  { id:'light', name:'Clair', icon:'☀️' },\n  { id:'ocean', name:'Océan', icon:'🌊' },\n  { id:'forest', name:'Forêt', icon:'🌲' },\n  { id:'sunset', name:'Coucher', icon:'🌅' },\n  { id:'royal', name:'Royal', icon:'👑' },\n];\nfunction applyTheme(themeId) {\n  document.documentElement.setAttribute('data-theme', themeId);\n  localStorage.setItem('wc2026_theme', themeId);\n  renderThemePicker();\n  // Update theme-color meta for mobile browser chrome\n  const colors = {midnight:'#0a0a0f',light:'#eef1f7',ocean:'#06121a',forest:'#080f0a',sunset:'#120a0e',royal:'#0d0817'};\n  const meta = document.querySelector('meta[name=\"theme-color\"]');\n  if(meta && colors[themeId]) meta.setAttribute('content', colors[themeId]);\n}\nwindow.applyTheme = applyTheme;\nwindow.toggleThemePicker = function(){\n  const bar = document.getElementById('theme-picker-bar');\n  if(bar){ bar.classList.toggle('hidden'); renderThemePicker(); }\n};\nfunction renderThemePicker() {\n  const el = document.getElementById('theme-picker');\n  if (!el) return;\n  const current = localStorage.getItem('wc2026_theme') || 'midnight';\n  el.innerHTML = THEMES.map(t =>\n    `<div class=\"theme-swatch${t.id===current?' active':''}\" onclick=\"applyTheme('${t.id}')\" title=\"${t.name}\"\n      style=\"background:${themeBg(t.id)}\">${t.icon}<\u002Fdiv>`\n  ).join('');\n}\nfunction themeBg(id) {\n  const bgs = {\n    midnight:'linear-gradient(135deg,#0a0a0f,#2b2e3d)',\n    light:'linear-gradient(135deg,#eef1f7,#dde3ee)',\n    ocean:'linear-gradient(135deg,#06121a,#1e4150)',\n    forest:'linear-gradient(135deg,#080f0a,#27412d)',\n    sunset:'linear-gradient(135deg,#120a0e,#412833)',\n    royal:'linear-gradient(135deg,#0d0817,#352855)',\n  };\n  return bgs[id] || bgs.midnight;\n}\n\n\n\n// ================================================\n// ONBOARDING SLIDES\n// ================================================\nconst ONB_SLIDES = [\n  {\n    icon:'👋', title:'Bienvenue !',\n    body:'Pronostiquez les scores des matchs de la Coupe du Monde 2026 et affrontez vos amis ! Le meilleur pronostiqueur gagne. Pas d\\'argent, juste de la fierté ! 🏆'\n  },\n  {\n    icon:'⚽', title:'Comment parier',\n    body:'Sur chaque match, entrez votre score prévu (ex : 2–1) avant le coup d\\'envoi. C\\'est enregistré automatiquement. Une fois le match commencé, les paris sont verrouillés.'\n  },\n  {\n    icon:'🎯', title:'Le système de points',\n    body:'POINTS_TABLE'\n  },\n  {\n    icon:'🔥', title:'Le bonus ×2',\n    body:'Le bonus ×2 double vos points sur un match (mais 0 si vous ratez !).<br><br><strong>Phase de groupes :<\u002Fstrong> 1 bonus par semaine.<br><strong>Phase finale :<\u002Fstrong> 2 bonus en 16es, 2 en 8es, 2 en quarts, 1 pour demies/finale.<br><br>⚠️ Les bonus non utilisés dans une phase sont perdus — choisissez bien !'\n  },\n  {\n    icon:'⚡', title:'Phase éliminatoire',\n    body:'KNOCKOUT_TABLE'\n  },\n  {\n    icon:'🏆', title:'C\\'est parti !',\n    body:'Consultez les classements (votre groupe + global), discutez dans le chat, et grimpez au sommet ! Bonne chance, et que le meilleur gagne ! ⚽'\n  },\n];\nlet onbIdx = 0;\nfunction renderOnbSlide() {\n  const s = ONB_SLIDES[onbIdx];\n  const el = document.getElementById('onb-slides');\n  if (!el) return;\n  let bodyHtml;\n  if (s.body === 'KNOCKOUT_TABLE') {\n    bodyHtml = `<div style=\"text-align:left;font-size:13px;line-height:1.9\">\n      <div style=\"font-size:13px;color:var(--muted2);margin-bottom:10px\">En phase éliminatoire, les points sont multipliés !<\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)\"><span>⚔️ 16es et 8es de finale<\u002Fspan><strong style=\"color:var(--gold)\">×2<\u002Fstrong><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)\"><span>⚔️ Quarts et Demies<\u002Fspan><strong style=\"color:var(--gold)\">×3<\u002Fstrong><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;padding:6px 0\"><span>🏆 Finale<\u002Fspan><strong style=\"color:var(--gold)\">×4<\u002Fstrong><\u002Fdiv>\n      <div style=\"margin-top:12px;padding:10px;background:var(--s1);border-radius:8px;font-size:12px;color:var(--muted2)\">\n        <strong style=\"color:var(--text)\">Exemple :<\u002Fstrong> Score exact en quarts = 30×3 = <strong style=\"color:var(--green)\">90 pts<\u002Fstrong>. Avec bonus ×2 = <strong style=\"color:var(--green)\">180 pts<\u002Fstrong> !\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  } else if (s.body === 'POINTS_TABLE') {\n    bodyHtml = `<div style=\"text-align:left;font-size:13px;line-height:1.9\">\n      <div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)\"><span>🎯 Score exact<\u002Fspan><strong style=\"color:var(--gold)\">30 pts<\u002Fstrong><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)\"><span>✅ Bon vainqueur + bon écart<\u002Fspan><strong style=\"color:var(--gold)\">20 pts<\u002Fstrong><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)\"><span>🤝 Match nul correct<\u002Fspan><strong style=\"color:var(--gold)\">20 pts<\u002Fstrong><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;padding:6px 0\"><span>👍 Bon vainqueur seulement<\u002Fspan><strong style=\"color:var(--gold)\">10 pts<\u002Fstrong><\u002Fdiv>\n      <div style=\"margin-top:12px;padding:10px;background:var(--s1);border-radius:8px;font-size:12px;color:var(--muted2)\">\n        <strong style=\"color:var(--text)\">Exemple :<\u002Fstrong> le match finit <strong>2–0<\u002Fstrong>.<br>• Vous aviez 2–0 → <strong style=\"color:var(--green)\">30 pts<\u002Fstrong> (exact)<br>• Vous aviez 3–1 → <strong style=\"color:var(--green)\">20 pts<\u002Fstrong> (bon vainqueur + écart de 2)<br>• Vous aviez 1–0 → <strong style=\"color:var(--green)\">10 pts<\u002Fstrong> (bon vainqueur)\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  } else {\n    bodyHtml = `<p style=\"font-size:14px;line-height:1.7;color:var(--muted2);margin:0\">${s.body}<\u002Fp>`;\n  }\n  el.innerHTML = `<div style=\"padding:32px 28px 20px;text-align:center\">\n    <div style=\"font-size:52px;margin-bottom:14px\">${s.icon}<\u002Fdiv>\n    <h3 style=\"font-family:'Oswald',sans-serif;font-size:26px;color:var(--gold);letter-spacing:1px;margin-bottom:14px\">${s.title}<\u002Fh3>\n    ${bodyHtml}\n  <\u002Fdiv>`;\n  // Dots\n  const dots = document.getElementById('onb-dots');\n  if (dots) dots.innerHTML = ONB_SLIDES.map((_,i)=>`<div style=\"width:8px;height:8px;border-radius:50%;background:${i===onbIdx?'var(--gold)':'var(--bd2)'}\"><\u002Fdiv>`).join('');\n  // Buttons\n  document.getElementById('onb-prev').style.visibility = onbIdx===0 ? 'hidden' : 'visible';\n  document.getElementById('onb-next').textContent = onbIdx===ONB_SLIDES.length-1 ? 'Commencer ! 🚀' : 'Suivant →';\n}\nwindow.onbNext = function() {\n  if (onbIdx < ONB_SLIDES.length-1) { onbIdx++; renderOnbSlide(); }\n  else { closeModal('modal-onboarding'); localStorage.setItem('wc2026_onboarded','1'); localStorage.setItem('wc2026_bracket_intro_v2','1'); }\n};\nwindow.onbPrev = function() { if (onbIdx>0){ onbIdx--; renderOnbSlide(); } };\nfunction showOnboarding(force) {\n  if (!force && localStorage.getItem('wc2026_onboarded')) return;\n  onbIdx = 0;\n  renderOnbSlide();\n  document.getElementById('modal-onboarding').classList.add('show');\n}\n\n\n\n// ================================================\n// HALL OF FAME — meilleures perfs du groupe\n// ================================================\nfunction renderHallOfFame(){\n  const el = document.getElementById('hall-of-fame');\n  if (!el || !CUR_GROUP) return;\n  const members = (DB_members[CUR_GROUP]||[]).filter(u=>u!=='admin');\n  if (members.length === 0) { el.classList.add('hidden'); return; }\n  const bets = DB_bets[CUR_GROUP] || {};\n  const R = resolveKnockoutTeams(DB_results);\n  const perfs = [];\n  // For each (user, match) compute points and keep only finished matches with pts > 0\n  members.forEach(u => {\n    const userBets = bets[u] || {};\n    MATCHES.forEach(m => {\n      const result = DB_results[m.id];\n      if (!result || result.home === undefined || result.live) return;\n      const bet = userBets[m.id];\n      if (!bet || bet.home === undefined) return;\n      const pts = calcPts(bet, result, m.id);\n      if (pts && pts > 0) {\n        const em = enrichMatch(m, R);\n        perfs.push({\n          user: u, emoji: DB_users[u]?.emoji || '🏳️',\n          pts, bet, result, match: em,\n          ts: result.ts || 0\n        });\n      }\n    });\n  });\n  // Sort by points desc, then most recent\n  perfs.sort((a,b) => b.pts - a.pts || b.ts - a.ts);\n  const top = perfs.slice(0, 5);\n  if (top.length === 0) { el.classList.add('hidden'); return; }\n  el.classList.remove('hidden');\n  el.innerHTML = `<div class=\"hof-title\">🏅 Hall of Fame — meilleures perfs<\u002Fdiv>` +\n    top.map((p,i) => {\n      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'⚡';\n      const exact = p.bet.home===p.result.home && p.bet.away===p.result.away;\n      const dbl = p.bet.double;\n      return `<div class=\"hof-row\">\n        <span class=\"hof-emoji\">${medal}<\u002Fspan>\n        <span style=\"font-size:16px\">${p.emoji}<\u002Fspan>\n        <div class=\"hof-detail\">\n          <span class=\"hof-user\">${escHtml(p.user)}<\u002Fspan> · \n          ${escHtml(p.match.hn)} ${p.result.home}–${p.result.away} ${escHtml(p.match.an)}\n          ${exact?' 🎯':''}${dbl?' 🔥×2':''}\n        <\u002Fdiv>\n        <span class=\"hof-pts\">+${p.pts}<\u002Fspan>\n      <\u002Fdiv>`;\n    }).join('');\n}\n\n\n\n// ================================================\n// CHAMPION DU MONDE BET\n// ================================================\nlet _champSelected = null;\n\nfunction getChampionDeadline(){\n  // Deadline = first R32 match (June 28, 2026, earliest kickoff)\n  const r32m = MATCHES.find(m=>m.gr==='R32');\n  return r32m ? getMatchDate(r32m) : new Date('2026-06-28T19:00:00+01:00');\n}\nfunction isChampionBetOpen(){\n  return new Date() < getChampionDeadline();\n}\nfunction updateChampionBetBar(){\n  if(!ME||ME.isAdmin||!CUR_GROUP) return;\n  const bar = document.getElementById('champion-bet-bar');\n  const label = document.getElementById('champion-bet-label');\n  if(!bar) return;\n  const myBet = (DB_champion[CUR_GROUP]||{})[ME.username];\n  const deadline = getChampionDeadline();\n  const now = new Date();\n  const open = now < deadline;\n  if(myBet){\n    const team = MATCHES.reduce((acc,m)=>{\n      if(m.hc===myBet) return {name:m.hn,flag:m.h};\n      if(m.ac===myBet) return {name:m.an,flag:m.a};\n      return acc;\n    },{name:myBet,flag:'🏆'});\n    label.innerHTML = `Mon choix : ${team.flag} <strong>${team.name}<\u002Fstrong> · +100 pts si gagnant !`;\n    bar.style.opacity='0.7';\n    bar.onclick=null;bar.style.cursor='default';\n  } else if(open) {\n    const diff = deadline - now;\n    const hours = Math.floor(diff/3600000);\n    const mins = Math.floor((diff%3600000)/60000);\n    const countdown = hours>24 ? Math.floor(hours/24)+'j '+hours%24+'h' : hours+'h'+mins+'min';\n    label.innerHTML = `🏆 Qui sera Champion ? <strong>+100 pts<\u002Fstrong><br><span style=\"font-size:11px;color:var(--red)\">⏰ Deadline dans ${countdown} — avant les 16es !<\u002Fspan>`;\n    bar.style.opacity='1';\n    bar.onclick=()=>showChampionBet();bar.style.cursor='pointer';\n  } else {\n    label.innerHTML = `🏆 Pari Champion — <span style=\"color:var(--red)\">FERMÉ<\u002Fspan><br><span style=\"font-size:11px;color:var(--muted)\">Deadline dépassée (début des 16es)<\u002Fspan>`;\n    bar.style.opacity='0.5';\n    bar.onclick=null;bar.style.cursor='default';\n  }\n  bar.classList.remove('hidden');\n}\n\nwindow.showChampionBet = function(){\n  if(!ME||!CUR_GROUP) return;\n  if(!isChampionBetOpen()&&!(DB_champion[CUR_GROUP]||{})[ME.username]) return toast('⏰ Deadline dépassée — le pari Champion est fermé !');\n  const myBet = (DB_champion[CUR_GROUP]||{})[ME.username];\n  // Build team list from all qualifying teams (unique)\n  const teams = {};\n  MATCHES.forEach(m=>{\n    if(m.hc&&m.hn){teams[m.hc]={code:m.hc,name:m.hn,flag:m.h||'🏆'};}\n    if(m.ac&&m.an){teams[m.ac]={code:m.ac,name:m.an,flag:m.a||'🏆'};}\n  });\n  const teamList = Object.values(teams).filter(t=>t.name&&!t.name.startsWith('1er')&&!t.name.startsWith('2e')&&!t.name.startsWith('Vainq')&&!t.name.startsWith('Perd')&&!t.name.startsWith('Meilleur')).sort((a,b)=>a.name.localeCompare(b.name));\n  const picker = document.getElementById('champion-team-picker');\n  if(picker){\n    picker.innerHTML = teamList.map(t=>`\n      <div onclick=\"selectChampion('${t.code}')\" id=\"champ_${t.code}\"\n        style=\"display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;border-radius:10px;border:2px solid ${t.code===myBet?'var(--gold)':'var(--bd)'};background:${t.code===myBet?'rgba(108,92,231,0.1)':'var(--s3)'};cursor:${myBet?'not-allowed':'pointer'};min-width:70px;text-align:center\">\n        <span style=\"font-size:24px\">${t.flag}<\u002Fspan>\n        <span style=\"font-size:10px;color:var(--muted2);font-weight:600\">${t.name.length>10?t.name.slice(0,10)+'…':t.name}<\u002Fspan>\n      <\u002Fdiv>`).join('');\n  }\n  if(myBet){\n    document.getElementById('champion-selected').classList.remove('hidden');\n    const team = teams[myBet];\n    document.getElementById('champion-selected-name').textContent = (team?.flag||'🏆')+' '+(team?.name||myBet);\n    document.getElementById('champion-confirm-btn').disabled=true;\n    document.getElementById('champion-confirm-btn').style.opacity='0.4';\n    document.getElementById('champion-confirm-btn').textContent='Déjà joué ✓';\n  }\n  _champSelected = myBet || null;\n  document.getElementById('modal-champion').classList.add('show');\n};\n\nwindow.selectChampion = function(code){\n  const myBet = CUR_GROUP?(DB_champion[CUR_GROUP]||{})[ME?.username]:null;\n  if(myBet) return; // Already bet, can't change\n  _champSelected = code;\n  // Highlight selected\n  document.querySelectorAll('[id^=\"champ_\"]').forEach(el=>{\n    el.style.borderColor='var(--bd)';el.style.background='var(--s3)';\n  });\n  const sel = document.getElementById('champ_'+code);\n  if(sel){sel.style.borderColor='var(--gold)';sel.style.background='rgba(108,92,231,0.1)';}\n  document.getElementById('champion-confirm-btn').disabled=false;\n  document.getElementById('champion-confirm-btn').style.opacity='1';\n};\n\nwindow.confirmChampionBet = async function(){\n  if(!_champSelected||!ME||!CUR_GROUP) return;\n  const myBet = (DB_champion[CUR_GROUP]||{})[ME?.username];\n  if(myBet) return toast('⚠️ Vous avez déjà parié sur le champion !');\n  await set(ref(db,'champion_bets/'+CUR_GROUP+'/'+ME.username),_champSelected);\n  closeModal('modal-champion');\n  updateChampionBetBar();\n  const team = MATCHES.reduce((acc,m)=>{\n    if(m.hc===_champSelected) return m.hn;\n    if(m.ac===_champSelected) return m.an;\n    return acc;\n  },'');\n  toast('🏆 Pari champion enregistré : '+team+' !', 4000);\n};\n\n\n\n// ================================================\n// BRACKET VISUEL\n// ================================================\nfunction renderBracket(){\n  const el = document.getElementById('bracket-content');\n  if(!el) return;\n  const R = resolveKnockoutTeams(DB_results);\n  const bets = CUR_GROUP?(DB_bets[CUR_GROUP]||{})[ME?.username]||{}:{};\n  const champBet = CUR_GROUP?(DB_champion[CUR_GROUP]||{})[ME?.username]:null;\n\n  function matchCard(mid){\n    const m=MATCHES.find(x=>x.id===mid);if(!m) return '';\n    const em=enrichMatch(m,R);\n    const result=DB_results[mid];\n    const bet=bets[mid];\n    const hScore=result?.home, aScore=result?.away;\n    const hasResult=result&&hScore!==undefined&&!result.live;\n    const isLive=result?.live;\n    const hWin=hasResult&&+hScore>+aScore;\n    const aWin=hasResult&&+aScore>+hScore;\n    const pts=bet?calcPts(bet,result,mid):null;\n    const isFinal=mid==='final';\n    return `<div class=\"bm${hasResult?' has-result':''}${isLive?' is-live':''}${isFinal?' is-final':''}\">\n      ${isLive?'<div class=\"bm-live\">LIVE<\u002Fdiv>':''}\n      <div class=\"bm-team${hWin?' w':''}\">\n        <span class=\"bm-flag\">${em.h||'🏆'}<\u002Fspan>\n        <span class=\"bm-name\">${escHtml(em.hn)}<\u002Fspan>\n        <span class=\"bm-score\">${hScore!==undefined?hScore:''}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"bm-team${aWin?' w':''}\">\n        <span class=\"bm-flag\">${em.a||'🏆'}<\u002Fspan>\n        <span class=\"bm-name\">${escHtml(em.an)}<\u002Fspan>\n        <span class=\"bm-score\">${aScore!==undefined?aScore:''}<\u002Fspan>\n      <\u002Fdiv>\n      ${bet&&bet.home!==undefined?`<div class=\"bm-bet\">${bet.home}-${bet.away}${bet.double?' 🔥':''}${pts!==null&&pts>0?' +'+pts:''}${pts===0?' 0pt':''}<\u002Fdiv>`:''}\n    <\u002Fdiv>`;\n  }\n\n  // Champion banner\n  let html='';\n  if(champBet){\n    const team=MATCHES.reduce((acc,m)=>{if(m.hc===champBet)return{name:m.hn,flag:m.h};if(m.ac===champBet)return{name:m.an,flag:m.a};return acc;},{name:champBet,flag:'🏆'});\n    html+=`<div class=\"bracket-champion\"><div style=\"font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px\">MON PARI CHAMPION<\u002Fdiv><div style=\"font-size:32px\">${team.flag||'🏆'}<\u002Fdiv><div style=\"font-size:16px;font-weight:700;color:var(--gold)\">${escHtml(team.name)}<\u002Fdiv><div style=\"font-size:11px;color:var(--green);margin-top:2px\">+100 pts si vainqueur<\u002Fdiv><\u002Fdiv>`;\n  } else if(ME&&!ME.isAdmin) {\n    html+=`<div class=\"bracket-champion\" style=\"cursor:pointer\" onclick=\"showChampionBet()\"><div style=\"font-size:28px\">🏆<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:var(--gold)\">Parier sur le Champion<\u002Fdiv><div style=\"font-size:11px;color:var(--muted);margin-top:2px\">+100 pts · Cliquez pour choisir<\u002Fdiv><\u002Fdiv>`;\n  }\n\n  // Tab selector: Upper / Lower bracket\n  html+=`<div class=\"bracket-tabs\">\n    <button class=\"bracket-tab${_bracketHalf!=='lower'?' active':''}\" onclick=\"setBracketHalf('upper')\">🔼 Bracket Haut<\u002Fbutton>\n    <button class=\"bracket-tab${_bracketHalf==='lower'?' active':''}\" onclick=\"setBracketHalf('lower')\">🔽 Bracket Bas<\u002Fbutton>\n  <\u002Fdiv>`;\n\n  // Upper half: r32_1-8 → r16_1-4 → qf1-2 → sf1\n  // Lower half: r32_9-16 → r16_5-8 → qf3-4 → sf2\n  const upper = {\n    r32:['r32_2','r32_5','r32_1','r32_3','r32_4','r32_6','r32_7','r32_8'],\n    r16:['r16_1','r16_2','r16_3','r16_4'],\n    qf:['qf1','qf2'],\n    sf:['sf1']\n  };\n  const lower = {\n    r32:['r32_11','r32_12','r32_9','r32_10','r32_14','r32_16','r32_13','r32_15'],\n    r16:['r16_5','r16_6','r16_7','r16_8'],\n    qf:['qf3','qf4'],\n    sf:['sf2']\n  };\n  const half = _bracketHalf==='lower' ? lower : upper;\n  const sfLabel = _bracketHalf==='lower' ? 'Demi 2' : 'Demi 1';\n\n  html+=`<div class=\"bracket-tree\">\n    <div class=\"bracket-round\">\n      <div class=\"bracket-round-title\">16es <span class=\"bracket-round-mult\">×2<\u002Fspan><\u002Fdiv>\n      ${half.r32.map(id=>matchCard(id)).join('')}\n    <\u002Fdiv>\n    <div class=\"bracket-round\">\n      <div class=\"bracket-round-title\">8es <span class=\"bracket-round-mult\">×2<\u002Fspan><\u002Fdiv>\n      ${half.r16.map(id=>matchCard(id)).join('')}\n    <\u002Fdiv>\n    <div class=\"bracket-round\">\n      <div class=\"bracket-round-title\">Quarts <span class=\"bracket-round-mult\">×3<\u002Fspan><\u002Fdiv>\n      ${half.qf.map(id=>matchCard(id)).join('')}\n    <\u002Fdiv>\n    <div class=\"bracket-round\">\n      <div class=\"bracket-round-title\">${sfLabel} <span class=\"bracket-round-mult\">×3<\u002Fspan><\u002Fdiv>\n      ${half.sf.map(id=>matchCard(id)).join('')}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n\n  // Final + 3rd place (always visible)\n  html+=`<div style=\"margin-top:16px\">\n    <div style=\"font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);text-align:center;margin-bottom:8px\">🏆 FINALE <span style=\"font-size:12px;color:var(--muted);font-family:Inter,sans-serif\">×4<\u002Fspan><\u002Fdiv>\n    <div style=\"max-width:280px;margin:0 auto\">${matchCard('final')}<\u002Fdiv>\n  <\u002Fdiv>`;\n  html+=`<div class=\"bracket-3rd\">\n    <div style=\"font-size:11px;color:var(--muted);text-align:center;margin-bottom:6px;letter-spacing:1px\">🥉 3E PLACE <span style=\"color:var(--gold)\">×3<\u002Fspan><\u002Fdiv>\n    <div style=\"max-width:280px;margin:0 auto\">${matchCard('p3rd')}<\u002Fdiv>\n  <\u002Fdiv>`;\n\n  // All players' champion picks\n  if(CUR_GROUP){\n    const champPicks = DB_champion[CUR_GROUP]||{};\n    const members = DB_members[CUR_GROUP]||[];\n    const picks = members.map(u=>{\n      const code=champPicks[u];\n      if(!code) return null;\n      const t=teamFromCode(code);\n      const emoji=DB_users[u]?.emoji||'🏳️';\n      return {u,emoji,flag:t.flag,name:t.name,code};\n    }).filter(Boolean);\n    if(picks.length>0){\n      // Group by team\n      const byTeam={};\n      picks.forEach(p=>{ if(!byTeam[p.code]) byTeam[p.code]={flag:p.flag,name:p.name,players:[]}; byTeam[p.code].players.push(p); });\n      const teamList=Object.values(byTeam).sort((a,b)=>b.players.length-a.players.length);\n      html+=`<div style=\"margin-top:20px;padding:16px;background:var(--card);border-radius:14px;border:1px solid var(--bd)\">\n        <div style=\"font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold);text-align:center;margin-bottom:10px\">🏆 PARIS CHAMPION DU GROUPE<\u002Fdiv>\n        ${teamList.map(t=>`<div style=\"display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)\">\n          <span style=\"font-size:20px\">${t.flag}<\u002Fspan>\n          <span style=\"font-weight:600;min-width:90px;font-size:13px\">${escHtml(t.name)}<\u002Fspan>\n          <span style=\"font-size:13px;color:var(--muted)\">${t.players.map(p=>p.emoji+' '+escHtml(p.u)).join(', ')}<\u002Fspan>\n        <\u002Fdiv>`).join('')}\n        <div style=\"font-size:10px;color:var(--muted);text-align:center;margin-top:8px\">+100 pts si votre équipe remporte le trophée<\u002Fdiv>\n      <\u002Fdiv>`;\n    }\n  }\n\n  el.innerHTML=html;\n  parseEmoji(el);\n}\nlet _bracketHalf='upper';\nwindow.setBracketHalf=function(h){_bracketHalf=h;renderBracket();};\n\n\n\n// ================================================\n// RÉCAP PHASE DE GROUPES\n// ================================================\nfunction renderGroupPhaseRecap(){\n  const el = document.getElementById('group-recap');\n  if(!el||!CUR_GROUP) return;\n  const members=(DB_members[CUR_GROUP]||[]).filter(u=>u!=='admin');\n  if(members.length===0){el.classList.add('hidden');return;}\n  // Check if group phase is over (all group matches have results)\n  const groupMatches=MATCHES.filter(m=>'ABCDEFGHIJKL'.includes(m.gr));\n  const playedGroup=groupMatches.filter(m=>DB_results[m.id]&&!DB_results[m.id].live).length;\n  const totalGroup=groupMatches.length; // 72\n  if(playedGroup===0){el.classList.add('hidden');return;}\n  el.classList.remove('hidden');\n  const bets=DB_bets[CUR_GROUP]||{};\n  // Stats per player during group phase only\n  const stats=members.map(u=>{\n    let pts=0,exact=0,betCount=0;\n    groupMatches.forEach(m=>{\n      const bet=(bets[u]||{})[m.id];\n      const result=DB_results[m.id];\n      if(bet&&bet.home!==undefined) betCount++;\n      if(result&&result.home!==undefined){\n        const p=calcPts(bet,result,m.id);\n        if(p!==null){pts+=p;if(bet&&+bet.home===+result.home&&+bet.away===+result.away)exact++;}\n      }\n    });\n    return {u,emoji:DB_users[u]?.emoji||'🏳️',pts,exact,betCount};\n  }).sort((a,b)=>b.pts-a.pts);\n  const leader=stats[0];\n  const bestExact=stats.reduce((a,b)=>b.exact>a.exact?b:a,stats[0]);\n  const mostBets=stats.reduce((a,b)=>b.betCount>a.betCount?b:a,stats[0]);\n  el.innerHTML=`\n    <div style=\"font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px\">\n      📊 Phase de groupes · ${playedGroup}/${totalGroup} matchs joués\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n      <div style=\"flex:1;min-width:120px;background:var(--s1);border-radius:10px;padding:10px;text-align:center\">\n        <div style=\"font-size:18px\">${leader?.emoji}<\u002Fdiv>\n        <div style=\"font-size:11px;font-weight:700;color:var(--gold)\">${escHtml(leader?.u||'')}<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--muted)\">🏆 Leader · ${leader?.pts}pts<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:120px;background:var(--s1);border-radius:10px;padding:10px;text-align:center\">\n        <div style=\"font-size:18px\">${bestExact?.emoji}<\u002Fdiv>\n        <div style=\"font-size:11px;font-weight:700;color:var(--gold)\">${escHtml(bestExact?.u||'')}<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--muted)\">🎯 Exacts · ${bestExact?.exact}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:120px;background:var(--s1);border-radius:10px;padding:10px;text-align:center\">\n        <div style=\"font-size:18px\">${mostBets?.emoji}<\u002Fdiv>\n        <div style=\"font-size:11px;font-weight:700;color:var(--gold)\">${escHtml(mostBets?.u||'')}<\u002Fdiv>\n        <div style=\"font-size:10px;color:var(--muted)\">📝 Paris · ${mostBets?.betCount}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\n\n// Clean up stuck LIVE matches (match date > 4h ago but still marked live)\nasync function cleanupStuckLive(){\n  const now=Date.now();\n  for(const mid of Object.keys(DB_results)){\n    const r=DB_results[mid];\n    if(!r||!r.live) continue;\n    const m=MATCHES.find(x=>x.id===mid);if(!m) continue;\n    const matchTime=getMatchDate(m).getTime();\n    // If match started more than 4 hours ago and still \"live\", mark as final\n    if(now-matchTime > 4*3600000){\n      await update(ref(db,'results/'+mid),{live:null});\n    }\n  }\n}\n\n// ================================================\n// CHAT NOTIFICATIONS (badge + toast)\n// ================================================\nfunction getLastChatRead(gid){\n  return parseInt(localStorage.getItem('wc2026_chat_read_'+gid)||'0');\n}\nfunction setLastChatRead(gid){\n  localStorage.setItem('wc2026_chat_read_'+gid, Date.now().toString());\n}\nfunction updateChatBadge(){\n  if(!ME||ME.isAdmin) return;\n  const navBtn = document.getElementById('bnav-chat');\n  if(!navBtn) return;\n  // Remove existing badge\n  const old = navBtn.querySelector('.bnav-badge');\n  if(old) old.remove();\n  // Count unread messages across all groups\n  let totalUnread = 0;\n  Object.keys(DB_groupMeta).forEach(gid=>{\n    const lastRead = getLastChatRead(gid);\n    const chatRef = DB_chatCache[gid];\n    if(chatRef){\n      chatRef.forEach(msg=>{\n        if(msg.ts > lastRead && msg.user !== ME.username) totalUnread++;\n      });\n    }\n  });\n  if(totalUnread > 0){\n    const badge = document.createElement('span');\n    badge.className = 'bnav-badge';\n    badge.textContent = totalUnread > 99 ? '99+' : totalUnread;\n    navBtn.appendChild(badge);\n  }\n}\nlet DB_chatCache = {}; // Cache chat messages for badge counting\n\nfunction subscribeChatForBadge(gid){\n  const chatRef = ref(db,'chat/'+gid);\n  onValue(chatRef, snap=>{\n    const msgs = [];\n    snap.forEach(child=>{ msgs.push({id:child.key,...child.val()}); });\n    DB_chatCache[gid] = msgs;\n    updateChatBadge();\n  });\n}\nfunction showUnreadToast(){\n  if(!ME||ME.isAdmin) return;\n  let totalUnread = 0;\n  Object.keys(DB_groupMeta).forEach(gid=>{\n    const lastRead = getLastChatRead(gid);\n    const msgs = DB_chatCache[gid]||[];\n    msgs.forEach(msg=>{\n      if(msg.ts > lastRead && msg.user !== ME.username) totalUnread++;\n    });\n  });\n  if(totalUnread > 0){\n    toast('💬 '+totalUnread+' nouveau'+(totalUnread>1?'x':'')+' message'+(totalUnread>1?'s':'')+' !', 4000);\n  }\n}\n\n\n// ================================================\n// DÉTECTION DE PHASE ACTIVE (pour l'UI)\n// ================================================\nfunction getCurrentPhase(){\n  // Returns the current tournament phase based on results/schedule\n  const now = new Date();\n  // Check if group phase is done (all group matches finished)\n  const groupMatches = MATCHES.filter(m=>'ABCDEFGHIJKL'.includes(m.gr));\n  const groupDone = groupMatches.every(m=>DB_results[m.id]&&!DB_results[m.id].live);\n  if(!groupDone) return {phase:'GROUPS', label:'Phase de groupes', icon:'⚽', mult:1};\n  // Find the earliest knockout phase that still has unfinished matches\n  const phases = [\n    {gr:'R32', label:'16es de finale', icon:'⚔️', mult:2},\n    {gr:'R16', label:'8es de finale', icon:'⚔️', mult:2},\n    {gr:'QF', label:'Quarts de finale', icon:'🔥', mult:3},\n    {gr:'SF', label:'Demi-finales', icon:'🔥', mult:3},\n    {gr:'FIN', label:'FINALE', icon:'🏆', mult:4},\n  ];\n  for(const p of phases){\n    const matches = MATCHES.filter(m=>m.gr===p.gr);\n    const anyUnfinished = matches.some(m=>!DB_results[m.id]||DB_results[m.id].live);\n    if(anyUnfinished) return {phase:p.gr, label:p.label, icon:p.icon, mult:p.mult};\n  }\n  return {phase:'DONE', label:'Tournoi terminé', icon:'🏆', mult:1};\n}\nfunction teamsRemaining(){\n  // Count teams still in the tournament\n  const phase = getCurrentPhase().phase;\n  const counts = {GROUPS:48, R32:32, R16:16, QF:8, SF:4, FIN:2, DONE:1};\n  return counts[phase]||48;\n}\nfunction isKnockoutPhase(){\n  return getCurrentPhase().phase !== 'GROUPS';\n}\n\n\n// ================================================\n// RENDU UI PHASE FINALE\n// ================================================\nfunction renderPhaseBanner(){\n  const el = document.getElementById('phase-banner-container');\n  if(!el) return;\n  const ph = getCurrentPhase();\n  // Only show banner during knockout phases\n  if(ph.phase==='GROUPS'||ph.phase==='DONE'){ el.innerHTML=''; return; }\n  const teams = teamsRemaining();\n  el.innerHTML = `<div class=\"phase-banner\">\n    <div class=\"phase-banner-content\">\n      <div>\n        <div class=\"phase-banner-title\">${ph.icon} ${ph.label.toUpperCase()}<\u002Fdiv>\n        <div class=\"phase-banner-sub\">Chaque point compte double... ou plus !<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"phase-banner-teams\">\n        <div class=\"phase-banner-teams-num\">${teams}<\u002Fdiv>\n        <div class=\"phase-banner-teams-lbl\">équipes<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"phase-banner-mult\">×${ph.mult} pts<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction renderNextClash(){\n  const el = document.getElementById('next-clash-container');\n  if(!el) return;\n  const now = new Date();\n  // Find next upcoming match (any phase, teams known)\n  const upcoming = MATCHES\n    .filter(m=>teamsKnown(m))\n    .filter(m=>!DB_results[m.id]||DB_results[m.id].live)\n    .map(m=>({m, date:getMatchDate(m)}))\n    .filter(x=>x.date>now)\n    .sort((a,b)=>a.date-b.date);\n  if(upcoming.length===0){ el.innerHTML=''; return; }\n  const next = upcoming[0];\n  const R = resolveKnockoutTeams(DB_results);\n  const em = enrichMatch(next.m, R);\n  const diff = next.date - now;\n  const days = Math.floor(diff/86400000);\n  const hours = Math.floor((diff%86400000)/3600000);\n  const mins = Math.floor((diff%3600000)/60000);\n  let countdown;\n  if(days>0) countdown = days+'j '+hours+'h';\n  else if(hours>0) countdown = hours+'h '+mins+'min';\n  else countdown = mins+'min';\n  // Don't show team names if they're still placeholders\n  const ready = em.hn && !em.hn.startsWith('1er') && !em.hn.startsWith('2e') && !em.hn.startsWith('Vainq') && !em.hn.startsWith('Meilleur');\n  const teamsLabel = ready ? `${em.h||''} ${em.hn} vs ${em.an} ${em.a||''}` : 'Prochain choc';\n  el.innerHTML = `<div class=\"next-clash\">\n    <span class=\"next-clash-icon\">⚡<\u002Fspan>\n    <div class=\"next-clash-info\">\n      <div class=\"next-clash-label\">Prochain choc · ${STAGE_LABELS[next.m.gr]||next.m.gr}<\u002Fdiv>\n      <div class=\"next-clash-teams\">${teamsLabel}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"next-clash-time\">${countdown}<\u002Fdiv>\n  <\u002Fdiv>`;\n  parseEmoji(el);\n}\n\n\n// Vérifie si les 2 équipes d'un match sont connues (pas des placeholders)\nfunction teamsKnown(m){\n  // Group matches always have known teams\n  if('ABCDEFGHIJKL'.includes(m.gr)) return true;\n  // Knockout: check enriched names aren't placeholders\n  const R = resolveKnockoutTeams(DB_results);\n  const em = enrichMatch(m, R);\n  const isPlaceholder = (name)=> !name || name.startsWith('1er') || name.startsWith('2e') ||\n    name.startsWith('Vainq') || name.startsWith('Perd') || name.startsWith('Meilleur') ||\n    name.includes('r32_') || name.includes('r16_') || name.includes('qf') || name.includes('sf') ||\n    /^[A-L][12]$/.test(name) || name==='3rd?';\n  return !isPlaceholder(em.hn) && !isPlaceholder(em.an);\n}\n\n\n// ================================================\n// L'AFFICHE — Hero cinématique pour SF/3PL/FIN\n// ================================================\nfunction renderShowdownHero(){\n  const el = document.getElementById('phase-banner-container');\n  if(!el) return false;\n  const ph = getCurrentPhase();\n  // Only for the last stretch of the tournament\n  if(!['SF','FIN'].includes(ph.phase)) return false;\n  // Find the next SF/3PL/FIN match (upcoming or live)\n  const now = new Date();\n  const finalMatches = MATCHES\n    .filter(m=>['SF','3PL','FIN'].includes(m.gr))\n    .map(m=>({m, date:getMatchDate(m), r:DB_results[m.id]}))\n    .filter(x=>(!x.r || x.r.live) && teamsKnown(x.m))\n    .sort((a,b)=>a.date-b.date);\n  if(finalMatches.length===0) return false;\n  const next = finalMatches[0];\n  const R = resolveKnockoutTeams(DB_results);\n  const em = enrichMatch(next.m, R);\n  const isFinale = next.m.gr==='FIN';\n  const is3rd = next.m.gr==='3PL';\n  const isLive = next.r?.live;\n  const mult = knockoutMultiplier(next.m.id);\n  const label = isFinale ? 'LA FINALE' : is3rd ? 'PETITE FINALE' : 'DEMI-FINALE';\n  // Countdown — with seconds under 1h, imminent mode under 10min\n  const diff = next.date - now;\n  const under1h = !isLive && diff>0 && diff<3600000;\n  const imminent = !isLive && diff>0 && diff<=600000;\n  window._showdownFast = under1h; // enables 1s refresh\n  let countdown='';\n  if(isLive){ countdown='EN DIRECT'; }\n  else if(diff>0){\n    const d=Math.floor(diff/86400000), hh=Math.floor((diff%86400000)/3600000), mm=Math.floor((diff%3600000)/60000), ss=Math.floor((diff%60000)/1000);\n    if(d>0) countdown = d+'J '+hh+'H';\n    else if(hh>0) countdown = hh+'H '+mm+'MIN';\n    else if(under1h) countdown = String(mm).padStart(2,'0')+':<span class=\"showdown-seconds\">'+String(ss).padStart(2,'0')+'<\u002Fspan>';\n    else countdown = mm+' MIN';\n  }\n  // Live score flash detection\n  const scoreKey = isLive ? (next.r.home+'-'+next.r.away) : '';\n  const scoreChanged = isLive && window._lastLiveScore && window._lastLiveScore!==scoreKey;\n  if(isLive) window._lastLiveScore = scoreKey;\n  // My bet as ticket stub\n  const myBet = CUR_GROUP ? ((DB_bets[CUR_GROUP]||{})[ME?.username]||{})[next.m.id] : null;\n  const hasBet = myBet && myBet.home!==undefined;\n  el.innerHTML = `<div class=\"showdown${isFinale?' finale':''}${imminent?' imminent':''}\">\n    <div class=\"showdown-split\"><\u002Fdiv>\n    ${isFinale?'<canvas class=\"showdown-particles\" id=\"showdown-particles\"><\u002Fcanvas>':''}\n    <div class=\"showdown-sweep\"><\u002Fdiv>\n    ${isLive?'<div class=\"showdown-live\">● LIVE<\u002Fdiv>':''}\n    <div class=\"showdown-inner\">\n      <div class=\"showdown-ribbon\">\n        ${isFinale?'<span class=\"showdown-trophy\">🏆<\u002Fspan>':''}\n        <span class=\"showdown-ribbon-label\">${label} · ×${mult} PTS<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"showdown-teams\">\n        <div class=\"showdown-team\">\n          <span class=\"showdown-flag\">${em.h||'🏆'}<\u002Fspan>\n          <div class=\"showdown-name\">${escHtml(em.hn)}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"showdown-vs\"><span class=\"showdown-vs-txt\">VS<\u002Fspan><\u002Fdiv>\n        <div class=\"showdown-team\">\n          <span class=\"showdown-flag\">${em.a||'🏆'}<\u002Fspan>\n          <div class=\"showdown-name\">${escHtml(em.an)}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"showdown-count\">\n        ${isLive\n          ?`<div class=\"showdown-livescore${scoreChanged?' flash':''}\">${next.r.home} – ${next.r.away}<\u002Fdiv><div class=\"showdown-livelbl\">● EN DIRECT<\u002Fdiv>`\n          :`<div class=\"showdown-count-time${under1h?' xxl':''}\">${countdown}<\u002Fdiv>\n             <div class=\"showdown-count-lbl\">${imminent?'⚡ COUP D\\'ENVOI IMMINENT ⚡':fmtLocalDate(next.m)+' · '+fmtLocalTime(next.m)+' · '+(next.m.ve||'')}<\u002Fdiv>`}\n      <\u002Fdiv>\n      ${hasBet?`<div class=\"showdown-ticket\"><div class=\"showdown-ticket-stub\">\n        <span class=\"tk-lbl\">Mon prono<\u002Fspan>\n        <span class=\"tk-score\">${myBet.home} – ${myBet.away}<\u002Fspan>\n        ${myBet.double?'<span style=\"font-size:14px\">🔥<\u002Fspan>':''}\n      <\u002Fdiv><\u002Fdiv>`:''}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n  parseEmoji(el);\n  if(isFinale) startShowdownParticles();\n  if(scoreChanged && navigator.vibrate) navigator.vibrate([80,40,80]);\n  return true;\n}\n\n// Gold particles for the finale hero (lightweight canvas, respects reduced-motion)\nlet _particlesRAF=null;\nfunction startShowdownParticles(){\n  const cv=document.getElementById('showdown-particles');\n  if(!cv) return;\n  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n  if(_particlesRAF) cancelAnimationFrame(_particlesRAF);\n  const box=cv.parentElement.getBoundingClientRect();\n  cv.width=box.width; cv.height=box.height;\n  const ctx=cv.getContext('2d');\n  const N=25;\n  const parts=Array.from({length:N},()=>({\n    x:Math.random()*cv.width, y:Math.random()*cv.height,\n    r:Math.random()*1.8+0.6, s:Math.random()*0.35+0.1,\n    o:Math.random()*0.5+0.15, drift:(Math.random()-0.5)*0.25\n  }));\n  function tick(){\n    if(!document.getElementById('showdown-particles')){_particlesRAF=null;return;}\n    ctx.clearRect(0,0,cv.width,cv.height);\n    parts.forEach(p=>{\n      p.y-=p.s; p.x+=p.drift;\n      if(p.y<-4){p.y=cv.height+4;p.x=Math.random()*cv.width;}\n      if(p.x<-4)p.x=cv.width+4; if(p.x>cv.width+4)p.x=-4;\n      ctx.beginPath();\n      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);\n      ctx.fillStyle='rgba(108,92,231,'+p.o+')';\n      ctx.fill();\n    });\n    _particlesRAF=requestAnimationFrame(tick);\n  }\n  tick();\n}\n\n\n// Récupère drapeau + nom d'une équipe à partir de son code\nfunction teamFromCode(code){\n  if(!code) return null;\n  for(const m of MATCHES){\n    if(m.hc===code) return {flag:m.h||'🏆', name:m.hn||code};\n    if(m.ac===code) return {flag:m.a||'🏆', name:m.an||code};\n  }\n  return {flag:'🏆', name:code};\n}\n\n\nfunction renderAll(){renderMatches();renderLeaderboard();renderStats();renderGlobalLeaderboard();updateNextMatchCounter();updateBadges();renderHallOfFame();maybeShowSacre();setTimeout(()=>parseEmoji(),100);}\n\n// ================================================\n// LE SACRE — cérémonie de fin de tournoi\n// ================================================\nfunction maybeShowSacre(){\n  if(!ME||ME.isAdmin||!CUR_GROUP) return;\n  if(getCurrentPhase().phase!=='DONE') return;\n  if(localStorage.getItem('wc2026_sacre_seen_'+CUR_GROUP)) return;\n  showSacre();\n}\nwindow.showSacre=function(){\n  if(!CUR_GROUP||!ME) return;\n  const members=(DB_members[CUR_GROUP]||[]).filter(u=>u!=='admin');\n  if(members.length===0) return;\n  const sorted=members.map(u=>({u,emoji:DB_users[u]?.emoji||'🏳️',...getScore(u)})).sort((a,b)=>b.total-a.total||b.exact-a.exact);\n  const winner=sorted[0];\n  const myRank=sorted.findIndex(p=>p.u===ME.username)+1;\n  const me=sorted.find(p=>p.u===ME.username);\n  // ===== Wrapped stats =====\n  const myBets=(DB_bets[CUR_GROUP]||{})[ME.username]||{};\n  const R=resolveKnockoutTeams(DB_results);\n  let bestBet=null,worstBet=null;\n  const phasePts={};\n  const PH_LBL={GROUPS:'Phase de groupes',R32:'16es',R16:'8es',QF:'Quarts',SF:'Demi-finales','3PL':'3e place',FIN:'Finale'};\n  MATCHES.forEach(m=>{\n    const r=DB_results[m.id];\n    if(!r||r.live||r.home===undefined) return;\n    const b=myBets[m.id];\n    const pts=calcPts(b,r,m.id);\n    if(pts===null) return;\n    const phKey='ABCDEFGHIJKL'.includes(m.gr)?'GROUPS':m.gr;\n    phasePts[phKey]=(phasePts[phKey]||0)+pts;\n    const emx=enrichMatch(m,R);\n    const entry={pts,label:emx.hn+' '+r.home+'–'+r.away+' '+emx.an,bet:b.home+'–'+b.away,dbl:b.double};\n    if(!bestBet||pts>bestBet.pts) bestBet=entry;\n    if(pts===0&&(!worstBet||b.double)) worstBet=entry;\n  });\n  const bestPhase=Object.entries(phasePts).sort((a,b)=>b[1]-a[1])[0];\n  const exactRate=me&&me.bets>0?Math.round(me.exact/me.bets*100):0;\n  const rankIcon=myRank===1?'🥇':myRank===2?'🥈':myRank===3?'🥉':'#'+myRank;\n  // Champion du monde (équipe)\n  const champCode=DB_champion['_winner'];\n  const champTeam=champCode?teamFromCode(champCode):null;\n  const myChampPick=(DB_champion[CUR_GROUP]||{})[ME.username];\n  const champHit=champCode&&myChampPick===champCode;\n\n  const cards=[];\n  cards.push(`<div class=\"sacre-card\"><div class=\"sacre-card-icon\">${rankIcon.length<=2?rankIcon:'🎖'}<\u002Fdiv><div class=\"sacre-card-label\">Votre rang final<\u002Fdiv><div class=\"sacre-card-value\">${myRank===1?'CHAMPION !':rankIcon+' / '+sorted.length}<\u002Fdiv><div class=\"sacre-card-detail\">${me?me.total+' points au total':''}${myRank===1?' · Le trône est à vous 👑':''}<\u002Fdiv><\u002Fdiv>`);\n  if(bestBet) cards.push(`<div class=\"sacre-card\"><div class=\"sacre-card-icon\">🎯<\u002Fdiv><div class=\"sacre-card-label\">Votre coup de maître<\u002Fdiv><div class=\"sacre-card-value\">+${bestBet.pts} pts<\u002Fdiv><div class=\"sacre-card-detail\">${escHtml(bestBet.label)}<br>Votre prono : ${bestBet.bet}${bestBet.dbl?' 🔥×2':''}<\u002Fdiv><\u002Fdiv>`);\n  if(worstBet) cards.push(`<div class=\"sacre-card\"><div class=\"sacre-card-icon\">💀<\u002Fdiv><div class=\"sacre-card-label\">Le pari maudit<\u002Fdiv><div class=\"sacre-card-value\">0 pt<\u002Fdiv><div class=\"sacre-card-detail\">${escHtml(worstBet.label)}<br>Votre prono : ${worstBet.bet}${worstBet.dbl?' 🔥×2 (aïe)':''}<\u002Fdiv><\u002Fdiv>`);\n  cards.push(`<div class=\"sacre-card\"><div class=\"sacre-card-icon\">🔬<\u002Fdiv><div class=\"sacre-card-label\">Précision chirurgicale<\u002Fdiv><div class=\"sacre-card-value\">${exactRate}%<\u002Fdiv><div class=\"sacre-card-detail\">${me?me.exact+' scores exacts sur '+me.bets+' paris':''}<\u002Fdiv><\u002Fdiv>`);\n  if(bestPhase) cards.push(`<div class=\"sacre-card\"><div class=\"sacre-card-icon\">📈<\u002Fdiv><div class=\"sacre-card-label\">Votre phase en or<\u002Fdiv><div class=\"sacre-card-value\">+${bestPhase[1]} pts<\u002Fdiv><div class=\"sacre-card-detail\">${PH_LBL[bestPhase[0]]||bestPhase[0]}<\u002Fdiv><\u002Fdiv>`);\n  if(champTeam) cards.push(`<div class=\"sacre-card\"><div class=\"sacre-card-icon\">${champTeam.flag}<\u002Fdiv><div class=\"sacre-card-label\">Champion du Monde<\u002Fdiv><div class=\"sacre-card-value\">${escHtml(champTeam.name)}<\u002Fdiv><div class=\"sacre-card-detail\">${champHit?'🎉 Vous l\\'aviez prédit ! +100 pts':myChampPick?'Votre choix : '+escHtml(teamFromCode(myChampPick).name):'Pas de pari champion'}<\u002Fdiv><\u002Fdiv>`);\n\n  document.getElementById('sacre-content').innerHTML=`\n    <div class=\"sacre-winner\">\n      <span class=\"sacre-winner-emoji\">${winner.emoji}<\u002Fspan>\n      <div class=\"sacre-winner-name\">${escHtml(winner.u)}<\u002Fdiv>\n      <div class=\"sacre-winner-pts\">${winner.total} pts · Champion du groupe<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:10px;color:var(--muted);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px\">← Votre rétrospective →<\u002Fdiv>\n    <div class=\"sacre-cards\">${cards.join('')}<\u002Fdiv>`;\n  document.getElementById('sacre-overlay').classList.add('show');\n  parseEmoji(document.getElementById('sacre-overlay'));\n  launchConfetti();\n};\nwindow.closeSacre=function(){\n  document.getElementById('sacre-overlay').classList.remove('show');\n  if(CUR_GROUP) localStorage.setItem('wc2026_sacre_seen_'+CUR_GROUP,'1');\n  if(window._confettiRAF) cancelAnimationFrame(window._confettiRAF);\n  showTab('leaderboard');\n};\nfunction launchConfetti(){\n  const cv=document.getElementById('sacre-confetti');\n  if(!cv) return;\n  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n  cv.width=window.innerWidth; cv.height=window.innerHeight;\n  const ctx=cv.getContext('2d');\n  const colors=['#e8b84b','#f5d580','#ffffff','#00e676','#ff6b6b'];\n  const N=90;\n  const pieces=Array.from({length:N},()=>({\n    x:Math.random()*cv.width, y:-20-Math.random()*cv.height*0.5,\n    w:5+Math.random()*6, h:8+Math.random()*8,\n    vy:2+Math.random()*3.2, vx:(Math.random()-0.5)*1.6,\n    rot:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.2,\n    c:colors[Math.floor(Math.random()*colors.length)]\n  }));\n  const start=Date.now();\n  function tick(){\n    ctx.clearRect(0,0,cv.width,cv.height);\n    let alive=false;\n    pieces.forEach(p=>{\n      p.y+=p.vy; p.x+=p.vx; p.rot+=p.vr;\n      if(p.y<cv.height+30) alive=true;\n      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);\n      ctx.fillStyle=p.c; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);\n      ctx.restore();\n    });\n    if(alive&&Date.now()-start<6000) window._confettiRAF=requestAnimationFrame(tick);\n    else ctx.clearRect(0,0,cv.width,cv.height);\n  }\n  tick();\n}\n\n// ========================================\n// FILTERS\n// ========================================\nconst STAGE_LABELS={A:'GRP A',B:'GRP B',C:'GRP C',D:'GRP D',E:'GRP E',F:'GRP F',G:'GRP G',H:'GRP H',I:'GRP I',J:'GRP J',K:'GRP K',L:'GRP L',R32:'⚔️ 16es de finale',R16:'⚔️ 8es de finale',QF:'⚔️ Quarts',SF:'⚔️ Demi-finales',FIN:'🏆 Finale','3PL':'🥉 3e Place'};\nfunction buildFilters(elId,activeFilter,setFn){\n  const items=['all','today','tomorrow',...'ABCDEFGHIJKL'.split(''),'R32','R16','QF','SF','FIN'];\n  const lbl={all:'Tous',today:\"📅 Aujourd'hui\",tomorrow:'📅 Demain',...Object.fromEntries('ABCDEFGHIJKL'.split('').map(g=>[g,'Gr.'+g])),R32:'16es',R16:'8es',QF:'Quarts',SF:'Demies',FIN:'🏆Finale'};\n  const el=document.getElementById(elId);\n  if(el) el.innerHTML=items.map(i=>`<button class=\"fb${activeFilter===i?' active':''}\" onclick=\"${setFn}('${i}')\">${lbl[i]}<\u002Fbutton>`).join('');\n}\n\n// ========================================\n// MATCHES RENDER\n// ========================================\nfunction renderMatches(){\n  buildFilters('frow',FILTER,'setFilter');\n  const bets=CUR_GROUP?(DB_bets[CUR_GROUP]||{})[ME?.username]||{}:{};\n  const doubles=CUR_GROUP?(DB_doubles[CUR_GROUP]||{})[ME?.username]||{}:{};\n  const R=resolveKnockoutTeams(DB_results);\n  if(ME&&!ME.isAdmin){\n    const curWk=getWeekKey(new Date().toISOString().slice(0,10));\n    const used=doubles[curWk];\n    const showdownShown = renderShowdownHero();\n  if(!showdownShown){ renderPhaseBanner(); renderNextClash(); }\n  else { const nc=document.getElementById('next-clash-container'); if(nc) nc.innerHTML=''; }\n  // Dynamic title based on phase\n  const titleEl = document.getElementById('matches-title');\n  if(titleEl){\n    const ph = getCurrentPhase();\n    if(ph.phase==='GROUPS'||ph.phase==='DONE') titleEl.textContent='🏟 Matches';\n    else titleEl.innerHTML = ph.icon+' '+ph.label;\n  }\n  updateChampionBetBar();\n  const bi=document.getElementById('bonus-info');\n    // Build bonus status: week bonus (groups) + phase quotas (knockout)\n    const myDoubles=(DB_doubles[CUR_GROUP]||{})[ME?.username]||{};\n    let bonusMsg='';\n    // Week bonus for current group phase\n    if(used){const m=MATCHES.find(x=>x.id===used);const em=m?enrichMatch(m,R):null;bonusMsg='🔥 Bonus semaine utilisé'+(em?' sur '+em.hn+' vs '+em.an:'')+'. ';}\n    // Knockout phase quotas\n    const phaseInfo=[];\n    [['R32','16es'],['R16','8es'],['QF','Quarts'],['SFINAL','Demies/Finale']].forEach(([ph,lbl])=>{\n      const quota=KNOCKOUT_BONUS_QUOTA[ph];\n      const usedCount=Object.values(myDoubles).filter(mid=>{const mm=MATCHES.find(x=>x.id===mid);return mm&&getBonusPhase(mm)===ph;}).length;\n      // Only show phases that have started or are relevant\n      const phaseMatches=MATCHES.filter(mm=>getBonusPhase(mm)===ph);\n      const anyOpen=phaseMatches.some(mm=>!isMatchLocked(mm));\n      if(usedCount>0||anyOpen) phaseInfo.push(`${lbl}: ${usedCount}/${quota}`);\n    });\n    if(phaseInfo.length>0) bonusMsg+='⚡ '+phaseInfo.join(' · ');\n    if(bonusMsg){bi.classList.remove('hidden');document.getElementById('bonus-txt').textContent=bonusMsg;}\n    else bi.classList.add('hidden');\n  }\n  // Smart sort: LIVE first, then upcoming (soonest first), then finished (most recent first)\n  const now = new Date();\n  const allSorted=[...MATCHES].sort((a,b)=>{\n    const da=getMatchDate(a), db=getMatchDate(b);\n    const ra=DB_results[a.id], rb=DB_results[b.id];\n    const aLive=ra?.live, bLive=rb?.live;\n    const aFin=ra&&!ra.live&&ra.home!==undefined, bFin=rb&&!rb.live&&rb.home!==undefined;\n    const aUp=!ra, bUp=!rb;\n    // LIVE matches → absolute top\n    if(aLive&&!bLive) return -1;\n    if(!aLive&&bLive) return 1;\n    // Both upcoming → soonest first\n    if(aUp&&bUp) return da-db;\n    // Both finished → most recent first (reverse)\n    if(aFin&&bFin) return db-da;\n    // Upcoming before finished\n    if(aUp&&bFin) return -1;\n    if(aFin&&bUp) return 1;\n    return da-db;\n  });\n  let matches;\n  if(FILTER==='all') matches=allSorted;\n  else if(FILTER==='today'||FILTER==='tomorrow'){\n    // Compare in user's LOCAL date (YYYY-MM-DD format)\n    const target=new Date();\n    if(FILTER==='tomorrow') target.setDate(target.getDate()+1);\n    const targetLocal=target.toLocaleDateString('en-CA'); // 'YYYY-MM-DD' in local TZ\n    matches=allSorted.filter(m=>{\n      const md=getMatchDate(m);\n      return md.toLocaleDateString('en-CA')===targetLocal;\n    });\n  } else if(FILTER==='FIN') matches=allSorted.filter(m=>m.gr==='FIN'||m.gr==='3PL');\n  else matches=allSorted.filter(m=>m.gr===FILTER);\n  // Cacher les matchs éliminatoires dont les équipes ne sont pas encore connues\n  // MAIS toujours montrer les matchs du bouquet final (SF/3PL/FIN) même avec placeholders\n  const explicitPhaseFilter = ['R32','R16','QF','SF','FIN','3PL'].includes(FILTER);\n  if(!explicitPhaseFilter){\n    matches = matches.filter(m=>teamsKnown(m) || ['SF','3PL','FIN'].includes(m.gr));\n  }\n  // Card builder (shared by active list and phase accordions)\n  function buildMatchCard(m){\n    const em=enrichMatch(m,R);\n    const myBet=bets[m.id],result=DB_results[m.id];\n    const isDouble=myBet?.double,hasBet=myBet&&myBet.home!==undefined&&myBet.away!==undefined;\n    const pts=result?calcPts(myBet,result,m.id):null;\n    const wk=getWeekKey(m.dt);\n    const weekUsed=doubles[wk];\n    const canDouble=canUseBonus(m);\n    const isLive=result?.live;\n    const locked=isMatchLocked(m);\n    let dbl='';\n    if(ME&&!ME.isAdmin&&CUR_GROUP&&!result&&!locked){\n      if(isDouble) dbl=`<span class=\"tag td on\" onclick=\"toggleDouble('${m.id}','${wk}',true)\">🔥×2 ON<\u002Fspan>`;\n      else if(canDouble) dbl=`<span class=\"tag td\" onclick=\"toggleDouble('${m.id}','${wk}',false)\">⚡×2<\u002Fspan>`;\n      else dbl=`<span class=\"tag td lock\">🔒×2<\u002Fspan>`;\n    }\n    const isKO=['R32','R16','QF','SF','3PL','FIN'].includes(m.gr);\n    const isFinalStage=['SF','FIN','3PL'].includes(m.gr);\n    return `<div class=\"mc${isKO?' knockout':''}${isFinalStage?' final-stage':''}\">\n      <div class=\"mh\">\n        <span class=\"tag tg\">${STAGE_LABELS[m.gr]||m.gr}<\u002Fspan>\n        <span style=\"font-size:10px\">📍${em.ve||''} · ${fmtLocalTime(m)}<\u002Fspan>\n        ${dbl}\n        ${result&&!isLive?'<span class=\"tag tres\">✅ Officiel<\u002Fspan>':''}\n        ${isLive?'<span class=\"tag tlive\">🔴 LIVE<\u002Fspan>':''}\n        ${!result&&locked?'<span class=\"tag\" style=\"background:rgba(90,100,128,.15);color:var(--muted)\">🔒 Lancé<\u002Fspan>':''}\n        ${result?`<span style=\"cursor:pointer;font-size:10px;color:var(--muted2);text-decoration:underline\" onclick=\"showDetail('${m.id}')\">→ Paris<\u002Fspan>`:''}\n        ${ME&&!ME.isAdmin?`<span style=\"cursor:pointer;font-size:10px;color:var(--muted2)\" onclick=\"commentOnMatch('${m.id}')\">💬<\u002Fspan>`:''}\n      <\u002Fdiv>\n      <div class=\"mb\">\n        <div class=\"team\"><div class=\"fl\">${em.h||'🏆'}<\u002Fdiv><div class=\"tn\">${em.hn}<\u002Fdiv><div class=\"tc2\">${em.hc||''}<\u002Fdiv><\u002Fdiv>\n        <div class=\"vscol\">\n          <div class=\"vstxt\">VS<\u002Fdiv>\n          ${result?(isLive?`<div class=\"slim\">${result.home} – ${result.away}<\u002Fdiv>`:`<div class=\"sfinal\">${result.home} – ${result.away}<\u002Fdiv>`):`<div class=\"mtime\">${fmtLocalTime(m)}<\u002Fdiv>`}\n          ${pts!==null?`<div class=\"ptsbadge\" style=\"color:${pts>0?'var(--green)':'var(--muted)'}\">${pts>0?'+'+pts+' pts':'0 pt'}${isLive?' (en cours)':''}<\u002Fdiv>`:''}\n        <\u002Fdiv>\n        <div class=\"team\"><div class=\"fl\">${em.a||'🏆'}<\u002Fdiv><div class=\"tn\">${em.an}<\u002Fdiv><div class=\"tc2\">${em.ac||''}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      ${ME&&!ME.isAdmin&&CUR_GROUP&&!result&&!locked?`\n      <div class=\"bz\">\n        <div class=\"bl\">${em.hn}<\u002Fdiv>\n        <input class=\"si\" type=\"number\" min=\"0\" max=\"20\" placeholder=\"0\" id=\"h_${m.id}\" value=\"${myBet?.home??''}\" oninput=\"autosave('${m.id}')\">\n        <div class=\"sd\">–<\u002Fdiv>\n        <input class=\"si\" type=\"number\" min=\"0\" max=\"20\" placeholder=\"0\" id=\"a_${m.id}\" value=\"${myBet?.away??''}\" oninput=\"autosave('${m.id}')\">\n        <div class=\"bl\">${em.an}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ba\"><span class=\"sok${hasBet?' show':''}\" id=\"ok_${m.id}\">✅ Enregistré${isDouble?' (×2)':''}<\u002Fspan><\u002Fdiv>`:''}\n      ${hasBet?`<div class=\"mbb\">\n        <span class=\"bp${isDouble?' d':''}\">Mon pari : ${myBet.home}–${myBet.away}${isDouble?' 🔥×2':''}<\u002Fspan>\n        ${pts!==null?`<span style=\"font-size:12px;font-weight:600;color:${pts>0?'var(--green)':'var(--muted)'}\">${pts>0?'+'+pts+' pts':'Aucun point'}<\u002Fspan>`:''}\n      <\u002Fdiv>`:''}\n    <\u002Fdiv>`;\n  }\n\n  const isFinished=m=>DB_results[m.id]&&!DB_results[m.id].live&&DB_results[m.id].home!==undefined;\n  let html='';\n\n  if(FILTER==='all'){\n    // ===== Active matches (live + upcoming) at top, with date separators =====\n    const active=matches.filter(m=>!isFinished(m));\n    let lastDate='';\n    active.forEach(m=>{\n      const localDate=fmtLocalDate(m);\n      if(localDate!==lastDate){html+=`<div class=\"daysep\">${localDate}<\u002Fdiv>`;lastDate=localDate;}\n      html+=buildMatchCard(m);\n    });\n    // ===== Finished matches grouped by phase in collapsible accordions =====\n    const finished=matches.filter(isFinished);\n    if(finished.length>0){\n      html+='<div class=\"acc-summary-bar\"><span class=\"acc-summary-txt\">📁 Archives du tournoi<\u002Fspan><\u002Fdiv>';\n      const PHASE_DEFS=[\n        {key:'3PL',label:'🥉 Match pour la 3e place',test:m=>m.gr==='3PL'},\n        {key:'SF',label:'⚔️ Demi-finales',test:m=>m.gr==='SF'},\n        {key:'QF',label:'🔥 Quarts de finale',test:m=>m.gr==='QF'},\n        {key:'R16',label:'⚔️ 8es de finale',test:m=>m.gr==='R16'},\n        {key:'R32',label:'⚔️ 16es de finale',test:m=>m.gr==='R32'},\n        {key:'GROUPS',label:'⚽ Phase de groupes',test:m=>'ABCDEFGHIJKL'.includes(m.gr)},\n        {key:'FIN',label:'🏆 Finale',test:m=>m.gr==='FIN'},\n      ];\n      // Final first if finished, then reverse chronological phases\n      const orderedDefs=[PHASE_DEFS[6],...PHASE_DEFS.slice(0,6)];\n      const openSet=getAccOpenSet();\n      orderedDefs.forEach(def=>{\n        const phMatches=finished.filter(def.test);\n        if(phMatches.length===0) return;\n        // Personal stats for this phase\n        let myPts=0,myExact=0,myBetCount=0;\n        phMatches.forEach(m=>{\n          const b=bets[m.id],r=DB_results[m.id];\n          if(b&&b.home!==undefined) myBetCount++;\n          const p=calcPts(b,r,m.id);\n          if(p!==null){myPts+=p;if(+b.home===+r.home&&+b.away===+r.away)myExact++;}\n        });\n        const isOpen=openSet.has(def.key);\n        const ptsCls=myPts>0?'':' z';\n        html+=`<div class=\"ph-acc${isOpen?' open':''}\" id=\"acc_${def.key}\">\n          <div class=\"ph-acc-head\" onclick=\"toggleAcc('${def.key}')\">\n            <div>\n              <div class=\"ph-acc-title\">${def.label}<\u002Fdiv>\n              <div class=\"ph-acc-meta\">${phMatches.length} match${phMatches.length>1?'s':''}${myBetCount>0?' · '+myExact+' exact'+(myExact>1?'s':''):''}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px\">\n              ${ME&&!ME.isAdmin?`<span class=\"ph-acc-pts${ptsCls}\">${myPts>0?'+'+myPts+' pts':'0 pt'}<\u002Fspan>`:''}\n              <span class=\"ph-acc-chev\">▼<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ph-acc-body\">${isOpen?phMatches.map(m=>buildMatchCard(m)).join(''):''}<\u002Fdiv>\n        <\u002Fdiv>`;\n      });\n    }\n  } else {\n    // Explicit filter: flat list with date separators (unchanged behavior)\n    let lastDate='',_shownFinSep=false;\n    matches.forEach(m=>{\n      if(isFinished(m)&&!_shownFinSep){_shownFinSep=true;html+='<div class=\"daysep\" style=\"color:var(--muted);opacity:.5\">✅ Matchs terminés<\u002Fdiv>';}\n      const localDate=fmtLocalDate(m);\n      if(localDate!==lastDate){html+=`<div class=\"daysep\">${localDate}<\u002Fdiv>`;lastDate=localDate;}\n      html+=buildMatchCard(m);\n    });\n  }\n  document.getElementById('matches-list').innerHTML=html||'<p style=\"color:var(--muted);text-align:center;padding:20px\">Aucun match.<\u002Fp>';\n  parseEmoji(document.getElementById('matches-list'));\n}\n\n// Accordion state (persisted)\nfunction getAccOpenSet(){\n  try{return new Set(JSON.parse(localStorage.getItem('wc2026_acc_open')||'[]'));}catch(e){return new Set();}\n}\nwindow.toggleAcc=function(key){\n  const s=getAccOpenSet();\n  if(s.has(key)) s.delete(key); else s.add(key);\n  localStorage.setItem('wc2026_acc_open',JSON.stringify([...s]));\n  renderMatches();\n};\n\nlet saveTimer={};\nwindow.autosave=function(mid){\n  const hv=document.getElementById('h_'+mid)?.value.trim(),av=document.getElementById('a_'+mid)?.value.trim();\n  if(hv!==''&&av!==''){clearTimeout(saveTimer[mid]);saveTimer[mid]=setTimeout(()=>saveBetData(mid,hv,av),800);const ok=document.getElementById('ok_'+mid);if(ok)ok.classList.add('show');}\n};\n\nasync function saveBetData(mid,hv,av){\n  if(!ME||ME.isAdmin) return;\n  const ugs = await get(ref(db,'users/'+ME.username+'/groups'));\n  const groups = ugs.val() ? Object.keys(ugs.val()) : (CUR_GROUP ? [CUR_GROUP] : []);\n  for (const gid of groups) {\n    const ex = (DB_bets[gid]?.[ME.username]?.[mid]) || {};\n    await set(ref(db,'bets/'+gid+'/'+ME.username+'/'+mid),{home:+hv,away:+av,double:ex.double||false});\n  }\n  if (groups.length > 1) toast('✅ Pari enregistré dans vos '+groups.length+' groupes !');\n}\n\nwindow.toggleDouble=async function(mid,wk,isOn){\n  if(!ME||!CUR_GROUP) return;\n  const m=MATCHES.find(x=>x.id===mid);\n  const ugs=await get(ref(db,'users/'+ME.username+'/groups'));\n  const groups=ugs.val()?Object.keys(ugs.val()):[CUR_GROUP];\n  // Determine storage key: knockout uses matchId, group uses weekKey\n  const phase=getBonusPhase(m);\n  const storeKey=phase?mid:wk;\n  if(isOn){\n    for(const gid of groups){\n      await update(ref(db,'bets/'+gid+'/'+ME.username+'/'+mid),{double:false});\n      await remove(ref(db,'doubles/'+gid+'/'+ME.username+'/'+storeKey));\n    }\n    toast('Bonus ×2 désactivé');\n  }else{\n    if(!canUseBonus(m)){\n      if(phase){\n        const quota=KNOCKOUT_BONUS_QUOTA[phase]||1;\n        return toast('🔒 Quota de bonus atteint pour cette phase ('+quota+' max) !');\n      }\n      return toast('🔒 Bonus déjà utilisé cette semaine !');\n    }\n    pendingDouble={mid,wk:storeKey,groups};\n    // Set quota info text\n    const qInfo=document.getElementById('double-quota-info');\n    if(qInfo){\n      if(phase){\n        const quota=KNOCKOUT_BONUS_QUOTA[phase]||1;\n        const used=countPhaseDoublesUsed(phase,mid);\n        const phaseLabels={R32:'16es',R16:'8es',QF:'Quarts',SFINAL:'Demies/Finale'};\n        qInfo.innerHTML='<strong>'+phaseLabels[phase]+' : '+(used+1)+'/'+quota+' bonus utilisés.<\u002Fstrong> Non utilisés = perdus !';\n      } else {\n        qInfo.innerHTML='<strong>1 seul bonus ×2 par semaine.<\u002Fstrong>';\n      }\n    }\n    document.getElementById('modal-double').classList.add('show');\n  }\n};\n\nwindow.confirmDouble=async function(){\n  if(!pendingDouble||!ME) return;\n  const {mid,wk,groups}=pendingDouble;\n  const targetGroups=groups||[CUR_GROUP];\n  for(const gid of targetGroups){\n    if(!DB_bets[gid]) DB_bets[gid]={};\n    if(!DB_bets[gid][ME.username]) DB_bets[gid][ME.username]={};\n    if(!DB_bets[gid][ME.username][mid]) DB_bets[gid][ME.username][mid]={home:'',away:'',double:false};\n    await update(ref(db,'bets/'+gid+'/'+ME.username+'/'+mid),{double:true});\n    await set(ref(db,'doubles/'+gid+'/'+ME.username+'/'+wk),mid);\n  }\n  closeModal('modal-double');pendingDouble=null;\n  toast('🔥 Pari doublé activé dans tous vos groupes !');\n};\n\nwindow.showDetail=function(mid){\n  if(!CUR_GROUP) return;\n  const m=MATCHES.find(x=>x.id===mid);if(!m) return;\n  const R=resolveKnockoutTeams(DB_results),em=enrichMatch(m,R);\n  const result=DB_results[mid],members=(DB_members[CUR_GROUP]||[]).filter(u=>u!=='admin');\n  document.getElementById('detail-title').textContent=em.hn+' vs '+em.an;\n  let html=`<table class=\"dtbl\"><thead><tr><th>Joueur<\u002Fth><th>Pari<\u002Fth><th>×2<\u002Fth><th>Pts<\u002Fth><\u002Ftr><\u002Fthead><tbody>`;\n  members.forEach(u=>{\n    const bet=((DB_bets[CUR_GROUP]||{})[u]||{})[mid],pts=calcPts(bet,result,mid),isMe=u===ME?.username;\n    html+=`<tr${isMe?' class=\"mer\"':''}><td>${DB_users[u]?.emoji||'👤'} ${escHtml(u)}${isMe?' (vous)':''}<\u002Ftd>\n      <td>${bet&&bet.home!==undefined?bet.home+'–'+bet.away:'—'}<\u002Ftd>\n      <td>${bet?.double?'🔥':'—'}<\u002Ftd>\n      <td class=\"ptsc${pts===0?' z':''}\">${pts!==null?pts:'—'}<\u002Ftd><\u002Ftr>`;\n  });\n  html+='<\u002Ftbody><\u002Ftable>';\n  document.getElementById('detail-content').innerHTML=html;\n  document.getElementById('modal-detail').classList.add('show');\n};\n\n// ========================================\n// LEADERBOARD\n// ========================================\nfunction renderLeaderboard(){\n  const members=(DB_members[CUR_GROUP]||[]).filter(u=>u!=='admin');\n  if(!CUR_GROUP||members.length===0){\n    document.getElementById('podium').innerHTML='<p style=\"color:var(--muted);grid-column:1/-1;text-align:center\">Pas encore de membres.<\u002Fp>';\n    document.getElementById('lb-table').innerHTML='';return;\n  }\n  const sorted=members.map(u=>({u,emoji:DB_users[u]?.emoji||'🏳️',...getScore(u)})).sort((a,b)=>b.total-a.total||b.exact-a.exact);\n  const top3=sorted.slice(0,3);\n  const order=top3.length>=3?[top3[1],top3[0],top3[2]]:top3.length===2?[top3[1],top3[0]]:top3;\n  document.getElementById('podium').innerHTML=order.map(pl=>{\n    const r=top3.indexOf(pl)+1;\n    return `<div class=\"pod${r===1?' p1':''}\"><div class=\"prank\">#${r}<\u002Fdiv><div class=\"pemo\">${pl.emoji}<\u002Fdiv><div class=\"pname\">${escHtml(pl.u)}<\u002Fdiv><div class=\"ppts\">${pl.total}<\u002Fdiv><div class=\"psub\">${pl.exact} exact${pl.exact>1?'s':''}<\u002Fdiv><\u002Fdiv>`;\n  }).join('');\n  // Max pts still available (remaining matches × 30 × multiplier)\n  const remaining = MATCHES.filter(m=>!DB_results[m.id]||DB_results[m.id].live);\n  const maxRemaining = remaining.reduce((acc,m)=>acc+30*knockoutMultiplier(m.id),0);\n  const leader = sorted[0];\n  document.getElementById('lb-table').innerHTML=sorted.map((pl,i)=>{\n    const gap = leader&&i>0?leader.total-pl.total:0;\n    const canCatch = gap>0&&gap<=maxRemaining;\n    const gapHtml = i>0&&gap>0?`<div style=\"font-size:10px;color:${canCatch?'var(--gold)':'var(--muted)'}\">-${gap}pts ${canCatch?'🔥 peut rattraper':'😔'}<\u002Fdiv>`:'';\n    return `<div class=\"lbr${pl.u===ME?.username?' me':''}\">\n      <div class=\"lrank\">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}<\u002Fdiv>\n      <div class=\"linfo\"><div class=\"lav\">${pl.emoji}<\u002Fdiv>\n        <div><div class=\"lname\">${escHtml(pl.u)}${pl.u===ME?.username?' <span style=\"font-size:10px;color:var(--gold)\">(vous)<\u002Fspan>':''}<\u002Fdiv>\n        <div class=\"lsub\">${pl.bets} paris · ${pl.doubles} ×2<\u002Fdiv>\n        ${(()=>{const cb=(DB_champion[CUR_GROUP]||{})[pl.u];if(!cb)return '';const t=teamFromCode(cb);return `<div class=\"lsub\" style=\"color:var(--gold);margin-top:1px\">🏆 ${t.flag} ${escHtml(t.name)}<\u002Fdiv>`;})()}\n        ${gapHtml}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lval\">${pl.exact}<br><span style=\"font-size:9px\">exacts<\u002Fspan><\u002Fdiv>\n      <div class=\"lval\">${pl.doubles}<br><span style=\"font-size:9px\">bonus<\u002Fspan><\u002Fdiv>\n      <div class=\"lpts\">${pl.total}<span style=\"font-size:11px;color:var(--muted)\"> pts<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  renderHallOfFame();\n  renderGroupPhaseRecap();\n  renderFinalSimulator(sorted);\n  const rp=document.getElementById('sacre-replay');\n  if(rp) rp.classList.toggle('hidden',getCurrentPhase().phase!=='DONE');\n\n}\n\n// ================================================\n// SIMULATEUR \"ET SI...\" — scénarios de la finale\n// ================================================\nfunction codeFromTeamName(name){\n  for(const m of MATCHES){\n    if(m.hn===name) return m.hc;\n    if(m.an===name) return m.ac;\n  }\n  return null;\n}\nfunction renderFinalSimulator(sorted){\n  const el=document.getElementById('final-simulator');\n  if(!el) return;\n  el.innerHTML='';\n  if(!CUR_GROUP||!ME||sorted.length<2) return;\n  const finalM=MATCHES.find(m=>m.id==='final');\n  const finalR=DB_results['final'];\n  const finalDone=finalR&&!finalR.live&&finalR.home!==undefined;\n  // Show only when the final is the sole remaining match and its teams are known\n  const otherUnfinished=MATCHES.some(m=>m.id!=='final'&&(!DB_results[m.id]||DB_results[m.id].live));\n  if(finalDone||otherUnfinished||!teamsKnown(finalM)) return;\n  const R=resolveKnockoutTeams(DB_results);\n  const em=enrichMatch(finalM,R);\n  const hCode=codeFromTeamName(em.hn), aCode=codeFromTeamName(em.an);\n  const myBet=((DB_bets[CUR_GROUP]||{})[ME.username]||{})['final'];\n  // Precompute each player's data\n  const players=sorted.map(p=>({\n    u:p.u, emoji:p.emoji, base:p.total,\n    bet:((DB_bets[CUR_GROUP]||{})[p.u]||{})['final'],\n    champ:(DB_champion[CUR_GROUP]||{})[p.u]\n  }));\n  function leaderFor(h,a){\n    // Winner code for champion bonus (draw → decided on penalties, bonus uncertain)\n    const winCode=h>a?hCode:a>h?aCode:null;\n    let best=null;\n    players.forEach(p=>{\n      let t=p.base;\n      const pts=calcPts(p.bet,{home:h,away:a},'final');\n      if(pts!==null) t+=pts;\n      if(winCode&&p.champ===winCode) t+=100;\n      if(!best||t>best.t||(t===best.t&&p.base>best.base)) best={...p,t};\n    });\n    return best;\n  }\n  let grid=`<div class=\"sim-grid\">`;\n  grid+=`<div class=\"sim-flag-corner\">${em.h}<span>↓<\u002Fspan><\u002Fdiv>`;\n  for(let a=0;a<5;a++) grid+=`<div class=\"sim-hcell\">${em.a} ${a}${a===4?'+':''}<\u002Fdiv>`;\n  for(let h=0;h<5;h++){\n    grid+=`<div class=\"sim-hcell\">${h}${h===4?'+':''}<\u002Fdiv>`;\n    for(let a=0;a<5;a++){\n      const best=leaderFor(h,a);\n      const isMine=best&&best.u===ME.username;\n      const isMyBet=myBet&&+myBet.home===h&&+myBet.away===a;\n      const isDraw=h===a;\n      grid+=`<div class=\"sim-cell${isMine?' mine':''}${isDraw?' draw':''}${isMyBet?' mybet':''}\" title=\"${em.hn} ${h} – ${a} ${em.an}${isDraw?' (t.a.b.)':''} → ${best?best.u:''} en tête\">\n        ${best?best.emoji:'—'}\n        <span class=\"sc\">${h}–${a}${isDraw?'*':''}<\u002Fspan>\n      <\u002Fdiv>`;\n    }\n  }\n  grid+=`<\u002Fdiv>`;\n  const iCanWin=(()=>{for(let h=0;h<5;h++)for(let a=0;a<5;a++){const b=leaderFor(h,a);if(b&&b.u===ME.username)return true;}return false;})();\n  el.innerHTML=`<div class=\"sim-card\">\n    <div class=\"sim-title\">🎲 ET SI... LA FINALE<\u002Fdiv>\n    <div class=\"sim-sub\">${em.h} ${escHtml(em.hn)} vs ${escHtml(em.an)} ${em.a} · Qui remporte le jeu selon le score ?<\u002Fdiv>\n    ${grid}\n    <div class=\"sim-legend\">\n      <span>📌 votre prono<\u002Fspan>\n      <span style=\"color:var(--gold)\">■ vous gagnez<\u002Fspan>\n      <span>* nul → t.a.b. (hors bonus champion)<\u002Fspan>\n    <\u002Fdiv>\n    ${!iCanWin?'<div style=\"text-align:center;font-size:11px;color:var(--muted);margin-top:8px\">😔 Aucun scénario ne vous donne la 1re place, mais chaque point compte pour le podium !<\u002Fdiv>':''}\n  <\u002Fdiv>`;\n  parseEmoji(el);\n}\n\nfunction renderStats(){\n  if(!ME) return;\n  const s=getScore(ME.username);\n  const members=(DB_members[CUR_GROUP]||[]).filter(u=>u!=='admin');\n  const sorted=members.map(u=>({u,...getScore(u)})).sort((a,b)=>b.total-a.total);\n  const rank=sorted.findIndex(x=>x.u===ME.username)+1;\n  const played=MATCHES.filter(m=>DB_results[m.id]?.home!==undefined).length;\n  document.getElementById('sgrid').innerHTML=[\n    {v:s.total,l:'Points totaux'},{v:`#${rank||'–'}/${members.length||'–'}`,l:'Classement'},\n    {v:s.bets,l:'Paris placés'},{v:s.exact,l:'Scores exacts'},\n    {v:s.doubles,l:'Bonus ×2'},{v:played,l:'Matchs joués'},\n  ].map(x=>`<div class=\"sc\"><div class=\"sv\">${x.v}<\u002Fdiv><div class=\"sl\">${x.l}<\u002Fdiv><\u002Fdiv>`).join('');\n
