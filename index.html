<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLD CUP 2026 — Paris entre amis</title>
<meta name="theme-color" content="#080c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC 2026">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#e8b84b;--gold2:#f5d580;--green:#00e676;--red:#ff3d3d;
  --s1:#0d1117;--s2:#161b27;--s3:#1e2535;--s4:#252d40;
  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.12);
  --text:#f0f2f8;--muted:#5a6480;--muted2:#8892a8;--bg:#080c14;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}
.hidden{display:none!important}
button{cursor:pointer;font-family:'Inter',sans-serif}
input{font-family:'Inter',sans-serif}

/* ═══════════════════════════════════════
   SPLASH
═══════════════════════════════════════ */
#screen-splash{display:none;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
#screen-splash.active{display:flex}
.splash-wrap{text-align:center}
.splash-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;color:var(--gold);border:1px solid rgba(232,184,75,.3);padding:5px 16px;border-radius:20px;margin-bottom:20px;text-transform:uppercase}
.splash-title{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:6px;line-height:.95;background:linear-gradient(135deg,#fff 0%,var(--gold2) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.splash-loader{display:flex;gap:6px;justify-content:center;margin-top:28px}
.splash-loader span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:ld .8s ease-in-out infinite}
.splash-loader span:nth-child(2){animation-delay:.15s}
.splash-loader span:nth-child(3){animation-delay:.3s}
@keyframes ld{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}

/* ═══════════════════════════════════════
   FIREBASE SETUP
═══════════════════════════════════════ */
#screen-setup{display:none;min-height:100vh;padding:20px;background:var(--bg)}
#screen-setup.active{display:flex;align-items:center;justify-content:center}
.setup-card{width:100%;max-width:520px;background:var(--s2);border:1px solid var(--bd2);border-radius:20px;padding:32px;position:relative;overflow:hidden}
.setup-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.setup-card h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--gold);margin-bottom:6px}
.setup-card .sub{font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:22px}
.setup-card ol{color:var(--muted2);font-size:13px;line-height:2.2;padding-left:18px;margin-bottom:22px}
.setup-card ol a{color:var(--gold);text-decoration:none}
.sfield{margin-bottom:12px}
.sfield label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.8px;text-transform:uppercase;font-weight:600}
.sfield input{width:100%;background:var(--s3);border:1px solid var(--bd2);color:var(--text);padding:10px 14px;border-radius:10px;font-size:13px;outline:none;transition:border-color .2s}
.sfield input:focus{border-color:var(--gold)}
.sfield input::placeholder{color:var(--muted)}

/* ═══════════════════════════════════════
   AUTH SCREEN — PREMIUM REDESIGN
═══════════════════════════════════════ */
#screen-auth{
  display:none;min-height:100vh;position:relative;overflow:hidden;
  background:var(--bg);
}
#screen-auth.active{display:flex}
/* Animated gradient background */
.auth-bg{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 50%, rgba(232,184,75,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 85% 20%, rgba(0,100,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 80%, rgba(232,184,75,0.04) 0%, transparent 60%);
}
/* Animated grid lines */
.auth-grid{
  position:absolute;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}
/* Left branding panel */
.auth-left{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:60px 56px;position:relative;z-index:1;
}
.auth-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:28px;
}
.auth-eyebrow-line{width:32px;height:1px;background:var(--gold);opacity:.6}
.auth-main-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(56px,8vw,100px);
  letter-spacing:3px;line-height:.92;
  background:linear-gradient(150deg,#ffffff 0%,var(--gold2) 45%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:20px;
}
.auth-subtitle{
  font-size:15px;color:var(--muted2);line-height:1.7;
  max-width:380px;margin-bottom:44px;font-weight:300;
}
.auth-features{display:flex;flex-direction:column;gap:14px}
.auth-feat{display:flex;align-items:center;gap:14px}
.auth-feat-icon{
  width:36px;height:36px;border-radius:10px;
  background:rgba(232,184,75,0.1);border:1px solid rgba(232,184,75,0.2);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.auth-feat-text{font-size:13px;color:var(--muted2);line-height:1.4}
.auth-feat-text strong{color:var(--text);font-weight:500;display:block;font-size:13px}
/* Trophy decoration */
.auth-trophy{
  position:absolute;right:-40px;top:50%;transform:translateY(-50%);
  font-size:340px;opacity:0.03;line-height:1;pointer-events:none;
  filter:blur(2px);
}
/* Right form panel */
.auth-right{
  width:440px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding:40px 48px;position:relative;z-index:1;
  background:rgba(13,17,23,0.6);border-left:1px solid var(--bd);
  backdrop-filter:blur(12px);
}
.auth-form-wrap{width:100%}
.auth-form-header{margin-bottom:28px}
.auth-form-header h2{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:var(--text);margin-bottom:4px}
.auth-form-header p{font-size:13px;color:var(--muted2)}
/* TABS */
.auth-tabs{display:flex;background:var(--s3);border:1px solid var(--bd);border-radius:12px;padding:4px;margin-bottom:24px}
.atab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--muted2);border-radius:9px;transition:all .25s}
.atab.active{background:var(--gold);color:#080c14;font-weight:600}
/* FIELDS */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;font-weight:600}
.fg input{
  width:100%;background:var(--s3);border:1.5px solid var(--bd2);
  color:var(--text);padding:11px 14px;border-radius:10px;font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.fg input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,184,75,0.1)}
.fg input::placeholder{color:var(--muted)}
/* SUBMIT BTN */
.btn-auth{
  width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:600;border:none;
  background:linear-gradient(135deg,var(--gold) 0%,#d4993a 100%);
  color:#080c14;letter-spacing:.3px;transition:all .2s;margin-top:4px;
  position:relative;overflow:hidden;
}
.btn-auth::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
}
.btn-auth:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,184,75,0.3)}
.btn-auth:active{transform:translateY(0)}
/* DIVIDER */
.auth-or{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:12px}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:var(--bd2)}
/* ADMIN HINT */
.admin-hint{background:rgba(232,184,75,0.07);border:1px solid rgba(232,184,75,0.15);border-radius:10px;padding:10px 14px;margin-top:14px;text-align:center}
.admin-hint p{font-size:12px;color:var(--muted2);}
.admin-hint strong{color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px}
/* ERR */
.err{color:#ff6b6b;font-size:12px;margin-top:8px;text-align:center}
/* INVITE BANNER */
.invite-bar{
  background:linear-gradient(135deg,rgba(232,184,75,0.12),rgba(232,184,75,0.06));
  border:1px solid rgba(232,184,75,0.3);border-radius:12px;
  padding:12px 16px;text-align:center;margin-bottom:20px;font-size:13px;color:var(--gold);
}
.invite-bar strong{display:block;font-size:15px;margin-bottom:2px;font-weight:600}
/* EMOJI PICKER */
.ep-wrap{display:flex;gap:4px;flex-wrap:wrap;padding:10px;background:var(--s1);border-radius:12px;border:1px solid var(--bd2);max-height:220px;overflow-y:auto;justify-content:flex-start}
.ep-item{font-size:22px;padding:4px 6px;border-radius:8px;border:2px solid transparent;transition:all .15s;cursor:pointer;line-height:1}
.ep-item:hover{background:rgba(232,184,75,0.1);border-color:rgba(232,184,75,0.3)}
.ep-item.sel{border-color:var(--gold);background:rgba(232,184,75,0.15)}

/* RESPONSIVE — stack on mobile */
@media(max-width:768px){
  .auth-left{display:none}
  .auth-right{width:100%;border-left:none;padding:24px 20px}
  .auth-trophy{display:none}
}

/* ═══════════════════════════════════════
   APP SCREEN
═══════════════════════════════════════ */
#screen-app{display:none;flex-direction:column;min-height:100vh}
#screen-app.active{display:flex;position:fixed;inset:0;overflow-y:auto}
.screen{display:none;position:fixed;inset:0;overflow-y:auto;background:var(--bg)}.screen.active{display:block}

/* TOPBAR */
.topbar{
  background:rgba(13,17,23,0.95);border-bottom:1px solid var(--bd);
  padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);
}
.tbl{display:flex;align-items:center;gap:10px;min-width:0}
.tlogo{
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;
  background:linear-gradient(135deg,#fff,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;
}
.gpill{
  background:rgba(232,184,75,0.1);border:1px solid rgba(232,184,75,0.2);
  color:var(--gold);font-size:11px;padding:3px 10px;border-radius:20px;
  cursor:pointer;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-weight:500;
}
.abadge{
  background:rgba(255,61,61,0.12);border:1px solid rgba(255,61,61,0.25);
  color:#ff8a8a;font-size:10px;padding:2px 8px;border-radius:10px;
  letter-spacing:.5px;font-weight:600;white-space:nowrap;
}
.tbr{display:flex;align-items:center;gap:10px;flex-shrink:0}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:livepulse 2s infinite}
@keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,230,118,.4)}50%{opacity:.8;box-shadow:0 0 0 5px rgba(0,230,118,0)}}
.uchip{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500}
.avsm{width:32px;height:32px;border-radius:50%;background:var(--s4);border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.lbtn{background:none;border:none;color:var(--muted);font-size:18px;padding:4px;transition:color .2s}
.lbtn:hover{color:var(--red)}

/* BOTTOM NAV */
.bottomnav{
  background:rgba(13,17,23,0.97);border-top:1px solid var(--bd);
  display:grid;grid-template-columns:repeat(5,1fr);
  position:fixed;bottom:0;left:0;right:0;z-index:50;backdrop-filter:blur(12px);
}
.bnav{display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 0;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:500;transition:all .2s;position:relative}
.bnav .ni{font-size:20px;transition:transform .2s}
.bnav.active{color:var(--gold)}
.bnav.active .ni{transform:scale(1.15)}
.bnav.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--gold);border-radius:0 0 3px 3px}

/* MAIN */
.main{flex:1;padding:14px;padding-bottom:72px;max-width:900px;margin:0 auto;width:100%}
.tc{display:none}.tc.active{display:block}

/* SECTION HEADER */
.sh{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.st{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text)}

/* MATCH CARD */
.daysep{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:14px 0 8px;display:flex;align-items:center;gap:10px;font-weight:600}
.daysep::after{content:'';flex:1;height:1px;background:var(--bd)}
.mc{background:var(--s2);border:1px solid var(--bd);border-radius:16px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.mc:hover{border-color:var(--bd2)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--s1);font-size:11px;color:var(--muted);gap:6px;flex-wrap:wrap}
.tag{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.5px}
.tg{background:rgba(232,184,75,0.1);color:var(--gold);border:1px solid rgba(232,184,75,0.15)}
.td{background:rgba(255,61,61,0.1);color:#ff8080;border:1px solid rgba(255,61,61,0.2);cursor:pointer;transition:all .2s;border-radius:5px;font-size:10px;font-weight:600;padding:3px 9px}
.td.on{background:rgba(255,61,61,0.25);border-color:var(--red);color:#fff}
.td.lock{opacity:.35;cursor:not-allowed}
.tres{background:rgba(0,230,118,0.08);color:var(--green);border:1px solid rgba(0,230,118,0.15)}
.tlive{background:rgba(255,100,0,0.1);color:#ff9444;border:1px solid rgba(255,100,0,0.2)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.blink{animation:blink 1.2s infinite}
.mb{padding:16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.team{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center}
.fl{font-size:30px;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4))}
.tn{font-size:12px;font-weight:600;letter-spacing:.3px}
.tc2{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.5px}
.vscol{text-align:center}
.vstxt{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--muted);letter-spacing:2px}
.sfinal{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);letter-spacing:3px;line-height:1}
.slim{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#ff9444;letter-spacing:3px;line-height:1;animation:blink 2s infinite}
.mtime{font-size:11px;color:var(--gold);margin-top:3px;font-weight:500}
.ptsbadge{font-size:11px;margin-top:4px;font-weight:600}

/* BET ZONE */
.bz{padding:12px 16px;border-top:1px solid var(--bd);display:grid;grid-template-columns:1fr 52px 12px 52px 1fr;gap:6px;align-items:center}
.si{width:100%;background:var(--s1);border:1.5px solid var(--bd2);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:28px;text-align:center;padding:7px 2px;border-radius:10px;outline:none;transition:border-color .2s,box-shadow .2s}
.si:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,184,75,0.1)}
.si::placeholder{color:#2a3050}
.sd{text-align:center;color:var(--muted);font-size:18px;font-weight:300}
.bl{font-size:10px;color:var(--muted);text-align:center;font-weight:500;letter-spacing:.3px}
.ba{padding:6px 16px 12px;display:flex;justify-content:flex-end;align-items:center;gap:8px}
.sok{font-size:11px;color:var(--green);display:none;align-items:center;gap:4px;font-weight:500}
.sok.show{display:flex}
.mbb{padding:10px 16px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bp{display:inline-flex;align-items:center;gap:4px;background:rgba(0,230,118,0.07);border:1px solid rgba(0,230,118,0.15);color:var(--green);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.bp.d{background:rgba(255,61,61,0.07);border-color:rgba(255,61,61,0.15);color:#ff8a8a}

/* LEADERBOARD */
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.pod{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:18px 10px;text-align:center;position:relative;overflow:hidden;transition:all .2s}
.pod.p1{border-color:rgba(232,184,75,0.4);background:linear-gradient(160deg,var(--s2),rgba(232,184,75,0.05))}
.pod.p1::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.prank{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--muted);line-height:1}
.pod.p1 .prank{background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pemo{font-size:28px;margin:8px 0 5px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
.pname{font-size:13px;font-weight:600;margin-bottom:3px;word-break:break-all}
.ppts{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold)}
.psub{font-size:10px;color:var(--muted);font-weight:500}
.lbt{background:var(--s2);border:1px solid var(--bd);border-radius:16px;overflow:hidden}
.lbr{display:grid;grid-template-columns:36px 1fr 48px 48px 68px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--bd);gap:8px;transition:background .15s}
.lbr:last-child{border-bottom:none}
.lbr:hover{background:var(--s3)}
.lbr.me{background:rgba(232,184,75,0.04);border-left:2px solid var(--gold)}
.lrank{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);text-align:center}
.linfo{display:flex;align-items:center;gap:9px;min-width:0}
.lav{width:34px;height:34px;border-radius:50%;background:var(--s4);border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.lname{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lsub{font-size:10px;color:var(--muted);font-weight:500}
.lval{text-align:center;font-size:12px;color:var(--muted)}
.lpts{font-family:'Bebas Neue',sans-serif;font-size:21px;color:var(--gold);text-align:right}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:16px;text-align:center;transition:all .2s}
.sc:hover{border-color:var(--bd2);background:var(--s3)}
.sv{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);line-height:1;margin-bottom:4px}
.sl{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.ptable{background:var(--s2);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:20px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--bd);font-size:13px}
.prow:last-child{border-bottom:none}
.pbadge{background:linear-gradient(135deg,var(--gold),#c4892a);color:#080c14;font-family:'Bebas Neue',sans-serif;font-size:16px;padding:2px 12px;border-radius:6px;min-width:52px;text-align:center;font-weight:600}
.pbadge.x2{background:linear-gradient(135deg,var(--red),#c41a1a);color:#fff}

/* GROUPS */
.gbox{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:18px;margin-bottom:12px;transition:border-color .2s}
.gbox h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.5px;color:var(--text);margin-bottom:3px}
.gbox p{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;font-weight:500}
.ilink{display:flex;gap:8px;align-items:center}
.ilinkin{flex:1;background:var(--s1);border:1px solid var(--bd2);color:var(--muted2);padding:8px 12px;border-radius:8px;font-size:11px;font-family:monospace;min-width:0}
.cbtn{padding:8px 14px;background:var(--gold);color:#080c14;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .2s}
.cbtn:hover{background:var(--gold2);transform:translateY(-1px)}
.mlist{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.mchip{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--s3);border:1px solid var(--bd);border-radius:20px;font-size:12px;font-weight:500}
.mchip.adm{border-color:rgba(255,61,61,0.25);color:#ff8a8a}

/* ADMIN */
.rrow{padding:10px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ri{width:46px;background:var(--s1);border:1.5px solid rgba(232,184,75,0.25);color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:24px;text-align:center;padding:5px 2px;border-radius:8px;outline:none;transition:border-color .2s}
.ri:focus{border-color:var(--gold)}
.bnote{background:rgba(58,123,255,0.06);border:1px solid rgba(58,123,255,0.15);border-radius:10px;padding:10px 14px;font-size:12px;color:#7ab8ff;margin-bottom:14px;line-height:1.6}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;border:none;transition:all .2s;letter-spacing:.2px}
.btn-gold{background:linear-gradient(135deg,var(--gold),#c4892a);color:#080c14}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,184,75,0.25)}
.btn-full{width:100%;padding:12px}
.btn-out{background:var(--s4);color:var(--muted2);border:1px solid var(--bd2)}
.btn-out:hover{color:var(--text);border-color:var(--bd2)}
.btn-red{background:linear-gradient(135deg,var(--red),#c41a1a);color:#fff}
.btn-red:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,61,61,0.25)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(4,7,13,0.85);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.modal{background:var(--s2);border:1px solid var(--bd2);border-radius:20px;padding:28px;max-width:420px;width:100%;text-align:center;position:relative;overflow:hidden}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px;margin-bottom:8px}
.modal p{font-size:13px;color:var(--muted2);line-height:1.8;margin-bottom:22px}
