}\n\nasync function renderGlobalLeaderboard(){\n  const el=document.getElementById('global-lb-table');if(!el) return;\n  const allUsers=new Set();\n  Object.values(DB_members).forEach(ms=>(ms||[]).forEach(u=>{if(u!=='admin')allUsers.add(u);}));\n  if(allUsers.size===0){el.innerHTML='<p style=\"color:var(--muted);text-align:center;padding:20px\">Aucun joueur.<\u002Fp>';return;}\n  await loadUsersEmoji([...allUsers]);\n  const scores=[...allUsers].map(u=>{\n    let total=0,exact=0,bets=0,doubles=0;\n    Object.keys(DB_groupMeta).forEach(gid=>{\n      if((DB_members[gid]||[]).includes(u)){const s=getScoreForGroup(u,gid);total+=s.total;exact+=s.exact;bets+=s.bets;doubles+=s.doubles;}\n    });\n    return {u,emoji:DB_users[u]?.emoji||'🏳️',total,exact,bets,doubles};\n  }).sort((a,b)=>b.total-a.total||b.exact-a.exact);\n  el.innerHTML=scores.map((pl,i)=>`\n    <div class=\"lbr${pl.u===ME?.username?' me':''}\">\n      <div class=\"lrank\">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}<\u002Fdiv>\n      <div class=\"linfo\"><div class=\"lav\" style=\"font-size:20px\">${pl.emoji}<\u002Fdiv>\n        <div><div class=\"lname\">${escHtml(pl.u)}${pl.u===ME?.username?' <span style=\"font-size:10px;color:var(--gold)\">(vous)<\u002Fspan>':''}<\u002Fdiv>\n        <div class=\"lsub\">${pl.bets} paris · ${pl.exact} exacts<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lval\">${pl.exact}<br><span style=\"font-size:9px\">exacts<\u002Fspan><\u002Fdiv>\n      <div class=\"lval\">${pl.doubles}<br><span style=\"font-size:9px\">bonus<\u002Fspan><\u002Fdiv>\n      <div class=\"lpts\">${pl.total}<span style=\"font-size:11px;color:var(--muted)\"> pts<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\n\n// ========================================\n// GROUPS\n// ========================================\nfunction renderGroups(){\n  if(!ME) return;\n  const myGids=Object.keys(DB_groupMeta);\n  let html=myGids.map(gid=>{\n    const g=DB_groupMeta[gid];if(!g) return '';\n    const link=location.origin+location.pathname+'?group='+gid;\n    const code=g.code||'——';\n    const members=(DB_members[gid]||[]).filter(u=>u!=='admin');\n    return `<div class=\"gbox\" style=\"${CUR_GROUP===gid?'border-color:var(--gold);':''}\">\n      <h3>${escHtml(g.name)}${CUR_GROUP===gid?' ✓':''}<\u002Fh3>\n      <p>${members.length} membre(s) · ${g.adminUser===ME.username||ME.isAdmin?'🛡️ Admin':'Membre'}<\u002Fp>\n      ${CUR_GROUP!==gid?`<button class=\"btn btn-gold btn-sm\" style=\"margin-bottom:10px\" onclick=\"switchGroup('${gid}')\">Activer<\u002Fbutton>`:'<span style=\"font-size:12px;color:var(--green);display:block;margin-bottom:8px\">✅ Groupe actif<\u002Fspan>'}\n      <div style=\"margin-bottom:12px\">\n        <div style=\"font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;font-weight:600;letter-spacing:.5px\">🔑 Code d'invitation<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n          <span class=\"code-badge\" onclick=\"navigator.clipboard.writeText('${code}').then(()=>toast('📋 Code copié !'))\">${code}<\u002Fspan>\n          <span style=\"font-size:12px;color:var(--muted2)\">Cliquer pour copier<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;font-weight:600;letter-spacing:.5px\">Lien d'invitation<\u002Fdiv>\n      <div class=\"ilink\"><input class=\"ilinkin\" value=\"${link}\" readonly><button class=\"cbtn\" onclick=\"copyLink('${link}')\">📋 Copier<\u002Fbutton><\u002Fdiv>\n      <div class=\"mlist\">${members.map(u=>`<div class=\"mchip${g.adminUser===u?' adm':''}\">${DB_users[u]?.emoji||'👤'} ${escHtml(u)}<\u002Fdiv>`).join('')}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n  if(!html) html='<p style=\"color:var(--muted);font-size:13px;margin-bottom:14px\">Aucun groupe.<\u002Fp>';\n  document.getElementById('groups-content').innerHTML=html;\n}\n\nwindow.switchGroup=async function(gid){\n  CUR_GROUP=gid;\n  subscribeGroup(gid);\n  document.getElementById('topbar-group').textContent=DB_groupMeta[gid]?.name||'Groupe';\n  renderAll();showTab('matches');\n  toast('✅ Groupe : '+DB_groupMeta[gid]?.name);\n};\n\nwindow.createGroup=async function(){\n  if(!ME||!isAdmin()) return toast('⚠️ Réservé à admin');\n  const name=document.getElementById('new-gname').value.trim();\n  if(!name) return toast('⚠️ Entrez un nom');\n  const gid=uid(),code=generateCode();\n  const groupData={name,adminUser:ME.username==='admin'?'admin':ME.username,createdAt:Date.now(),code};\n  await set(ref(db,'groups/'+gid),groupData);\n  await set(ref(db,'codes/'+code),gid);\n  DB_groupMeta[gid]=groupData;DB_members[gid]=[];\n  CUR_GROUP=gid;subscribeGroup(gid);\n  document.getElementById('new-gname').value='';\n  document.getElementById('topbar-group').textContent=name;\n  renderGroups();toast('✅ Groupe créé : '+name+' · Code : '+code);\n};\n\nfunction generateCode(){\n  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';\n  return Array.from({length:6},()=>chars[Math.floor(Math.random()*chars.length)]).join('');\n}\n\nwindow.copyLink=function(l){navigator.clipboard.writeText(l).then(()=>toast('📋 Lien copié !'));};\n\nwindow.joinByCode=async function(inputId){\n  const code=document.getElementById(inputId)?.value.trim().toUpperCase();\n  if(!code||code.length<4) return toast('⚠️ Code invalide');\n  const snap=await get(ref(db,'codes/'+code));\n  if(!snap.exists()) return toast('❌ Code invalide ou expiré');\n  const gid=snap.val();\n  const gsnap=await get(ref(db,'groups/'+gid));\n  if(!gsnap.exists()) return toast('❌ Groupe introuvable');\n  await joinGroup(gid);\n  renderGroups();showTab('matches');\n  toast('✅ Groupe rejoint : '+gsnap.val().name);\n};\n\n// ========================================\n// ADMIN\n// ========================================\nfunction renderAdmin(){\n  // SECURITY: Double-check admin status, hide content if not admin\n  const gate=document.getElementById('admin-gate');\n  const content=document.getElementById('admin-content');\n  if(!isAdmin()){\n    if(gate) gate.style.display='block';\n    if(content) content.style.display='none';\n    return;\n  }\n  if(gate) gate.style.display='none';\n  if(content) content.style.display='block';\n  const gids=Object.keys(DB_groupMeta);\n  document.getElementById('admin-groups-section').innerHTML=gids.map(gid=>{\n    const g=DB_groupMeta[gid];\n    const link=location.origin+location.pathname+'?group='+gid;\n    const members=(DB_members[gid]||[]).filter(u=>u!=='admin');\n    const scores=members.map(u=>({u,emoji:DB_users[u]?.emoji||'🏳️',...getScoreForGroup(u,gid)})).sort((a,b)=>b.total-a.total);\n    return `<div class=\"gbox\" style=\"margin-bottom:14px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px\">\n        <div><strong style=\"color:var(--gold)\">${escHtml(g.name)}<\u002Fstrong> <span style=\"font-size:11px;color:var(--muted)\">${members.length} membres · Code: <strong style=\"letter-spacing:2px\">${g.code||'—'}<\u002Fstrong><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n          ${CUR_GROUP!==gid?`<button class=\"btn btn-gold btn-sm\" onclick=\"switchGroup('${gid}')\">Activer<\u002Fbutton>`:'<span style=\"font-size:11px;color:var(--green)\">✅ Actif<\u002Fspan>'}\n          <button class=\"cbtn\" style=\"background:var(--s3);color:var(--muted2)\" onclick=\"copyLink('${link}')\">📋<\u002Fbutton>\n          <button class=\"btn btn-sm\" style=\"background:rgba(255,61,61,.12);color:var(--red);border:1px solid rgba(255,61,61,.25)\" onclick=\"adminDeleteGroup('${gid}')\">🗑 Supprimer<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <table style=\"width:100%;border-collapse:collapse;font-size:12px\"><thead><tr style=\"border-bottom:1px solid var(--bd)\">\n        <th style=\"text-align:left;padding:5px 8px;color:var(--muted);font-size:11px\">#<\u002Fth>\n        <th style=\"text-align:left;padding:5px 8px;color:var(--muted);font-size:11px\">Joueur<\u002Fth>\n        <th style=\"text-align:right;padding:5px 8px;color:var(--muted);font-size:11px\">Pts<\u002Fth>\n      <\u002Ftr><\u002Fthead><tbody>\n      ${scores.length>0?scores.map((pl,i)=>`<tr style=\"border-bottom:1px solid rgba(255,255,255,.03)\">\n        <td style=\"padding:5px 8px;color:var(--muted);font-family:'Oswald',sans-serif;font-size:16px\">${i+1}<\u002Ftd>\n        <td style=\"padding:5px 8px\"><span style=\"font-size:18px\">${pl.emoji}<\u002Fspan> ${escHtml(pl.u)}<\u002Ftd>\n        <td style=\"padding:5px 8px;text-align:right;font-family:'Oswald',sans-serif;font-size:18px;color:var(--gold)\">${pl.total}<\u002Ftd>\n      <\u002Ftr>`).join(''):'<tr><td colspan=\"3\" style=\"padding:10px;text-align:center;color:var(--muted)\">Aucun membre<\u002Ftd><\u002Ftr>'}\n      <\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>`;\n  }).join('');\n  renderAdminPlayers();\n  buildFilters('admin-frow',ADMIN_FILTER,'setAdminFilter');\n  const R=resolveKnockoutTeams(DB_results);\n  const matches=ADMIN_FILTER==='all'?MATCHES:MATCHES.filter(m=>m.gr===ADMIN_FILTER);\n  let html='',lastDate='',_shownFinSep=false;\n  matches.forEach(m=>{\n    const em=enrichMatch(m,R);\n    const aFin=DB_results[m.id]&&!DB_results[m.id].live&&DB_results[m.id].home!==undefined;\n    // Add \"Terminés\" separator when transitioning from upcoming to finished\n    if(aFin&&!_shownFinSep){_shownFinSep=true;html+='<div class=\"daysep\" style=\"color:var(--muted);opacity:.5\">✅ Matchs terminés<\u002Fdiv>';}\n    const localDate=fmtLocalDate(m); if(localDate!==lastDate){html+=`<div class=\"daysep\">${localDate}<\u002Fdiv>`;lastDate=localDate;}\n    const res=DB_results[m.id]||{};\n    const isKO=['R32','R16','QF','SF','3PL','FIN'].includes(m.gr);\n    const isFinalStage=['SF','FIN','3PL'].includes(m.gr);\n    html+=`<div class=\"mc${isKO?' knockout':''}${isFinalStage?' final-stage':''}\">\n      <div class=\"mh\">\n        <span class=\"tag tg\">${STAGE_LABELS[m.gr]||m.gr}<\u002Fspan>\n        <span style=\"color:var(--muted);font-size:10px\">${fmtLocalDate(m)} · ${fmtLocalTime(m)}<\u002Fspan>\n        ${res.home!==undefined?'<span class=\"tag tres\">✅<\u002Fspan>':''}\n        ${res.live?'<span class=\"tag tlive\">🔴 LIVE<\u002Fspan>':''}\n        ${res.home!==undefined?`<button class=\"btn btn-sm\" style=\"background:rgba(245,200,66,.1);color:var(--gold);font-size:10px\" onclick=\"showDetail('${m.id}')\">📊 Paris<\u002Fbutton>`:''}\n      <\u002Fdiv>\n      <div class=\"mb\">\n        <div class=\"team\"><div class=\"fl\">${em.h||'🏆'}<\u002Fdiv><div class=\"tn\" style=\"font-size:11px\">${em.hn}<\u002Fdiv><\u002Fdiv>\n        <div class=\"vscol\">${res.home!==undefined?`<div class=\"sfinal\">${res.home}–${res.away}<\u002Fdiv>`:'<div class=\"vstxt\">VS<\u002Fdiv>'}<\u002Fdiv>\n        <div class=\"team\"><div class=\"fl\">${em.a||'🏆'}<\u002Fdiv><div class=\"tn\" style=\"font-size:11px\">${em.an}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rrow\">\n        <span style=\"font-size:11px;color:var(--muted)\">Score :<\u002Fspan>\n        <input class=\"ri\" type=\"number\" min=\"0\" max=\"30\" id=\"rh_${m.id}\" value=\"${res.home??''}\" placeholder=\"0\">\n        <span style=\"color:var(--muted)\">–<\u002Fspan>\n        <input class=\"ri\" type=\"number\" min=\"0\" max=\"30\" id=\"ra_${m.id}\" value=\"${res.away??''}\" placeholder=\"0\">\n        <button class=\"btn btn-gold btn-sm\" onclick=\"adminSaveResult('${m.id}')\">✅<\u002Fbutton>\n        ${['R32','R16','QF','SF','3PL','FIN'].includes(m.gr)&&res.home!==undefined&&res.home===res.away?`<div style=\"width:100%;margin-top:6px;font-size:11px\">\n          <span style=\"color:var(--gold)\">🥅 Vainqueur tirs au but :<\u002Fspan>\n          <button class=\"btn btn-sm ${res.penaltyWinner==='home'?'btn-gold':'btn-out'}\" onclick=\"adminSetPenaltyWinner('${m.id}','home')\" style=\"padding:2px 8px;margin:0 2px\">${enrichMatch(m,resolveKnockoutTeams(DB_results)).hn}<\u002Fbutton>\n          <button class=\"btn btn-sm ${res.penaltyWinner==='away'?'btn-gold':'btn-out'}\" onclick=\"adminSetPenaltyWinner('${m.id}','away')\" style=\"padding:2px 8px\">${enrichMatch(m,resolveKnockoutTeams(DB_results)).an}<\u002Fbutton>\n        <\u002Fdiv>`:''}\n        ${res.home!==undefined?`<button class=\"btn btn-out btn-sm\" onclick=\"adminClearResult('${m.id}')\">✕<\u002Fbutton>`:''}\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  });\n  document.getElementById('admin-list').innerHTML=html;\n}\n\nasync function renderAdminPlayers(){\n  const allUsers=new Set();\n  try{const snap=await get(ref(db,'users'));if(snap.exists())Object.keys(snap.val()).forEach(u=>{if(u!=='admin')allUsers.add(u);});}catch(e){}\n  Object.values(DB_members).forEach(ms=>(ms||[]).forEach(u=>{if(u!=='admin')allUsers.add(u);}));\n  await loadUsersEmoji([...allUsers]);\n  const el=document.getElementById('admin-players-section');if(!el) return;\n  if(allUsers.size===0){el.innerHTML='<p style=\"color:var(--muted);font-size:13px;padding:14px\">Aucun joueur.<\u002Fp>';return;}\n  el.innerHTML=[...allUsers].sort().map(u=>{\n    const emoji=DB_users[u]?.emoji||'👤';\n    const groups=Object.keys(DB_groupMeta).filter(gid=>(DB_members[gid]||[]).includes(u));\n    const groupNames=groups.map(gid=>DB_groupMeta[gid]?.name||gid).join(', ')||'Aucun groupe';\n    return `<div style=\"display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd)\">\n      <span style=\"font-size:22px\">${emoji}<\u002Fspan>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:13px;font-weight:600\">${escHtml(u)}<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--muted)\">${escHtml(groupNames)}<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"adminDeletePlayer('${u}')\"\n        style=\"background:rgba(255,61,61,.12);border:1px solid rgba(255,61,61,.25);color:var(--red);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer\">\n        🗑 Supprimer\n      <\u002Fbutton>\n      <button onclick=\"syncUserBetsToAllGroups('${u}')\"\n        style=\"background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);color:var(--green);border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer\">\n        🔄 Sync\n      <\u002Fbutton>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n\nwindow.adminSetPenaltyWinner = async function(matchId, winner){\n  if(!isAdmin()) return;\n  await update(ref(db,'results/'+matchId),{penaltyWinner:winner});\n  toast('✅ Vainqueur aux tirs au but enregistré');\n  renderAdmin();\n};\nwindow.adminDeletePlayer=async function(username){\n  if(!isAdmin()) return;\n  if(!confirm('⚠️ Supprimer \"'+username+'\" définitivement ? Tous ses paris seront effacés.')) return;\n  try {\n    // FIX: Fetch ALL groups from Firebase (not just local cache)\n    const allGroupsSnap = await get(ref(db,'groups'));\n    const allGids = allGroupsSnap.exists() ? Object.keys(allGroupsSnap.val()) : [];\n    for(const gid of allGids){\n      await remove(ref(db,'members/'+gid+'/'+username));\n      await remove(ref(db,'bets/'+gid+'/'+username));\n      await remove(ref(db,'doubles/'+gid+'/'+username));\n    }\n    await remove(ref(db,'fcm_tokens/'+username));\n    await remove(ref(db,'users/'+username));\n    // Update local state\n    Object.keys(DB_members).forEach(gid=>{DB_members[gid]=(DB_members[gid]||[]).filter(u=>u!==username);});\n    Object.keys(DB_bets).forEach(gid=>{if(DB_bets[gid])delete DB_bets[gid][username];});\n    delete DB_users[username];\n    toast('✅ Joueur \"'+username+'\" supprimé');\n    renderAdminPlayers();\n    renderLeaderboard();\n    renderAdmin();\n  } catch(err) {\n    console.error('Delete player error:', err);\n    toast('❌ Erreur : '+err.message);\n  }\n};\n\nwindow.adminDeleteGroup=async function(gid){\n  if(!isAdmin()) return;\n  const g=DB_groupMeta[gid];if(!g) return;\n  if(!confirm('Supprimer le groupe \"'+g.name+'\" ?')) return;\n  await remove(ref(db,'groups/'+gid));\n  await remove(ref(db,'bets/'+gid));\n  await remove(ref(db,'doubles/'+gid));\n  await remove(ref(db,'members/'+gid));\n  if(g.code) await remove(ref(db,'codes/'+g.code));\n  delete DB_groupMeta[gid];delete DB_members[gid];delete DB_bets[gid];\n  if(CUR_GROUP===gid){const rem=Object.keys(DB_groupMeta);CUR_GROUP=rem.length>0?rem[0]:null;document.getElementById('topbar-group').textContent=CUR_GROUP?DB_groupMeta[CUR_GROUP]?.name:'Pas de groupe';}\n  renderAdmin();toast('✅ Groupe supprimé');\n};\n\nwindow.adminSaveResult=async function(mid){\n  const hv=document.getElementById('rh_'+mid)?.value.trim(),av=document.getElementById('ra_'+mid)?.value.trim();\n  if(hv===''||av==='') return toast('⚠️ Entrez les deux scores');\n  await set(ref(db,'results/'+mid),{home:+hv,away:+av,ts:Date.now()});\n  notifyScoreUpdate(mid,hv,av);\n  toast('✅ Score enregistré !'); playSound();\n};\nwindow.adminClearResult=async function(mid){\n  await remove(ref(db,'results/'+mid));\n  toast('🗑 Score supprimé');\n};\n\n// ========================================\n// CHAT\n// ========================================\nlet chatGroupId=null,chatListener=null;\n\nfunction initChat(){\n  if(!ME||!CUR_GROUP) return;\n  // Mark current group chat as read\n  setLastChatRead(CUR_GROUP);\n  updateChatBadge();\n  chatGroupId=CUR_GROUP;\n  renderChatGroupSelector();\n  subscribeChatMessages(chatGroupId);\n}\n\nfunction renderChatGroupSelector(){\n  const gids=Object.keys(DB_groupMeta);\n  const el=document.getElementById('chat-group-selector');\n  if(!el) return;\n  if(gids.length<=1){el.innerHTML='';return;}\n  el.innerHTML=gids.map(gid=>`<button class=\"chat-grp-btn${gid===chatGroupId?' active':''}\" onclick=\"switchChatGroup('${gid}')\">${escHtml(DB_groupMeta[gid]?.name||gid)}<\u002Fbutton>`).join('');\n}\n\nwindow.switchChatGroup=function(gid){\n  setLastChatRead(gid);\n  updateChatBadge();\n  chatGroupId=gid;\n  if(chatListener){off(chatListener);chatListener=null;}\n  renderChatGroupSelector();\n  subscribeChatMessages(gid);\n};\n\nfunction subscribeChatMessages(gid){\n  if(chatListener){off(chatListener);chatListener=null;}\n  const msgRef=ref(db,'chat/'+gid);\n  chatListener=msgRef;\n  onValue(msgRef,snap=>{\n    const msgs=[];\n    snap.forEach(child=>{msgs.push({id:child.key,...child.val()});});\n    renderChatMessages(msgs.slice(-60));\n  });\n}\n\nfunction renderChatMessages(msgs){\n  const el=document.getElementById('chat-messages');if(!el) return;\n  if(msgs.length===0){el.innerHTML='<div class=\"chat-empty\">💬 Pas encore de messages<br>Soyez le premier à réagir !<\u002Fdiv>';return;}\n  let html='',lastDay='';\n  msgs.forEach(msg=>{\n    const isMe=msg.user===ME?.username;\n    const d=new Date(msg.ts);\n    const day=d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});\n    const time=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});\n    if(day!==lastDay){html+=`<div class=\"chat-day-sep\">${day}<\u002Fdiv>`;lastDay=day;}\n    const initials=msg.user?msg.user.slice(0,2).toUpperCase():'??';\n    const likes = msg.likes || {};\n    const likeCount = Object.keys(likes).length;\n    const iLiked = ME && likes[ME.username];\n    html+=`<div class=\"chat-msg${isMe?' me':''}\">\n      <div class=\"chat-avatar\" style=\"font-size:12px;font-weight:700;color:var(--gold)\">${initials}<\u002Fdiv>\n      <div class=\"chat-bubble\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:2px\">\n          <span class=\"chat-sender\" style=\"${isMe?'color:var(--gold)':''}\">${escHtml(msg.user)}<\u002Fspan>\n          ${isAdmin()?`<button onclick=\"adminDeleteMsg('${chatGroupId}','${msg.id}')\" style=\"background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:0\" title=\"Supprimer\">🗑<\u002Fbutton>`:''}\n        <\u002Fdiv>\n        ${msg.matchRef?`<div class=\"chat-match-ref\">⚽ ${escHtml(msg.matchRef)}<\u002Fdiv>`:''}\n        <div class=\"chat-text\">${msg.text&&msg.text.startsWith('/me ')?'<em>*'+escHtml(msg.user)+' '+escHtml(msg.text.slice(4))+'*<\u002Fem>':escHtml(msg.text)}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px\">\n          <button onclick=\"toggleLike('${msg.id}')\" style=\"background:${iLiked?'rgba(108,92,231,0.15)':'transparent'};border:1px solid ${iLiked?'rgba(108,92,231,0.3)':'var(--bd)'};color:${iLiked?'var(--gold)':'var(--muted)'};border-radius:16px;padding:2px 10px;font-size:11px;cursor:pointer\">👍${likeCount>0?' '+likeCount:''}<\u002Fbutton>\n          <div class=\"chat-time\">${time}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  });\n  el.innerHTML=html;\n  el.scrollTop=el.scrollHeight;\n}\n\nfunction escapeHtml(s){return escHtml(s);}\n\n\nwindow.toggleLike = async function(msgId){\n  if (!ME || !chatGroupId) return;\n  const path = 'chat/'+chatGroupId+'/'+msgId+'/likes/'+ME.username;\n  const snap = await get(ref(db, path));\n  if (snap.exists()) await remove(ref(db, path));\n  else await set(ref(db, path), true);\n};\n\nwindow.sendChatMsg=async function(){\n  if(!ME||ME.isAdmin||!chatGroupId) return;\n  const input=document.getElementById('chat-input');\n  const text=input?.value.trim();if(!text) return;\n  input.value='';\n  const key=Date.now()+'_'+Math.random().toString(36).slice(2,6);\n  await set(ref(db,'chat/'+chatGroupId+'/'+key),{user:ME.username,emoji:ME.emoji||'👤',text,ts:Date.now()});\n};\n\nwindow.sendReaction=async function(emoji){\n  if(!ME||ME.isAdmin||!chatGroupId) return;\n  const key=Date.now()+'_'+Math.random().toString(36).slice(2,6);\n  await set(ref(db,'chat/'+chatGroupId+'/'+key),{user:ME.username,emoji:ME.emoji||'👤',text:emoji,ts:Date.now()});\n};\n\nwindow.adminDeleteMsg=async function(groupId,msgId){\n  if(!isAdmin()) return;\n  await remove(ref(db,'chat/'+groupId+'/'+msgId));\n  toast('🗑 Message supprimé');\n};\n\nwindow.commentOnMatch=async function(matchId){\n  if(!ME||ME.isAdmin||!CUR_GROUP) return;\n  const m=MATCHES.find(x=>x.id===matchId);if(!m) return;\n  const text=prompt('Commentaire sur '+(m.hn||'ce match')+' vs '+(m.an||'')+' :');\n  if(!text||!text.trim()) return;\n  chatGroupId=CUR_GROUP;\n  const key=Date.now()+'_'+Math.random().toString(36).slice(2,6);\n  await set(ref(db,'chat/'+CUR_GROUP+'/'+key),{user:ME.username,emoji:ME.emoji||'👤',text:text.trim(),matchRef:(m.hn||'')+' vs '+(m.an||''),ts:Date.now()});\n  toast('💬 Commentaire envoyé !');showTab('chat');\n};\n\n// ========================================\n// SCORES ESPN AUTO\n// ========================================\nlet _fetchingScores=false;\n// Normalize team names for matching (remove accents, lowercase, common variants)\nfunction normTeam(s){\n  return (s||'').toLowerCase()\n    .normalize('NFD').replace(/[\\u0300-\\u036f]/g,'') // remove accents\n    .replace(/[^a-z0-9]/g,''); // keep only alphanumeric\n}\nconst ESPN_ALIASES={\n  'unitedstates':'usa','us':'usa','etatsunis':'usa','usa':'usa','korearepublic':'coreedusud','southkorea':'coreedusud',\n  'bosniaherzegovina':'bosnie','bosniaandherzegovina':'bosnie','ivorycoast':'cotedivoire',\n  'cotedivoire':'cotedivoire','drcongo':'rdcongo','congodr':'rdcongo','turkiye':'turkiye',\n  'turkey':'turkiye','sweden':'suede','czechia':'tchequie','czechrepublic':'tchequie','capeverde':'capvert',\n  'caboverde':'capvert','newzealand':'nouvellezelande','saudiarabia':'arabiesaoudite',\n  'southafrica':'afriquedusud','netherlands':'paysbas','germany':'allemagne','spain':'espagne',\n  'france':'france','brazil':'bresil','argentina':'argentine','portugal':'portugal',\n  'belgium':'belgique','japan':'japon','egypt':'egypte','iran':'iran','morocco':'maroc',\n  'senegal':'senegal','algeria':'algerie','ghana':'ghana','panama':'panama','croatia':'croatie',\n  'england':'angleterre','norway':'norvege','iraq':'irak','jordan':'jordanie','austria':'autriche',\n  'colombia':'colombie','uzbekistan':'ouzbekistan','ecuador':'equateur','curacao':'curacao',\n  'switzerland':'suisse','qatar':'qatar','canada':'canada','mexico':'mexique','uruguay':'uruguay',\n  'paraguay':'paraguay','australia':'australie','tunisia':'tunisie','ukraine':'ukraine',\n  'haiti':'haiti','scotland':'ecosse'\n};\nfunction teamKey(s){ const n=normTeam(s); return ESPN_ALIASES[n]||n; }\n\nasync function fetchScoreboardForDate(dateStr){\n  // dateStr format: YYYYMMDD, empty = today\n  const url='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard'+(dateStr?'?dates='+dateStr:'');\n  const r=await fetch(url);\n  if(!r.ok) return [];\n  const data=await r.json();\n  return data.events||[];\n}\n\nasync function autoFetchScores(){\n  if(_fetchingScores) return;\n  _fetchingScores=true;\n  try{\n    // Query today + past 9 days to catch all finished matches in the date window\n    const today=new Date();\n    const dateStrs=[''];\n    for(let i=0;i<20;i++){\n      const d=new Date(today); d.setUTCDate(d.getUTCDate()-i);\n      dateStrs.push(d.toISOString().slice(0,10).replace(/-/g,''));\n    }\n    // Also look a couple days ahead for live matches\n    for(let i=1;i<=2;i++){\n      const d=new Date(today); d.setUTCDate(d.getUTCDate()+i);\n      dateStrs.push(d.toISOString().slice(0,10).replace(/-/g,''));\n    }\n    const allEvents=[];\n    const seen=new Set();\n    for(const ds of dateStrs){\n      try{\n        const evs=await fetchScoreboardForDate(ds);\n        evs.forEach(ev=>{ if(!seen.has(ev.id)){seen.add(ev.id);allEvents.push(ev);} });\n      }catch(e){}\n    }\n    const updates={};\n    const scheduleUpdates={};\n    allEvents.forEach(ev=>{\n      const comp=ev.competitions?.[0];if(!comp) return;\n      const status=comp.status?.type?.name;\n      const isFinal=status==='STATUS_FINAL'||comp.status?.type?.completed===true;\n      const isLive=['STATUS_IN_PROGRESS','STATUS_HALFTIME','STATUS_FIRST_HALF','STATUS_SECOND_HALF'].includes(status);\n      const home=comp.competitors?.find(c=>c.homeAway==='home');\n      const away=comp.competitors?.find(c=>c.homeAway==='away');\n      if(!home||!away) return;\n      // Capture schedule time for ALL matches (scheduled, live, or final)\n      if(ev.date){\n        const hKeyS=teamKey(home.team?.displayName||home.team?.shortDisplayName||home.team?.name);\n        const aKeyS=teamKey(away.team?.displayName||away.team?.shortDisplayName||away.team?.name);\n        const schedMatch=MATCHES.find(mm=>{\n          if(!mm.hn) return false;\n          const mh=teamKey(mm.hn),ma=teamKey(mm.an);\n          return (mh===hKeyS&&ma===aKeyS)||(mh===aKeyS&&ma===hKeyS);\n        });\n        if(schedMatch && schedMatch.id!=='final' && schedMatch.id!=='p3rd') scheduleUpdates[schedMatch.id]=ev.date;\n      }\n      if(!isFinal&&!isLive) return;\n      const hScore=+home.score,aScore=+away.score;\n      const hKey=teamKey(home.team?.displayName||home.team?.shortDisplayName||home.team?.name);\n      const aKey=teamKey(away.team?.displayName||away.team?.shortDisplayName||away.team?.name);\n      const R_live = resolveKnockoutTeams(DB_results);\n      const match=MATCHES.find(m=>{\n        // For group matches: use static team names\n        if(m.hn){\n          const mhKey=teamKey(m.hn), maKey=teamKey(m.an);\n          if((mhKey===hKey&&maKey===aKey)||(mhKey===aKey&&maKey===hKey)) return true;\n        }\n        // For knockout matches: resolve team names dynamically\n        if(!m.hn && m.gr && ['R32','R16','QF','SF','3PL','FIN'].includes(m.gr)){\n          const em=enrichMatch(m,R_live);\n          if(!em.hn||em.hn.startsWith('1er')||em.hn.startsWith('2e')||em.hn.startsWith('Vainq')||em.hn.startsWith('Perd')||em.hn.startsWith('Meilleur')) return false;\n          const mhKey=teamKey(em.hn), maKey=teamKey(em.an);\n          if((mhKey===hKey&&maKey===aKey)||(mhKey===aKey&&maKey===hKey)) return true;\n        }\n        return false;\n      });\n      if(match){\n        // Resolve real team name (works for both group AND knockout matches)\n        const em=enrichMatch(match,R_live);\n        // Determine if ESPN has home/away swapped vs our data — ONE calculation, reused everywhere\n        const ourHomeKey=teamKey(em.hn||'');\n        const swapped = ourHomeKey!==hKey;\n        const finalH = swapped ? aScore : hScore;\n        const finalA = swapped ? hScore : aScore;\n        updates[match.id]={home:finalH,away:finalA,ts:Date.now()};\n        if(isLive&&!isFinal) updates[match.id].live=true;\n        if(isFinal) updates[match.id].live=null;\n        // Penalty shootout: score tied at full/extra time → use ESPN 'winner' to know who advances\n        if(isFinal && finalH===finalA){\n          const espnHomeWon = home.winner===true;\n          const espnAwayWon = away.winner===true;\n          if(espnHomeWon||espnAwayWon){\n            // Reuse the SAME swapped value → our-home won if (not swapped AND espn-home won) OR (swapped AND espn-away won)\n            const ourHomeWon = swapped ? espnAwayWon : espnHomeWon;\n            updates[match.id].penaltyWinner = ourHomeWon ? 'home' : 'away';\n          }\n        }\n        if(ev.date && match.id!=='final' && match.id!=='p3rd') scheduleUpdates[match.id]=ev.date;\n      }\n    });\n    if(Object.keys(updates).length>0){await update(ref(db,'results'),updates);}\n    if(Object.keys(scheduleUpdates).length>0){await update(ref(db,'schedule'),scheduleUpdates);}\n    setSyncStatus('connected');\n  }catch(e){console.error('ESPN fetch error:',e);setSyncStatus('error');}\n  _fetchingScores=false;\n}\n\n// ========================================\n// INVITE CODE\n// ========================================\nasync function checkInvite(){\n  const gid=getURLParam('group');\n  if(gid){\n    const snap=await get(ref(db,'groups/'+gid));\n    if(snap.exists()){\n      document.getElementById('invite-bar').classList.remove('hidden');\n      document.getElementById('invite-gname').textContent=snap.val().name;\n    }\n  }\n  // Secret admin URL\n  const adminKey=getURLParam('admin');\n  if(adminKey===ADMIN_PASS){\n    ME={username:'admin',emoji:'🛡️',isAdmin:true};\n    localStorage.setItem('wc2026_me',JSON.stringify(ME));\n    await loadUserData();enterApp();\n  }\n}\n\n// ========================================\n// NOTIFICATIONS\n// ========================================\nasync function requestNotifPermission(){\n  if(!messaging) return;\n  try{\n    const perm=await Notification.requestPermission();if(perm!=='granted') return;\n    const token=await getToken(messaging,{vapidKey:VAPID_KEY});\n    if(token&&ME&&!ME.isAdmin) await set(ref(db,'fcm_tokens/'+ME.username),{token,ts:Date.now()});\n  }catch(e){}\n}\n\nfunction startMatchReminders(){\n  if(!('Notification' in window)||Notification.permission!=='granted') return;\n  _intervals.push(setInterval(()=>{\n    const now=new Date();\n    MATCHES.forEach(m=>{\n      if(!m.hn) return;\n      const matchDate=new Date(m.dt+'T'+m.tm+':00+01:00');\n      const diffMin=Math.round((matchDate-now)/60000);\n      if(diffMin<0) return;\n      const result=DB_results[m.id];if(result) return;\n      const bets=(DB_bets[CUR_GROUP]||{})[ME?.username]||{};\n      const hasBet=bets[m.id]?.home!==undefined;\n      if(diffMin===120&&!hasBet) showLocalNotif('⚽ '+m.hn+' vs '+m.an,'Match dans 2h ! Faites votre pronostic.',m.id+'_2h');\n      if(diffMin===30&&!hasBet) showLocalNotif('⏰ Dernier rappel !',m.hn+' vs '+m.an+' dans 30 minutes !',m.id+'_30m');\n    });\n  },60000));\n}\n\nfunction showLocalNotif(title,body,tag){\n  const key='notif_'+tag;if(sessionStorage.getItem(key)) return;\n  sessionStorage.setItem(key,'1');\n  if(!('Notification' in window)||Notification.permission!=='granted') return;\n  try{new Notification(title,{body,icon:'/icon-192.png',tag,requireInteraction:true});}\n  catch(e){toast('🔔 '+title+' — '+body,6000);}\n}\n\nfunction notifyScoreUpdate(matchId,h,a){\n  const m=MATCHES.find(x=>x.id===matchId);if(!m||!m.hn) return;\n  showLocalNotif('✅ Résultat !',m.hn+' '+h+' – '+a+' '+m.an+' · Classement mis à jour !',matchId+'_result');\n}\n\nfunction showNotifBanner(){\n  if(!('Notification' in window)) return;\n  if(Notification.permission==='granted'){startMatchReminders();return;}\n  if(Notification.permission==='denied') return;\n  if(sessionStorage.getItem('notif_dismissed')) return;\n  setTimeout(()=>{const b=document.getElementById('notif-banner');if(b)b.classList.add('show');},2000);\n}\n\nwindow.enableNotifs=async function(){\n  document.getElementById('notif-banner')?.classList.remove('show');\n  await requestNotifPermission();startMatchReminders();\n  toast('🔔 Notifications activées !');\n};\nwindow.dismissNotifBanner=function(){\n  document.getElementById('notif-banner')?.classList.remove('show');\n  sessionStorage.setItem('notif_dismissed','1');\n};\n\n// ========================================\n// IN-APP MESSAGES\n// ========================================\nlet inAppTimer=null;\nfunction showInAppMsg(icon,title,body,type,actionLabel,actionFn,dur=6000){\n  const el=document.getElementById('inapp-msg');if(!el) return;\n  document.getElementById('inapp-icon').textContent=icon;\n  document.getElementById('inapp-title').textContent=title;\n  document.getElementById('inapp-body').textContent=body;\n  el.className='inapp-msg type-'+type;\n  const btn=document.getElementById('inapp-action-btn');\n  if(actionLabel&&actionFn){btn.textContent=actionLabel;btn.onclick=()=>{closeInAppMsg();actionFn();};btn.className='inapp-msg-action '+(type==='gold'?'gold':'blue');btn.classList.remove('hidden');}\n  else btn.classList.add('hidden');\n  el.classList.add('show');\n  clearTimeout(inAppTimer);\n  if(dur>0) inAppTimer=setTimeout(closeInAppMsg,dur);\n}\nwindow.closeInAppMsg=function(){document.getElementById('inapp-msg')?.classList.remove('show');clearTimeout(inAppTimer);};\n\nlet _prevResults={};\nlet _loginTime = 0; // Set on login to ignore pre-existing results\nfunction checkNewResults(newResults){\n  Object.keys(newResults).forEach(mid=>{\n    const r=newResults[mid];\n    if(!r||r.live) return;\n    // Only notify if:\n    // 1. This result wasn't there before (truly new since last check)\n    // 2. We haven't already notified in this session (avoids re-notif on reconnect)\n    const sessionKey='notified_'+mid;\n    if(!_prevResults[mid] && !sessionStorage.getItem(sessionKey)){\n      // Only notify if result was added AFTER login (not pre-existing)\n      const resultTs = r.ts || 0;\n      if(resultTs < _loginTime - 5000) return; // Older than login → skip\n      const m=MATCHES.find(x=>x.id===mid);if(!m||!m.hn) return;\n      const myBet=CUR_GROUP?(DB_bets[CUR_GROUP]?.[ME?.username]||{})[mid]:null;\n      const pts=calcPts(myBet,r,mid);\n      sessionStorage.setItem(sessionKey,'1'); // Mark as notified\n      toast(m.hn+' '+r.home+'–'+r.away+' '+m.an+(pts!==null?' · +'+pts+' pts!':''), 5000);\n    }\n  });\n  _prevResults={...newResults};\n}\n\nfunction checkInAppAlerts(){\n  if(!ME||ME.isAdmin||!CUR_GROUP) return;\n  const now=new Date();\n  const bets=(DB_bets[CUR_GROUP]||{})[ME.username]||{};\n  const upcoming=MATCHES.filter(m=>{\n    if(!m.hn) return false;\n    const matchDate=new Date(m.dt+'T'+m.tm+':00+01:00');\n    const diffMin=(matchDate-now)/60000;\n    return diffMin>0&&diffMin<=120&&!DB_results[m.id]&&!bets[m.id]?.home;\n  }).sort((a,b)=>new Date(a.dt+'T'+a.tm+':00+01:00')-new Date(b.dt+'T'+b.tm+':00+01:00'));\n  if(upcoming.length>0){\n    const m=upcoming[0];\n    const R=resolveKnockoutTeams(DB_results),em=enrichMatch(m,R);\n    const diffMin=Math.round((new Date(m.dt+'T'+m.tm+':00+01:00')-now)/60000);\n    const diffText=diffMin>=60?Math.round(diffMin/60)+'h':diffMin+'min';\n    showInAppMsg('⚽',em.hn+' vs '+em.an+' dans '+diffText,'Vous navez pas encore parié !','gold','Parier maintenant',()=>{showTab('matches');setFilter(m.gr);},8000);\n  }\n}\n\nfunction scheduleInAppChecks(){\n  if(!ME||ME.isAdmin) return;\n  setTimeout(checkInAppAlerts,3000);\n  _intervals.push(setInterval(checkInAppAlerts,5*60*1000));\n}\n\n// ========================================\n// PWA\n// ========================================\nlet deferredPrompt=null;\nconst isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);\nconst isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;\nif(!isStandalone){\n  if(isIOS){if(!sessionStorage.getItem('pwa_dismissed'))setTimeout(()=>{document.getElementById('ios-hint').classList.add('show');},3000);}\n  else window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;if(!sessionStorage.getItem('pwa_dismissed'))setTimeout(()=>{document.getElementById('pwa-banner').classList.add('show');},2000);});\n}\ndocument.getElementById('pwa-install-btn')?.addEventListener('click',async()=>{\n  if(!deferredPrompt) return;\n  deferredPrompt.prompt();\n  const {outcome}=await deferredPrompt.userChoice;\n  if(outcome==='accepted'){document.getElementById('pwa-banner').classList.remove('show');toast('✅ App installée !');}\n  deferredPrompt=null;\n});\nwindow.dismissPWA=function(){\n  document.getElementById('pwa-banner').classList.remove('show');\n  document.getElementById('ios-hint').classList.remove('show');\n  sessionStorage.setItem('pwa_dismissed','1');\n};\nif('serviceWorker' in navigator){\n  window.addEventListener('load',()=>{\n    const sw=`importScripts('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');importScripts('https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js');firebase.initializeApp({apiKey:\"AIzaSyCdm6T0RlBvnFFgXuGB3-q5EtTcci7p6LI\",authDomain:\"world-cup-2026-1b9ee.firebaseapp.com\",databaseURL:\"https://world-cup-2026-1b9ee-default-rtdb.firebaseio.com\",projectId:\"world-cup-2026-1b9ee\",messagingSenderId:\"349637498450\",appId:\"1:349637498450:web:70be216f600622526d718b\"});const messaging=firebase.messaging();messaging.onBackgroundMessage(p=>{self.registration.showNotification(p.notification?.title||'⚽ WC2026',{body:p.notification?.body||'',icon:'/icon-192.png'});}});`;\n    const blob=new Blob([sw],{type:'application/javascript'});\n    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});\n  });\n}\n\n// ========================================\n// EMOJI PICKER\n// ========================================\nfunction initEP(){\n  const teams=[\n    {f:'🇦🇷',n:'Argentine'},{f:'🇫🇷',n:'France'},{f:'🇧🇷',n:'Brésil'},\n    {f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',n:'Angleterre'},{f:'🇩🇪',n:'Allemagne'},{f:'🇪🇸',n:'Espagne'},\n    {f:'🇵🇹',n:'Portugal'},{f:'🇳🇱',n:'Pays-Bas'},{f:'🇧🇪',n:'Belgique'},\n    {f:'🇺🇸',n:'USA'},{f:'🇲🇽',n:'Mexique'},{f:'🇨🇦',n:'Canada'},\n    {f:'🇯🇵',n:'Japon'},{f:'🇰🇷',n:'Corée du Sud'},{f:'🇲🇦',n:'Maroc'},\n    {f:'🇸🇳',n:'Sénégal'},{f:'🇩🇿',n:'Algérie'},{f:'🇨🇮',n:\"C.d'Ivoire\"},\n    {f:'🇪🇬',n:'Égypte'},{f:'🇬🇭',n:'Ghana'},{f:'🇨🇩',n:'RD Congo'},\n    {f:'🇺🇾',n:'Uruguay'},{f:'🇨🇴',n:'Colombie'},{f:'🇵🇾',n:'Paraguay'},\n    {f:'🇪🇨',n:'Équateur'},{f:'🇨🇭',n:'Suisse'},{f:'🇭🇷',n:'Croatie'},\n    {f:'🇦🇹',n:'Autriche'},{f:'🇹🇷',n:'Türkiye'},{f:'🇸🇪',n:'Suède'},\n    {f:'🇶🇦',n:'Qatar'},{f:'🇸🇦',n:'Arabie S.'},{f:'🇮🇷',n:'Iran'},\n    {f:'🇳🇴',n:'Norvège'},{f:'🇦🇺',n:'Australie'},{f:'🇿🇦',n:'Afrique du Sud'},\n    {f:'🇧🇦',n:'Bosnie'},{f:'🇨🇻',n:'Cap-Vert'},{f:'🇭🇹',n:'Haïti'},\n    {f:'🇮🇶',n:'Irak'},{f:'🇵🇦',n:'Panama'},{f:'🇬🇭',n:'Ghana'},\n    {f:'🇹🇳',n:'Tunisie'},{f:'🇳🇿',n:'N-Zélande'},{f:'🇺🇿',n:'Ouzbékistan'},\n    {f:'🇯🇴',n:'Jordanie'},{f:'🇨🇼',n:'Curaçao'},{f:'🇨🇿',n:'Tchéquie'},\n  ];\n  const seen=new Set();const unique=teams.filter(t=>{if(seen.has(t.n))return false;seen.add(t.n);return true;});\n  window._epTeams=unique;\n  document.getElementById('ep').innerHTML=unique.map((t,i)=>\n    `<div data-idx=\"${i}\" onclick=\"pickE(${i})\" id=\"ep_${i}\"\n      style=\"cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 5px;border-radius:9px;border:2px solid transparent;transition:all .15s;min-width:50px;text-align:center\">\n      <span style=\"font-size:26px;line-height:1.1\">${t.f}<\u002Fspan>\n      <span style=\"font-size:9px;color:var(--muted2);font-weight:600;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">${t.n}<\u002Fspan>\n    <\u002Fdiv>`\n  ).join('');\n  pickE(0);\n  parseEmoji(document.getElementById('ep'));\n}\nwindow.pickE=function(idx){\n  const teams=window._epTeams||[];if(idx>=teams.length) return;\n  document.getElementById('re').value=teams[idx].f;\n  document.querySelectorAll('#ep>div').forEach(d=>{d.style.borderColor='transparent';d.style.background='transparent';});\n  const el=document.getElementById('ep_'+idx);\n  if(el){el.style.borderColor='var(--gold)';el.style.background='rgba(108,92,231,.12)';}\n};\n\n// ========================================\n// OFFLINE DETECTION\n// ========================================\nwindow.addEventListener('online',()=>{setSyncStatus('connected');autoFetchScores();toast('✅ Connexion rétablie');});\nwindow.addEventListener('offline',()=>{setSyncStatus('error');toast('⚠️ Hors ligne');});\n\n// ========================================\n// INIT\n// ========================================\ninitEP();\ncheckInvite();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
