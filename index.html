document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"17c2e354-5bd6-4d8c-a9b5-0e63a0fabc7f\"><\u002Fscript>\n<script src=\"31919133-049e-4252-b4d0-6610e37637ce\" crossorigin=\"anonymous\"><\u002Fscript>\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\n:root{\n  --gold:#6C5CE7;--gold2:#9C8CFF;--green:#22c55e;--red:#ef4444;\n  --s1:#111219;--s2:#191b24;--s3:#21232f;--s4:#2b2e3d;\n  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.12);\n  --text:#f3f2f8;--muted:#5c5f70;--muted2:#8b8ea3;--bg:#0a0a0f;\n}\nbody{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}\n.hidden{display:none!important}\nbutton{cursor:pointer;font-family:'Inter',sans-serif}\ninput{font-family:'Inter',sans-serif}\n\n/* ═══════════════════════════════════════\n   SPLASH\n═══════════════════════════════════════ */\n#screen-splash{display:none;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}\n#screen-splash.active{display:flex}\n.splash-wrap{text-align:center}\n.splash-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;color:var(--gold);border:1px solid rgba(108,92,231,.3);padding:5px 16px;border-radius:20px;margin-bottom:20px;text-transform:uppercase}\n.splash-title{font-family:'Oswald',sans-serif;font-size:72px;letter-spacing:6px;line-height:.95;background:linear-gradient(135deg,var(--text) 0%,var(--gold2) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.splash-loader{display:flex;gap:6px;justify-content:center;margin-top:28px}\n.splash-loader span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:ld .8s ease-in-out infinite}\n.splash-loader span:nth-child(2){animation-delay:.15s}\n.splash-loader span:nth-child(3){animation-delay:.3s}\n@keyframes ld{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}\n\n/* ═══════════════════════════════════════\n   FIREBASE SETUP\n═══════════════════════════════════════ */\n#screen-setup{display:none;min-height:100vh;padding:20px;background:var(--bg)}\n#screen-setup.active{display:flex;align-items:center;justify-content:center}\n.setup-card{width:100%;max-width:520px;background:var(--s2);border:1px solid var(--bd2);border-radius:20px;padding:32px;position:relative;overflow:hidden}\n.setup-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}\n.setup-card h2{font-family:'Oswald',sans-serif;font-size:28px;letter-spacing:2px;color:var(--gold);margin-bottom:6px}\n.setup-card .sub{font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:22px}\n.setup-card ol{color:var(--muted2);font-size:13px;line-height:2.2;padding-left:18px;margin-bottom:22px}\n.setup-card ol a{color:var(--gold);text-decoration:none}\n.sfield{margin-bottom:12px}\n.sfield label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.8px;text-transform:uppercase;font-weight:600}\n.sfield input{width:100%;background:var(--s3);border:1px solid var(--bd2);color:var(--text);padding:10px 14px;border-radius:10px;font-size:13px;outline:none;transition:border-color .2s}\n.sfield input:focus{border-color:var(--gold)}\n.sfield input::placeholder{color:var(--muted)}\n\n/* ═══════════════════════════════════════\n   AUTH SCREEN — PREMIUM REDESIGN\n═══════════════════════════════════════ */\n#screen-auth{\n  display:none;min-height:100vh;position:relative;overflow:hidden;\n  background:var(--bg);\n}\n#screen-auth.active{display:flex}\n/* Animated gradient background */\n.auth-bg{\n  position:absolute;inset:0;z-index:0;\n  background:\n    radial-gradient(ellipse 80% 60% at 15% 50%, rgba(108,92,231,0.07) 0%, transparent 70%),\n    radial-gradient(ellipse 60% 80% at 85% 20%, rgba(0,100,255,0.06) 0%, transparent 60%),\n    radial-gradient(ellipse 50% 50% at 50% 80%, rgba(108,92,231,0.04) 0%, transparent 60%);\n}\n/* Animated grid lines */\n.auth-grid{\n  position:absolute;inset:0;z-index:0;\n  background-image:\n    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);\n  background-size:60px 60px;\n  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);\n}\n/* Left branding panel */\n.auth-left{\n  flex:1;display:flex;flex-direction:column;justify-content:center;\n  padding:60px 56px;position:relative;z-index:1;\n}\n.auth-eyebrow{\n  display:inline-flex;align-items:center;gap:8px;\n  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;\n  letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:28px;\n}\n.auth-eyebrow-line{width:32px;height:1px;background:var(--gold);opacity:.6}\n.auth-main-title{\n  font-family:'Oswald',sans-serif;\n  font-size:clamp(56px,8vw,100px);\n  letter-spacing:3px;line-height:.92;\n  background:linear-gradient(150deg,#ffffff 0%,var(--gold2) 45%,var(--gold) 100%);\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\n  margin-bottom:20px;\n}\n.auth-subtitle{\n  font-size:15px;color:var(--muted2);line-height:1.7;\n  max-width:380px;margin-bottom:44px;font-weight:300;\n}\n.auth-features{display:flex;flex-direction:column;gap:14px}\n.auth-feat{display:flex;align-items:center;gap:14px}\n.auth-feat-icon{\n  width:36px;height:36px;border-radius:10px;\n  background:rgba(108,92,231,0.1);border:1px solid rgba(108,92,231,0.2);\n  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;\n}\n.auth-feat-text{font-size:13px;color:var(--muted2);line-height:1.4}\n.auth-feat-text strong{color:var(--text);font-weight:500;display:block;font-size:13px}\n/* Trophy decoration */\n.auth-trophy{\n  position:absolute;right:-40px;top:50%;transform:translateY(-50%);\n  font-size:340px;opacity:0.03;line-height:1;pointer-events:none;\n  filter:blur(2px);\n}\n/* Right form panel */\n.auth-right{\n  width:440px;flex-shrink:0;display:flex;align-items:center;justify-content:center;\n  padding:40px 48px;position:relative;z-index:1;\n  background:rgba(13,17,23,0.6);border-left:1px solid var(--bd);\n  backdrop-filter:blur(12px);\n}\n.auth-form-wrap{width:100%}\n.auth-form-header{margin-bottom:28px}\n.auth-form-header h2{font-family:'Oswald',sans-serif;font-size:30px;letter-spacing:2px;color:var(--text);margin-bottom:4px}\n.auth-form-header p{font-size:13px;color:var(--muted2)}\n/* TABS */\n.auth-tabs{display:flex;background:var(--s3);border:1px solid var(--bd);border-radius:12px;padding:4px;margin-bottom:24px}\n.atab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--muted2);border-radius:9px;transition:all .25s}\n.atab.active{background:var(--gold);color:#fff;font-weight:600}\n/* FIELDS */\n.fg{margin-bottom:16px}\n.fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;font-weight:600}\n.fg input{\n  width:100%;background:var(--s3);border:1.5px solid var(--bd2);\n  color:var(--text);padding:11px 14px;border-radius:10px;font-size:14px;outline:none;\n  transition:border-color .2s,box-shadow .2s;\n}\n.fg input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(108,92,231,0.1)}\n.fg input::placeholder{color:var(--muted)}\n/* SUBMIT BTN */\n.btn-auth{\n  width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:600;border:none;\n  background:linear-gradient(135deg,var(--gold) 0%,#4A3FB0 100%);\n  color:#fff;letter-spacing:.3px;transition:all .2s;margin-top:4px;\n  position:relative;overflow:hidden;\n}\n.btn-auth::after{\n  content:'';position:absolute;inset:0;\n  background:linear-grad e:20px;font-weight:700;letter-spacing:.5px;color:var(--text);margin-bottom:3px}\n.gbox p{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;font-weight:500}\n.ilink{display:flex;gap:8px;align-items:center}\n.ilinkin{flex:1;background:var(--s1);border:1px solid var(--bd2);color:var(--muted2);padding:8px 12px;border-radius:8px;font-size:11px;font-family:monospace;min-width:0}\n.cbtn{padding:8px 14px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .2s}\n.cbtn:hover{background:var(--gold2);transform:translateY(-1px)}\n.mlist{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}\n.mchip{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--s3);border:1px solid var(--bd);border-radius:20px;font-size:12px;font-weight:500}\n.mchip.adm{border-color:rgba(255,61,61,0.25);color:#ff8a8a}\n\n/* ADMIN */\n.rrow{padding:10px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-wrap:wrap}\n.ri{width:46px;background:var(--s1);border:1.5px solid rgba(108,92,231,0.25);color:var(--gold);font-family:'Oswald',sans-serif;font-size:24px;text-align:center;padding:5px 2px;border-radius:8px;outline:none;transition:border-color .2s}\n.ri:focus{border-color:var(--gold)}\n.bnote{background:rgba(58,123,255,0.06);border:1px solid rgba(58,123,255,0.15);border-radius:10px;padding:10px 14px;font-size:12px;color:#7ab8ff;margin-bottom:14px;line-height:1.6}\n\n/* BUTTONS */\n.btn{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;border:none;transition:all .2s;letter-spacing:.2px}\n.btn-gold{background:linear-gradient(135deg,var(--gold),#4A3FB0);color:#fff}\n.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,92,231,0.25)}\n.btn-full{width:100%;padding:12px}\n.btn-out{background:var(--s4);color:var(--muted2);border:1px solid var(--bd2)}\n.btn-out:hover{color:var(--text);border-color:var(--bd2)}\n.btn-red{background:linear-gradient(135deg,var(--red),#c41a1a);color:#fff}\n.btn-red:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,61,61,0.25)}\n.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}\n\n/* MODAL */\n.overlay{display:none;position:fixed;inset:0;background:rgba(4,7,13,0.85);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}\n.overlay.show{display:flex}\n.modal{background:var(--s2);border:1px solid var(--bd2);border-radius:20px;padding:28px;max-width:420px;width:100%;text-align:center;position:relative;overflow:hidden}\n.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}\n.modal h3{font-family:'Oswald',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px;margin-bottom:8px}\n.modal p{font-size:13px;color:var(--muted2);line-height:1.8;margin-bottom:22px}\n.mact{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}\n\n/* SYNC STATUS */\n.sync-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}\n.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}\n.sync-dot.off{background:var(--red)}\n.sync-dot.sync{background:var(--gold);animation:blink 1s infinite}\n\n/* FILTER */\n.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}\n.fb{padding:5px 13px;background:var(--s3);border:1px solid var(--bd);border-radius:20px;font-size:12px;color:var(--muted2);cursor:pointer;transition:all .2s;font-weight:500}\n.fb.active{background:rgba(108,92,231,0.12);border-color:rgba(108,92,231,0.3);color:var(--gold)}\n.fb:hover:not(.active){border-color:var(--bd2);color:var(--text)}\n\n/* BONUS INFO */\n.binfo{background:rgba(255,61,61,0.06);border:1px solid rgba(255,61,61,0.15);border-radius:10px;padding:11px 14px;font-size:12px;color:#ff8a8a;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}\n\n/* DETAIL TABLE */\n.dtbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}\n.dtbl th{color:var(--muted);font-weight:600;padding:5px 8px;text-align:left;border-bottom:1px solid var(--bd);font-size:11px;letter-spacing:.5px;text-transform:uppercase}\n.dtbl td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.03)}\n.dtbl tr:last-child td{border-bottom:none}\n.dtbl tr.mer td{color:var(--gold)}\n.ptsc{font-family:'Oswald',sans-serif;font-size:18px;color:var(--gold)}\n.ptsc.z{color:var(--muted)}\n\n/* TOAST */\n.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s3);border:1px solid var(--bd2);color:var(--text);padding:10px 22px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 8px 32px rgba(0,0,0,0.5)}\n.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}\n\n/* PWA INSTALL BANNER */\n.pwa-banner{\n  position:fixed;bottom:72px;left:12px;right:12px;z-index:150;\n  background:linear-gradient(135deg,var(--s3),var(--s4));\n  border:1px solid rgba(108,92,231,0.3);border-radius:16px;\n  padding:14px 16px;display:none;align-items:center;gap:12px;\n  box-shadow:0 8px 32px rgba(0,0,0,0.6);backdrop-filter:blur(12px);\n  animation:slideup .4s cubic-bezier(.34,1.56,.64,1);\n}\n.pwa-banner.show{display:flex}\n@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}\n.pwa-banner-icon{font-size:36px;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}\n.pwa-banner-text{flex:1;min-width:0}\n.pwa-banner-text strong{display:block;font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}\n.pwa-banner-text span{font-size:12px;color:var(--muted2);line-height:1.4}\n.pwa-banner-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}\n.pwa-install-btn{padding:8px 16px;background:linear-gradient(135deg,var(--gold),#4A3FB0);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}\n.pwa-install-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(108,92,231,.3)}\n.pwa-dismiss-btn{padding:6px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;text-align:center;line-height:1}\n.pwa-dismiss-btn:hover{color:var(--text)}\n/* iOS install hint */\n.ios-hint{\n  position:fixed;bottom:72px;left:12px;right:12px;z-index:150;\n  background:var(--s3);border:1px solid rgba(108,92,231,0.25);border-radius:16px;\n  padding:14px 16px;display:none;\n  box-shadow:0 8px 32px rgba(0,0,0,0.6);\n  animation:slideup .4s cubic-bezier(.34,1.56,.64,1);\n}\n.ios-hint.show{display:block}\n.ios-hint p{font-size:13px;color:var(--muted2);line-height:1.7;text-align:center}\n.ios-hint strong{color:var(--text)}\n.ios-hint .ios-arrow{text-align:center;font-size:24px;margin-top:6px;animation:bounce .8s infinite alternate}\n@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(6px)}}\n.ios-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}\n\n\n/* NO GROUP MODAL */\n.nogroup-overlay{\n  display:none;position:fixed;inset:0;background:rgba(4,7,13,0.92);\n  z-index:300;align-items:center;justify-content:center;padding:20px;\n  backdrop-filter:blur(8px);\n}\n.nogroup-overlay.show{display:flex}\n.nogroup-card{\n  background:var(--s2);border:1px solid var(--bd2);border-radius:20px;\n  padding:32px;max-width:420px;width:100%;text-align:center;\n  position:relative;overflow:hidden;\n}\n.nogroup-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}\n.nogroup-card h3{font-family:'Oswald',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px;margin-bottom:8px}\n.nogroup-card p{font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:20px}\n.nogroup-or{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--muted);font-size:12px}\n.nogroup-or::before,.nogroup-or::after{content:'';flex:1;height:1px;background:var(--bd2)}\n\n\n/* INVITE CODE */\n.code-input {\n  width:100%;background:var(--s1);border:2px solid var(--bd2);\n  color:var(--gold);padding:14px;border-radius:12px;\n  font-size:28px;font-weight:700;text-align:center;letter-spacing:8px;\n  outline:none;text-transform:uppercase;font-family:'Oswald',sans-serif;\n  transition:border-color .2s,box-shadow .2s;\n}\n.code-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(108,92,231,0.15)}\n.code-input::placeholder{color:var(--muted);letter-spacing:4px;font-size:20px}\n.code-badge{\n  display:inline-block;background:rgba(108,92,231,0.1);border:1px solid rgba(108,92,231,0.3);\n  color:var(--gold);font-family:'Oswald',sans-serif;font-size:32px;letter-spacing:6px;\n  padding:8px 20px;border-radius:10px;cursor:pointer;transition:all .2s;\n}\n.code-badge:hover{background:rgba(108,92,231,0.2)}\n\n\n/* NOTIF BANNER */\n.notif-banner{\n  position:fixed;top:60px;left:12px;right:12px;z-index:150;\n  background:linear-gradient(135deg,var(--s3),var(--s4));\n  border:1px solid rgba(108,92,231,0.3);border-radius:16px;\n  padding:14px 16px;display:none;align-items:center;gap:12px;\n  box-shadow:0 8px 32px rgba(0,0,0,0.5);\n  animation:slidedown .4s cubic-bezier(.34,1.56,.64,1);\n}\n.notif-banner.show{display:flex}\n@keyframes slidedown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}\n.notif-banner-icon{font-size:30px;flex-shrink:0}\n.notif-banner-text{flex:1;min-width:0}\n.notif-banner-text strong{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}\n.notif-banner-text span{font-size:11px;color:var(--muted2);line-height:1.4}\n.notif-enable-btn{padding:8px 14px;background:linear-gradient(135deg,var(--gold),#4A3FB0);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}\n.notif-dismiss{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}\n\n\n/* IN-APP MESSAGES */\n.inapp-msg{\n  position:fixed;top:60px;left:12px;right:12px;z-index:140;\n  border-radius:14px;padding:14px 16px;\n  display:none;align-items:center;gap:12px;\n  box-shadow:0 8px 32px rgba(0,0,0,0.5);\n  animation:slidedown .35s cubic-bezier(.34,1.56,.64,1);\n  max-width:860px;margin:0 auto;\n}\n.inapp-msg.show{display:flex}\n.inapp-msg.type-info{background:linear-gradient(135deg,#1a2540,#1e2d50);border:1px solid rgba(58,123,255,0.3)}\n.inapp-msg.type-gold{background:linear-gradient(135deg,#1e1a0a,#2a2208);border:1px solid rgba(108,92,231,0.4)}\n.inapp-msg.type-green{background:linear-gradient(135deg,#0a1e14,#0d2218);border:1px solid rgba(0,230,118,0.3)}\n.inapp-msg.type-red{background:linear-gradient(135deg,#1e0a0a,#220d0d);border:1px solid rgba(255,61,61,0.3)}\n.inapp-msg-icon{font-size:28px;flex-shrink:0}\n.inapp-msg-body{flex:1;min-width:0}\n.inapp-msg-body strong{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}\n.inapp-msg-body span{font-size:12px;color:var(--muted2);line-height:1.4}\n.inapp-msg-action{padding:7px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:Inter,sans-serif}\n.inapp-msg-action.gold{background:var(--gold);color:#fff}\n.inapp-msg-action.blue{background:#3a7bff;color:#fff}\n.inapp-msg-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1}\n\n\n/* ===== CHAT ===== */\n.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 120px)}\n.chat-messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:6px}\n/* FIX: Keep input visible above keyboard on mobile */\n@supports (-webkit-touch-callout: none) {\n  .chat-wrap{height:calc(100svh - 120px)}\n  .chat-input-row{position:sticky;bottom:0;background:var(--bg);padding-bottom:env(safe-area-inset-bottom,8px)}\n}\n.chat-msg{display:flex;gap:8px;align-items:flex-start;padding:4px 0}\n.chat-msg.me{flex-direction:row-reverse}\n.chat-avatar{width:32px;height:32px;border-radius:50%;background:var(--s3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}\n.chat-bubble{max-width:75%;background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:8px 12px;position:relative}\n.chat-msg.me .chat-bubble{background:rgba(108,92,231,0.1);border-color:rgba(108,92,231,0.2);border-radius:14px 4px 14px 14px}\n.chat-msg:not(.me) .chat-bubble{border-radius:4px 14px 14px 14px}\n.chat-sender{font-size:11px;font-weight:600;color:var(--gold);margin-bottom:3px}\n.chat-msg.me .chat-sender{display:none}\n.chat-text{font-size:13px;line-height:1.5;color:var(--text);word-break:break-word}\n.chat-time{font-size:10px;color:var(--muted);margin-top:3px;text-align:right}\n.chat-input-row{display:flex;gap:8px;align-items:center;padding:10px 0 4px;border-top:1px solid var(--bd);margin-top:8px}\n.chat-input{flex:1;background:var(--s2);border:1.5px solid var(--bd2);color:var(--text);padding:10px 14px;border-radius:20px;font-size:14px;outline:none;transition:border-color .2s;font-family:Inter,sans-serif}\n.chat-input:focus{border-color:var(--gold)}\n.chat-input::placeholder{color:var(--muted)}\n.chat-send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#4A3FB0);border:none;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}\n.chat-send-btn:hover{transform:scale(1.08)}\n.chat-send-btn:active{transform:scale(.95)}\n.chat-day-sep{text-align:center;font-size:10px;color:var(--muted);letter-spacing:.5px;padding:6px 0;text-transform:uppercase}\n.chat-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 20px;line-height:1.8}\n.chat-match-ref{background:rgba(108,92,231,0.07);border:1px solid rgba(108,92,231,0.15);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--gold);margin-bottom:5px;display:inline-block}\n/* Quick reactions */\n.chat-reactions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}\n.react-btn{background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:5px 12px;font-size:16px;cursor:pointer;transition:all .15s;color:var(--text)}\n.react-btn:hover{background:var(--s3);border-color:var(--bd2);transform:scale(1.1)}\n.chat-group-selector{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}\n.chat-grp-btn{padding:5px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:20px;font-size:12px;color:var(--muted2);cursor:pointer;font-weight:500;transition:all .2s}\n.chat-grp-btn.active{background:rgba(108,92,231,0.12);border-color:rgba(108,92,231,0.3);color:var(--gold)}\n\n\n.next-match-bar{background:linear-gradient(135deg,rgba(108,92,231,0.08),rgba(108,92,231,0.02));border:1px solid rgba(108,92,231,0.2);border-radius:12px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}\n.next-match-info{display:flex;align-items:center;gap:10px;font-size:13px}\n.next-match-info span:first-child{color:var(--muted2)}\n.next-match-info strong{color:var(--gold)}\n.next-match-countdown{font-family:'Oswald',sans-serif;font-size:20px;color:var(--gold);background:rgba(0,0,0,0.3);padding:4px 12px;border-radius:20px}\n\n/* Twemoji flag images */\nimg.emoji{height:1em;width:1em;margin:0 .05em 0 .1em;vertical-align:-0.1em}\n.fl img.emoji{height:30px;width:30px;vertical-align:middle}\n.team .fl img.emoji{height:30px;width:30px}\n#ep img.emoji{height:26px;width:26px}\n.chat-avatar img.emoji{height:17px;width:17px}\n.pemo img.emoji{height:28px;width:28px}\n.lav img.emoji{height:17px;width:17px}\n.avsm img.emoji{height:15px;width:15px}\n.mchip img.emoji{height:12px;width:12px}\n.code-badge img.emoji{height:32px;width:32px}\n\n/* ===== THEMES ===== */\nhtml[data-theme=\"midnight\"]{\n  --gold:#6C5CE7;--gold2:#9C8CFF;--green:#22c55e;--red:#ef4444;\n  --s1:#111219;--s2:#191b24;--s3:#21232f;--s4:#2b2e3d;\n  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.12);\n  --text:#f3f2f8;--muted:#5c5f70;--muted2:#8b8ea3;--bg:#0a0a0f;\n}\nhtml[data-theme=\"light\"]{\n  --gold:#c79a2e;--gold2:#e0b94f;--green:#0a9d4e;--red:#dc2626;\n  --s1:#ffffff;--s2:#f4f6fa;--s3:#e8ecf3;--s4:#dde3ee;\n  --bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.15);\n  --text:#1a1f2e;--muted:#8a93a6;--muted2:#5a6478;--bg:#eef1f7;\n}\nhtml[data-theme=\"ocean\"]{\n  --gold:#4dd0e1;--gold2:#80deea;--green:#26e0a8;--red:#ff5277;\n  --s1:#0a1922;--s2:#0f2530;--s3:#163341;--s4:#1e4150;\n  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.14);\n  --text:#e8f4f8;--muted:#4a7a8a;--muted2:#7aa5b5;--bg:#06121a;\n}\nhtml[data-theme=\"forest\"]{\n  --gold:#a3d977;--gold2:#c5e8a0;--green:#5fd35f;--red:#ff6b5b;\n  --s1:#0d1810;--s2:#152318;--s3:#1d3122;--s4:#27412d;\n  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.13);\n  --text:#eaf5e8;--muted:#5a7a5e;--muted2:#85a888;--bg:#080f0a;\n}\nhtml[data-theme=\"sunset\"]{\n  --gold:#ff9e5e;--gold2:#ffc08a;--green:#4ade80;--red:#ff4d6d;\n  --s1:#1a0f14;--s2:#26161d;--s3:#331f28;--s4:#412833;\n  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.14);\n  --text:#fdeef0;--muted:#8a5a68;--muted2:#b585968;--bg:#120a0e;\n}\nhtml[data-theme=\"royal\"]{\n  --gold:#b794f6;--gold2:#d6bcfa;--green:#48e8b0;--red:#ff5577;\n  --s1:#130d1f;--s2:#1d1530;--s3:#291e42;--s4:#352855;\n  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.14);\n  --text:#f0eaf8;--muted:#6a5a8a;--muted2:#9585b5;--bg:#0d0817;\n}\n/* Theme picker UI */\n.theme-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}\n.theme-swatch{width:42px;height:42px;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;display:flex;align-items:center;justify-content:center;font-size:18px}\n.theme-swatch.active{border-color:var(--gold);transform:scale(1.1)}\n.theme-swatch:hover{transform:scale(1.08)}\n\n.hof-section{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-top:16px;margin-bottom:16px}\n.hof-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px}\n.hof-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px}\n.hof-row:last-child{border-bottom:none}\n.hof-emoji{font-size:18px;flex-shrink:0}\n.hof-user{font-weight:600;color:var(--gold)}\n.hof-detail{flex:1;color:var(--muted2);font-size:12px}\n.hof-pts{font-family:'Oswald',sans-serif;font-size:18px;color:var(--green)}\n\n/* BRACKET TREE */\n.bracket-tree{display:flex;overflow-x:auto;gap:0;padding:10px 0 20px;min-height:500px;-webkit-overflow-scrolling:touch}\n.bracket-round{display:flex;flex-direction:column;justify-content:space-around;min-width:160px;flex-shrink:0;position:relative;padding:0 6px}\n.bracket-round-title{position:sticky;top:0;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--muted);text-align:center;padding:6px 0;margin-bottom:8px;background:var(--bg);z-index:2}\n.bracket-round-mult{font-size:10px;color:var(--gold);font-family:'Inter',sans-serif;letter-spacing:0}\n.bm{background:var(--s2);border:1px solid var(--bd);border-radius:10px;margin:4px 0;overflow:hidden;min-width:148px;position:relative;transition:border-color .2s}\n.bm.has-result{border-color:rgba(0,230,118,0.15)}\n.bm.is-live{border-color:rgba(255,148,68,0.4);animation:livepulse 2s infinite}\n.bm.is-final{border-color:rgba(108,92,231,0.5);background:linear-gradient(135deg,var(--s2),rgba(108,92,231,0.06))}\n.bm-team{display:flex;align-items:center;gap:6px;padding:6px 8px;font-size:11px;font-weight:600;transition:background .15s}\n.bm-team:first-child{border-bottom:1px solid var(--bd)}\n.bm-team.w{color:var(--green);background:rgba(0,230,118,0.04)}\n.bm-flag{font-size:15px;width:20px;text-align:center;flex-shrink:0}\n.bm-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n.bm-score{font-family:'Oswald',sans-serif;font-size:17px;color:var(--gold);min-width:16px;text-align:right}\n.bm-team.w .bm-score{color:var(--green)}\n.bm-bet{font-size:9px;color:var(--muted2);text-align:center;padding:2px 6px;background:var(--s1);border-top:1px solid var(--bd)}\n.bm-live{position:absolute;top:3px;right:4px;font-size:8px;color:#ff9444;font-weight:700;letter-spacing:.5px}\n.bracket-connector{position:relative;width:16px;flex-shrink:0;min-width:16px}\n.bracket-champion{text-align:center;padding:16px;background:linear-gradient(135deg,rgba(108,92,231,0.1),rgba(108,92,231,0.05));border:2px solid var(--gold);border-radius:16px;margin-bottom:16px}\n.bracket-3rd{margin-top:16px;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:12px}\n.bracket-tabs{display:flex;gap:6px;margin-bottom:12px}\n.bracket-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s3);color:var(--muted2)}\n.bracket-tab.active{background:rgba(108,92,231,0.12);border-color:rgba(108,92,231,0.3);color:var(--gold)}\n\n.bnav-badge{position:absolute;top:2px;right:50%;transform:translateX(18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;line-height:1}\n\n/* PHASE ÉLIMINATOIRE - BANNIÈRE */\n.phase-banner{background:linear-gradient(135deg,#171225,#241a3d);border:1px solid rgba(108,92,231,0.4);border-radius:14px;padding:14px 18px;margin-bottom:16px;position:relative;overflow:hidden}\n.phase-banner::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(108,92,231,0.15),transparent);animation:shimmer 3s infinite}\n@keyframes shimmer{0%{left:-100%}50%,100%{left:100%}}\n.phase-banner-content{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px}\n.phase-banner-title{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold);line-height:1}\n.phase-banner-sub{font-size:11px;color:var(--muted2);margin-top:2px}\n.phase-banner-mult{background:rgba(108,92,231,0.15);border:1px solid rgba(108,92,231,0.3);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap}\n.phase-banner-teams{text-align:center;flex-shrink:0}\n.phase-banner-teams-num{font-family:'Oswald',sans-serif;font-size:26px;color:var(--gold);line-height:1}\n.phase-banner-teams-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}\n\n/* CARTES KNOCKOUT PREMIUM */\n.mc.knockout{border:1px solid rgba(108,92,231,0.25);background:linear-gradient(135deg,var(--s2),rgba(108,92,231,0.03))}\n.mc.knockout::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.6}\n.mc.knockout .mh{position:relative}\n.mc.knockout.final-stage{border-color:rgba(108,92,231,0.5);box-shadow:0 0 20px rgba(108,92,231,0.08)}\n\n/* COMPTE À REBOURS PROCHAIN CHOC */\n.next-clash{background:linear-gradient(135deg,rgba(232,65,65,0.08),rgba(108,92,231,0.05));border:1px solid rgba(232,65,65,0.2);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}\n.next-clash-icon{font-size:24px}\n.next-clash-info{flex:1}\n.next-clash-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}\n.next-clash-teams{font-size:14px;font-weight:700;color:var(--text);margin:2px 0}\n.next-clash-time{font-family:'Oswald',sans-serif;font-size:20px;color:var(--gold)}\n\n/* ===== L'AFFICHE — SHOWDOWN HERO (SF/FIN) ===== */\n.showdown{position:relative;border-radius:18px;overflow:hidden;margin-bottom:18px;border:1px solid rgba(108,92,231,0.35);background:var(--s1)}\n.showdown.finale{border-color:var(--gold);box-shadow:0 0 40px rgba(108,92,231,0.15),inset 0 0 60px rgba(108,92,231,0.04)}\n.showdown-split{position:absolute;inset:0;background:linear-gradient(115deg,var(--s3) 0%,var(--s2) 49.5%,rgba(108,92,231,0.9) 49.8%,rgba(108,92,231,0.9) 50.2%,var(--s2) 50.5%,var(--s1) 100%)}\n.showdown-sweep{position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,0.06) 50%,transparent 70%);background-size:300% 100%;animation:sweep 6s ease-in-out infinite}\n@keyframes sweep{0%,100%{background-position:120% 0}50%{background-position:-20% 0}}\n@media (prefers-reduced-motion: reduce){.showdown-sweep{animation:none}}\n.showdown-inner{position:relative;z-index:2;padding:18px 14px 14px}\n.showdown-ribbon{text-align:center;margin-bottom:12px}\n.showdown-ribbon-label{display:inline-block;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:4px;color:var(--gold);border:1px solid rgba(108,92,231,0.4);border-radius:20px;padding:4px 18px;background:rgba(108,92,231,0.08)}\n.showdown.finale .showdown-ribbon-label{font-size:18px;letter-spacing:6px;background:rgba(108,92,231,0.15)}\n.showdown-trophy{font-size:34px;display:block;margin-bottom:4px;filter:drop-shadow(0 0 12px rgba(108,92,231,0.5))}\n.showdown-teams{display:flex;align-items:center;justify-content:space-between;gap:8px}\n.showdown-team{flex:1;text-align:center;min-width:0}\n.showdown-flag{font-size:56px;line-height:1;display:block;margin-bottom:6px}\n.showdown-flag img{width:64px!important;height:64px!important;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}\n.showdown-name{font-family:'Oswald',sans-serif;font-size:24px;letter-spacing:1.5px;color:var(--text);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.showdown-vs{flex-shrink:0;width:64px;height:64px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--gold2),var(--gold) 60%,#2E2570);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(108,92,231,0.4),inset 0 2px 4px rgba(255,255,255,0.3);border:2px solid rgba(255,255,255,0.2)}\n.showdown-vs-txt{font-family:'Oswald',sans-serif;font-size:22px;color:#1a1030;line-height:1;letter-spacing:1px}\n.showdown-count{text-align:center;margin-top:12px}\n.showdown-count-time{font-family:'Oswald',sans-serif;font-size:30px;color:var(--gold);letter-spacing:2px;line-height:1}\n.showdown-count-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:2px}\n.showdown-ticket{margin-top:12px;display:flex;justify-content:center}\n.showdown-ticket-stub{display:inline-flex;align-items:center;gap:10px;background:var(--s1);border:1px dashed rgba(108,92,231,0.5);border-radius:10px;padding:7px 16px;font-size:12px}\n.showdown-ticket-stub .tk-lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px}\n.showdown-ticket-stub .tk-score{font-family:'Oswald',sans-serif;font-size:20px;color:var(--gold);letter-spacing:2px}\n.showdown-live{position:absolute;top:10px;right:12px;z-index:3;background:rgba(255,61,61,0.15);border:1px solid rgba(255,61,61,0.4);color:#ff6b6b;font-size:10px;font-weight:700;letter-spacing:1px;border-radius:12px;padding:3px 10px;animation:livepulse 1.8s infinite}\n\n/* ===== FINALE GOLD EDITION ===== */\n.showdown-particles{position:absolute;inset:0;z-index:1;pointer-events:none}\n.showdown.imminent{border-color:rgba(108,92,231,0.8);box-shadow:0 0 30px rgba(108,92,231,0.25),inset 0 0 60px rgba(108,92,231,0.06)}\n.showdown.imminent .showdown-sweep{animation-duration:2s}\n.showdown.imminent .showdown-count-time{animation:impulse 1s ease-in-out infinite;color:#C7BFFF}\n@keyframes impulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}\n.showdown-count-time.xxl{font-size:44px;letter-spacing:3px}\n.showdown-seconds{font-size:26px;color:var(--gold2);opacity:.85}\n.showdown-livescore{font-family:'Oswald',sans-serif;font-size:56px;letter-spacing:4px;color:#fff;line-height:1;text-shadow:0 0 24px rgba(108,92,231,0.5)}\n.showdown-livescore.flash{animation:scoreflash .9s ease-out}\n@keyframes scoreflash{0%{transform:scale(1.25);color:var(--gold2);text-shadow:0 0 40px rgba(108,92,231,0.9)}100%{transform:scale(1)}}\n.showdown-livelbl{font-size:11px;color:#ff6b6b;letter-spacing:3px;font-weight:700;margin-top:4px;animation:livepulse 1.8s infinite}\n@media (prefers-reduced-motion:reduce){.showdown-count-time,.showdown-livescore{animation:none!important}}\n\n/* ===== PHASE ACCORDIONS (matchs terminés) ===== */\n.ph-acc{border:1px solid var(--bd);border-radius:14px;margin-bottom:10px;overflow:hidden;background:var(--s2)}\n.ph-acc-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .2s}\n.ph-acc-head:active{background:var(--s3)}\n.ph-acc-title{display:flex;align-items:center;gap:8px;font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:1.5px;color:var(--text)}\n.ph-acc-meta{font-size:11px;color:var(--muted);font-family:Inter,sans-serif;letter-spacing:0}\n.ph-acc-pts{font-size:12px;font-weight:700;color:var(--green)}\n.ph-acc-pts.z{color:var(--muted)}\n.ph-acc-chev{font-size:12px;color:var(--muted);transition:transform .25s}\n.ph-acc.open .ph-acc-chev{transform:rotate(180deg)}\n.ph-acc-body{display:none;padding:10px 10px 4px;border-top:1px solid var(--bd)}\n.ph-acc.open .ph-acc-body{display:block}\n.acc-summary-bar{display:flex;align-items:center;gap:8px;margin:14px 0 8px}\n.acc-summary-bar::before,.acc-summary-bar::after{content:'';flex:1;height:1px;background:var(--bd)}\n.acc-summary-txt{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}\n\n/* ===== SIMULATEUR ET SI ===== */\n.sim-card{background:linear-gradient(160deg,var(--s2),var(--s1));border:1px solid rgba(108,92,231,0.3);border-radius:16px;padding:16px 14px;margin-bottom:16px}\n.sim-title{font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);text-align:center;margin-bottom:4px}\n.sim-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px}\n.sim-grid{display:grid;grid-template-columns:auto repeat(5,1fr);gap:3px;max-width:340px;margin:0 auto}\n.sim-hcell{display:flex;align-items:center;justify-content:center;font-size:14px;padding:4px 2px;color:var(--muted2);font-weight:600}\n.sim-cell{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;background:var(--s3);border:1px solid var(--bd);font-size:15px;transition:transform .15s}\n.sim-cell:active{transform:scale(1.1)}\n.sim-cell .sc{font-size:8px;color:var(--muted);line-height:1;margin-top:1px}\n.sim-cell.mine{background:rgba(108,92,231,0.18);border-color:var(--gold);box-shadow:inset 0 0 10px rgba(108,92,231,0.15)}\n.sim-cell.draw{opacity:.75}\n.sim-cell.mybet::after{content:'📌';position:absolute;top:-4px;right:-4px;font-size:10px}\n.sim-legend{display:flex;justify-content:center;gap:14px;margin-top:10px;font-size:10px;color:var(--muted)}\n.sim-flag-corner{font-size:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1.1}\n.sim-flag-corner span{font-size:7px;color:var(--muted);letter-spacing:.5px}\n\n/* ===== LE SACRE ===== */\n#sacre-overlay{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at 50% 30%,#17121f 0%,#080c14 70%);display:none;flex-direction:column;overflow-y:auto;padding:24px 16px 40px}\n#sacre-overlay.show{display:flex;animation:sacrein .6s ease-out}\n@keyframes sacrein{from{opacity:0}to{opacity:1}}\n#sacre-confetti{position:fixed;inset:0;pointer-events:none;z-index:10000}\n.sacre-crown{font-size:52px;text-align:center;animation:crownfloat 3s ease-in-out infinite}\n@keyframes crownfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}\n.sacre-title{font-family:'Oswald',sans-serif;font-size:38px;letter-spacing:5px;text-align:center;background:linear-gradient(135deg,#fff 0%,var(--gold2) 40%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:4px 0 2px}\n.sacre-sub{font-size:11px;color:var(--muted);text-align:center;letter-spacing:3px;text-transform:uppercase;margin-bottom:22px}\n.sacre-winner{text-align:center;margin-bottom:26px}\n.sacre-winner-emoji{font-size:84px;line-height:1;display:block;filter:drop-shadow(0 8px 30px rgba(108,92,231,0.45));animation:winnerpop .8s cubic-bezier(.2,1.6,.4,1) .3s both}\n@keyframes winnerpop{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}\n.sacre-winner-name{font-family:'Oswald',sans-serif;font-size:32px;letter-spacing:3px;color:var(--gold);margin-top:8px}\n.sacre-winner-pts{font-size:14px;color:var(--text)}\n.sacre-cards{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}\n.sacre-card{flex:0 0 78%;max-width:290px;scroll-snap-align:center;background:linear-gradient(165deg,var(--s2),var(--s1));border:1px solid rgba(108,92,231,0.35);border-radius:18px;padding:22px 18px;text-align:center}\n.sacre-card-icon{font-size:38px;margin-bottom:8px}\n.sacre-card-label{font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px}\n.sacre-card-value{font-family:'Oswald',sans-serif;font-size:30px;letter-spacing:2px;color:var(--gold);line-height:1.1}\n.sacre-card-detail{font-size:12px;color:var(--muted2);margin-top:6px;line-height:1.4}\n.sacre-close{display:block;margin:18px auto 0;background:linear-gradient(135deg,var(--gold),#4A3FB0);color:#12100a;border:none;border-radius:24px;padding:12px 34px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px}\n.sacre-replay-btn{background:rgba(108,92,231,0.1);border:1px solid rgba(108,92,231,0.25);border-radius:20px;padding:6px 14px;font-size:11px;color:var(--gold);cursor:pointer}\n.mc,.gbox,.lbt,.ptable,.sc,.pod,.modal,.setup-card,.ph-acc,.bm,.showdown,.sim-card,.hof-section{box-shadow:0 3px 14px rgba(0,0,0,.35)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- SPLASH -->\n<div class=\"screen active\" id=\"screen-splash\">\n  <div class=\"splash-wrap\">\n    <div class=\"splash-badge\">Paris entre amis · Edition 2026<\u002Fdiv>\n    <div class=\"splash-title\">WORLD CUP<br>2026<\u002Fdiv>\n    <div class=\"splash-loader\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FIREBASE SETUP -->\n<div class=\"screen hidden\" id=\"screen-setup\">\n  <div style=\"display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)\">\n  <div class=\"setup-card\">\n    <h2>⚙️ Configuration Firebase<\u002Fh2>\n    <button class=\"btn-gold btn-full\" style=\"margin-top:8px\" onclick=\"saveFirebaseConfig()\">🚀 Connecter<\u002Fbutton>\n  <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- AUTH SCREEN -->\n<div class=\"screen\" id=\"screen-auth\">\n  <div class=\"auth-bg\"><\u002Fdiv>\n  <div class=\"auth-grid\"><\u002Fdiv>\n  <div style=\"position:fixed;top:16px;right:16px;z-index:10\">\n    <button onclick=\"showAdminLogin()\" style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--muted);font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:Inter,sans-serif\">⚙️ Admin<\u002Fbutton>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;width:100%;position:relative;z-index:1\">\n    <div style=\"text-align:center;margin-bottom:28px\">\n      <div style=\"font-family:'Oswald',sans-serif;font-size:clamp(42px,8vw,68px);letter-spacing:4px;line-height:.95;background:linear-gradient(135deg,var(--text) 0%,var(--gold2) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text\">WORLD CUP<br>2026<\u002Fdiv>\n      <div style=\"font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;color:var(--muted);margin-top:6px;text-transform:uppercase\">Paris entre amis<\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"invite-bar\" class=\"invite-bar hidden\" style=\"max-width:420px;width:100%;margin-bottom:14px\">\n      <strong id=\"invite-gname\">Groupe<\u002Fstrong> Vous avez été invité !\n    <\u002Fdiv>\n    <div style=\"background:rgba(22,27,39,0.88);border:1px solid var(--bd2);border-radius:20px;padding:26px;width:100%;max-width:420px;backdrop-filter:blur(12px);position:relative;overflow:hidden\">\n      <div style=\"position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)\"><\u002Fdiv>\n      <div class=\"auth-tabs\" style=\"margin-bottom:20px\">\n        <button class=\"atab active\" onclick=\"switchAuthTab('login')\">Se connecter<\u002Fbutton>\n        <button class=\"atab\" onclick=\"switchAuthTab('register')\">Créer un compte<\u002Fbutton>\n      <\u002Fdiv>\n      <!-- LOGIN -->\n      <div id=\"form-login\">\n        <div class=\"fg\"><label>Pseudo<\u002Flabel><input type=\"text\" id=\"lu\" placeholder=\"votre pseudo...\" maxlength=\"20\" autocomplete=\"username\"><\u002Fdiv>\n        <div class=\"fg\"><label>Mot de passe<\u002Flabel><input type=\"password\" id=\"lp\" placeholder=\"••••••••\" autocomplete=\"current-password\"><\u002Fdiv>\n        <button class=\"btn-auth\" onclick=\"doLogin()\">Se connecter →<\u002Fbutton>\n        <div id=\"login-err\" class=\"err\" style=\"margin-top:8px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- REGISTER -->\n      <div id=\"form-register\" class=\"hidden\">\n        <div class=\"fg\"><label>Pseudo<\u002Flabel><input type=\"text\" id=\"ru\" placeholder=\"votre pseudo...\" maxlength=\"20\"><\u002Fdiv>\n        <div class=\"fg\"><label>⭐ Équipe favorite<\u002Flabel><div class=\"ep-wrap\" id=\"ep\"><\u002Fdiv><input type=\"hidden\" id=\"re\" value=\"🇫🇷\"><\u002Fdiv>\n        <div class=\"fg\"><label>Mot de passe (min. 4 car.)<\u002Flabel><input type=\"password\" id=\"rp\" placeholder=\"••••••••\" minlength=\"4\"><\u002Fdiv>\n        <button class=\"btn-auth\" onclick=\"doRegister()\">Créer mon compte →<\u002Fbutton>\n        <div id=\"reg-err\" class=\"err\" style=\"margin-top:8px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- ADMIN LOGIN -->\n      <div id=\"form-admin\" class=\"hidden\">\n        <div style=\"background:rgba(232,65,65,0.07);border:1px solid rgba(232,65,65,0.2);border-radius:10px;padding:12px;margin-bottom:14px;text-align:center\">\n          <div style=\"font-size:13px;color:#ff8a8a;font-weight:600\">🛡️ Connexion Administrateur<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fg\"><label>Mot de passe admin<\u002Flabel><input type=\"password\" id=\"admin-pass-input\" placeholder=\"••••••••\"><\u002Fdiv>\n        <button class=\"btn-auth\" onclick=\"doAdminLogin()\" style=\"background:linear-gradient(135deg,#e84141,#c41a1a)\">Connexion Admin →<\u002Fbutton>\n        <div id=\"admin-err\" class=\"err\" style=\"margin-top:8px\"><\u002Fdiv>\n        <div style=\"text-align:center;margin-top:12px\"><span onclick=\"showNormalLogin()\" style=\"font-size:12px;color:var(--muted);cursor:pointer\">← Retour<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:14px;font-size:11px;color:var(--muted);text-align:center\">⚽ 104 matchs · Scores automatiques · Groupes privés<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CODE SCREEN -->\n<div class=\"screen\" id=\"screen-code\">\n  <div class=\"auth-bg\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;z-index:1\">\n    <div style=\"text-align:center;margin-bottom:24px\">\n      <div style=\"font-size:40px;margin-bottom:8px\">🔑<\u002Fdiv>\n      <div style=\"font-family:'Oswald',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold)\">Code d'invitation<\u002Fdiv>\n      <div style=\"font-size:13px;color:var(--muted2);margin-top:4px\">Entrez le code fourni par l'organisateur<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:rgba(22,27,39,0.88);border:1px solid var(--bd2);border-radius:20px;padding:26px;width:100%;max-width:380px;backdrop-filter:blur(12px)\">\n      <div class=\"fg\"><label>Code (6 caractères)<\u002Flabel>\n        <input class=\"code-input\" type=\"text\" id=\"screen-code-input\" placeholder=\"XXXXXX\" maxlength=\"6\" oninput=\"this.value=this.value.toUpperCase()\">\n      <\u002Fdiv>\n      <button class=\"btn-auth\" onclick=\"joinByCodeFromScreen()\">Rejoindre →<\u002Fbutton>\n      <div id=\"code-screen-err\" class=\"err\" style=\"margin-top:8px\"><\u002Fdiv>\n      <div style=\"text-align:center;margin-top:14px\"><span onclick=\"doLogout()\" style=\"font-size:12px;color:var(--muted);cursor:pointer\">← Se déconnecter<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- APP SCREEN -->\n<div class=\"screen\" id=\"screen-app\">\n  <div class=\"topbar\">\n    <div class=\"tbl\">\n      <div class=\"tlogo\">⚽ WORLD CUP 2026<\u002Fdiv>\n      <div class=\"gpill\" id=\"topbar-group\" onclick=\"showTab('groups')\">—<\u002Fdiv>\n      <span class=\"abadge hidden\" id=\"admin-badge\">🛡 ADMIN<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"tbr\">\n      <div class=\"live-dot\" id=\"live-indicator\"><\u002Fdiv>\n      <div class=\"uchip\">\n        <div class=\"avsm\" id=\"topbar-avatar\">?<\u002Fdiv>\n        <span id=\"topbar-user\" style=\"max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">...<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"lbtn\" onclick=\"doLogout()\">↩<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"main\">\n    <!-- MATCHES -->\n    <div class=\"tc active\" id=\"tab-matches\">\n      <div class=\"sh\">\n        <div class=\"st ion getBonusPhase(m){\n  // Group matches use week keys; knockout uses phase keys\n  if('ABCDEFGHIJKL'.includes(m.gr)) return null; // group → week system\n  if(m.gr==='SF'||m.gr==='3PL'||m.gr==='FIN') return 'SFINAL'; // shared final pool\n  return m.gr; // R32, R16, QF\n}\nfunction getBonusKey(m){\n  // Returns the storage key for this match's bonus slot\n  const phase = getBonusPhase(m);\n  if(phase) return phase; // knockout: key by phase\n  return getWeekKey(m.dt); // group: key by week\n}\nfunction countPhaseDoublesUsed(phase, excludeMid){\n  // Count how many bonuses are used in a knockout phase\n  const myDoubles = (DB_doubles[CUR_GROUP]||{})[ME?.username]||{};\n  let count = 0;\n  Object.entries(myDoubles).forEach(([key, mid])=>{\n    if(!mid) return;\n    const m = MATCHES.find(x=>x.id===mid);\n    if(m && getBonusPhase(m)===phase && mid!==excludeMid) count++;\n  });\n  return count;\n}\nfunction canUseBonus(m){\n  const phase = getBonusPhase(m);\n  if(phase){\n    // Knockout: check phase quota\n    const quota = KNOCKOUT_BONUS_QUOTA[phase] || 1;\n    const used = countPhaseDoublesUsed(phase, m.id);\n    const myDoubles = (DB_doubles[CUR_GROUP]||{})[ME?.username]||{};\n    const alreadyOnThis = Object.values(myDoubles).includes(m.id);\n    return alreadyOnThis || used < quota;\n  } else {\n    // Group: week system\n    const wk = getWeekKey(m.dt);\n    const weekUsed = (DB_doubles[CUR_GROUP]||{})[ME?.username]?.[wk];\n    return !weekUsed || weekUsed===m.id;\n  }\n}\n\nfunction getURLParam(p) { return new URLSearchParams(window.location.search).get(p); }\nfunction toast(msg, dur=2800) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur); }\nfunction fmtDate(s) { return new Date(s).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'}); }\nfunction getMatchDate(m) {\n  // For final and 3rd place, always use static date (ESPN can store wrong cached date)\n r==='SF'||m.gr==='3PL') return 3;\n  if(m.gr==='FIN') return 4;\n  return 1;\n}\nfunction calcPts(bet, result, matchId) {\n  if (!bet||result?.home===undefined) return null;\n  const bH=+bet.home,bA=+bet.away,rH=+result.home,rA=+result.away;\n  if (isNaN(bH)||isNaN(bA)) return null;\n  let p=0;\n  if (bH===rH&&bA===rA) p=30;\n  else { const br=bH>bA?1:bH<bA?-1:0,rr=rH>rA?1:rH<rA?-1:0; if(br===rr){p=rr===0?20:(bH-bA)===(rH-rA)?20:10;} }\n  if (bet.double&&p>0) p*=2;\n  if(matchId) p*=knockoutMultiplier(matchId);\n  return p;\n}\nfunction getScoreForGroup(username, gid) {\n  const bets=(DB_bets[gid]||{})[username]||{};\n  let total=0,exact=0,betCount=0,dblCount=0;\n  MATCHES.forEach(m=>{\n    const bet=bets[m.id],result=DB_results[m.id];\n    if(bet&&bet.home!==undefined&&bet.away!==undefined) betCount++;\n    if(bet?.double) dblCount++;\n    if(result?.home!==undefined&&!result.live){const p=calcPts(bet,result,m.id);if(p!==null)total+=p;if(bet&&+bet.home===+result.home&&+bet.away===+result.away)exact++;}\n  });\n  // Champion bet bonus\n  const champBet = (DB_champion[gid]||{})[username];\n  const champResult = DB_champion['_winner']; // set when tournament ends\n  if(champBet && champResult && champBet===champResult) total+=100;\n  return {total,exact,bets:betCount,doubles:dblCount};\n}\nfunction getScore(u) { return CUR_GROUP?getScoreForGroup(u,CUR_GROUP):{total:0,exact:0,bets:0,doubles:0}; }\n\n// ========================================\n// BRACKET ENGINE\n// ========================================\nfunction getGroupStandings(grp, results) {\n  const ms=GROUP_MATCHES[grp]||[], teams={};\n  // FIX: Don't return standings until ALL group matches are played\n  const playedCount = ms.filter(m => results[m.id]?.home !== undefined).length;\n  if (playedCount < ms.length) return []; // Group not finished — show placeholders\n  ms.forEach(m=>{\n    [m.hc,m.ac].forEach(c=>{ if(!teams[c]) teams[c]={code:c,name:m.hc===c?m.hn:m.an,flag:m.hc===c?m.h:m.a,pts:0,gd:0,gf:0}; });\n    const r=results[m.id]; if(!r||r.home===undefined) return;\n    const hg=+r.home,ag=+r.away;\n    teams[m.hc].gf+=hg; teams[m.hc].gd+=(hg-ag);\n    teams[m.ac].gf+=ag; teams[m.ac].gd+=(ag-hg);\n    if(hg>ag){teams[m.hc].pts+=3;}else if(ag>hg){teams[m.ac].pts+=3;}else{teams[m.hc].pts+=1;teams[m.ac].pts+=1;}\n  });\n  return Object.values(teams).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);\n}\nfunction resolveKnockoutTeams(results) {\n  const R={};\n  'ABCDEFGHIJKL'.split('').forEach(g=>{\n    const s=getGroupStandings(g,results);\n    R[g+'1']=s[0]?{name:s[0].name,flag:s[0].flag}:{name:'1er Gr.'+g,flag:'🏆'};\n    R[g+'2']=s[1]?{name:s[1].name,flag:s[1].flag}:{name:'2e Gr.'+g,flag:'🏆'};\n    R[g+'3']=s[2]?{name:s[2].name,flag:s[2].flag}:{name:'3e Gr.'+g,flag:'🏆'};\n  });\n  R['3rd?']={name:'Meilleur 3e',flag:'🏆'};\n  function resolveMatch(id) {\n    const r=results[id],m=MATCHES.find(x=>x.id===id); if(!m) return;\n    const ht=R[m.hc]||(m.hn?{name:m.hn,flag:m.h||'🏆'}:{name:m.hc,flag:'🏆'});\n    const at=R[m.ac]||(m.an?{name:m.an,flag:m.a||'🏆'}:{name:m.ac,flag:'🏆'});\n    R['W-'+id]=R['W-'+id]||{name:'Vainq.'+id,flag:'🏆'};\n    R['L-'+id]=R['L-'+id]||{name:'Perd.'+id,flag:'🏆'};\n    if(r&&r.home!==undefined&&!r.live){\n      let w,l;\n      if(+r.home===+r.away && r.penaltyWinner){\n        // Match nul décidé aux penaltys — utiliser le vrai vainqueur\n        w = r.penaltyWinner==='home' ? ht : at;\n        l = r.penaltyWinner==='home' ? at : ht;\n      } else {\n        w = +r.home>+r.away ? ht : +r.away>+r.home ? at : ht;\n        l = +r.home>+r.away ? at : +r.away>+r.home ? ht : at;\n      }\n      R['W-'+id]=w; R['L-'+id]=l;\n    }\n  }\n  for(let i=1;i<=16;i++) resolveMatch('r32_'+i);\n  for(let i=1;i<=8;i++) resolveMatch('r16_'+i);\n  for(let i=1;i<=4;i++) resolveMatch('qf'+i);\n  resolveMatch('sf1');resolveMatch('sf2');resolveMatch('p3rd');resolveMatch('final');\n  return R;\n}\nfunction enrichMatch(m,R) {\n  if(m.hn) return m;\n  const ht=R[m.hc]||{name:m.hc,flag:'🏆'},at=R[m.ac]||{name:m.ac,flag:'🏆'};\n  return {...m,h:ht.flag,hn:ht.name,a:at.flag,an:at.name};\n}\n\n// ========================================\n// AUTH\n// ========================================\nwindow.switchAuthTab = function(tab) {\n  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));\n  ['form-login','form-register','form-admin'].forEach(id=>document.getElementById(id).classList.add('hidden'));\n  if(tab==='login'){document.querySelectorAll('.atab')[0].classList.add('active');document.getElementById('form-login').classList.remove('hidden');}\n  else{document.querySelectorAll('.atab')[1].classList.add('active');document.getElementById('form-register').classList.remove('hidden');}\n};\nwindow.showAdminLogin = function() {\n  ['form-login','form-register'].forEach(id=>document.getElementById(id).classList.add('hidden'));\n  document.getElementById('form-admin').classList.remove('hidden');\n  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));\n};\nwindow.showNormalLogin = function() {\n  document.getElementById('form-admin').classList.add('hidden');\n  document.getElementById('form-login').classList.remove('hidden');\n  document.querySelectorAll('.atab')[0].classList.add('active');\n};\n\nasync function doLogin() {\n  const u=document.getElementById('lu').value.trim().toLowerCase();\n  const p=document.getElementById('lp').value;\n  const errEl=document.getElementById('login-err');\n  errEl.textContent='';\n  if(!u||!p) return(errEl.textContent='⚠️ Remplissez tous les champs');\n  if(u==='admin'&&p===ADMIN_PASS){ME={username:'admin',emoji:'🛡️',isAdmin:true};localStorage.setItem('wc2026_me',JSON.stringify(ME));await loadUserData();return enterApp();}\n  if(u==='admin'&&p!==ADMIN_PASS) return(errEl.textContent='❌ Mot de passe incorrect');\n  const snap=await get(ref(db,'users/'+u));\n  if(!snap.exists()) return(errEl.textContent='❌ Pseudo introuvable');\n  const ud=snap.val();\n  const hashed=hashPass(p,u);\n  if(ud.pass!==hashed&&ud.pass!==p) return(errEl.textContent='❌ Mot de passe incorrect');\n  ME={username:u,emoji:ud.emoji,isAdmin:false};\n  sessionStorage.removeItem('wc2026_admin_session');\n  localStorage.setItem('wc2026_me',JSON.stringify(ME));\n  await loadUserData();\n  const invGid=getURLParam('group');\n  if(invGid) await joinGroup(invGid);\n  enterApp();\n}\nwindow.doLogin=doLogin;\n\nasync function doRegister() {\n  const u=document.getElementById('ru').value.trim().toLowerCase().replace(/\\s/g,'_');\n  const p=document.getElementById('rp').value;\n  const e=document.getElementById('re').value;\n  const errEl=document.getElementById('reg-err');\n  errEl.textContent='';\n  if(!u||!p) return(errEl.textContent='⚠️ Remplissez tous les champs');\n  if(p.length<4) return(errEl.textContent='⚠️ Mot de passe trop court');\n  if(u==='admin') return(errEl.textContent='❌ Pseudo réservé');\n  const snap=await get(ref(db,'users/'+u));\n  if(snap.exists()) return(errEl.textContent='❌ Ce pseudo est déjà pris');\n  await set(ref(db,'users/'+u),{pass:hashPass(p,u),emoji:e,groups:{}});\n  ME={username:u,emoji:e,isAdmin:false};\n  localStorage.setItem('wc2026_me',JSON.stringify(ME));\n  await loadUserData();\n  const invGid=getURLParam('group');\n  if(invGid){await joinGroup(invGid);enterApp();return;}\n  document.getElementById('screen-auth').classList.remove('active');\n  document.getElementById('screen-code').classList.add('active');\n}\nwindow.doRegister=doRegister;\n\nwindow.doAdminLogin=async function(){\n  const p=document.getElementById('admin-pass-input').value;\n  const errEl=document.getElementById('admin-err');\n  errEl.textContent='';\n  if(!p) return(errEl.textContent='⚠️ Entrez le mot de passe');\n  if(p!==ADMIN_PASS) return(errEl.textContent='❌ Mot de passe incorrect');\n  ME={username:'admin',emoji:'🛡️',isAdmin:true};\n  localStorage.setItem('wc2026_me',JSON.stringify(ME));\n  await loadUserData();\n  enterApp();\n};\n\nwindow.doLogout=function(){\n  cleanupAllListeners();\n  // Clean up all intervals\n  _intervals.forEach(id=>clearInterval(id));\n  _intervals=[];\n  ME=null;CUR_GROUP=null;\n  localStorage.removeItem('wc2026_me');\n  sessionStorage.removeItem('wc2026_admin_session');\n  // Clean up chat listener\n  if(chatListener){try{off(chatListener);}catch(e){} chatListener=null;}\n  document.getElementById('screen-app').classList.remove('active');\n  document.getElementById('screen-auth').classList.add('active');\n};\n\nwindow.verifyAdminGate=function(){\n  const p=document.getElementById('gate-pass')?.value;\n  const errEl=document.getElementById('gate-err');\n  if(errEl) errEl.textContent='';\n  if(!p) return;\n  if(p===ADMIN_PASS){\n    ME.isAdmin=true;\n    sessionStorage.setItem('wc2026_admin_session','1');\n    document.getElementById('admin-badge')?.classList.remove('hidden');\n    document.getElementById('admin-gate').style.display='none';\n    document.getElementById('admin-content').style.display='block';\n    document.getElementById('create-group-section')?.classList.remove('hidden');\n    renderAdmin();\n    toast('✅ Accès admin accordé');\n  } else {\n    if(errEl) errEl.textContent='❌ Mot de passe incorrect';\n  }\n};\n\nwindow.joinByCodeFromScreen=async function(){\n  const code=document.getElementById('screen-code-input')?.value.trim().toUpperCase();\n  const errEl=document.getElementById('code-screen-err');\n  errEl.textContent='';\n  if(!code||code.length<4) return(errEl.textContent='⚠️ Entrez un code valide');\n  const snap=await get(ref(db,'codes/'+code));\n  if(!snap.exists()) return(errEl.textContent='❌ Code invalide');\n  const gid=snap.val();\n  const gsnap=await get(ref(db,'groups/'+gid));\n  if(!gsnap.exists()) return(errEl.textContent='❌ Groupe introuvable');\n  await joinGroup(gid);\n  document.getElementById('screen-code').classList.remove('active');\n  enterApp();\n};\n\nfunction enterApp(){\n  document.getElementById('screen-auth').classList.remove('active');\n  document.
